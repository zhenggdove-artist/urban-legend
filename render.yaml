services:
  - type: web
    name: urban-legend-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: urban-legend-db-v2
          property: connectionString

databases:
  - name: urban-legend-db-v2
    plan: free
    databaseName: urban_legend_v2
    user: urban_legend
    postgresMajorVersion: "16"
    ipAllowList: []