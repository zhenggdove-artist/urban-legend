services:
  - type: web
    name: urban-legend-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: DATA_PATH
        value: /var/data/entries.json
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
