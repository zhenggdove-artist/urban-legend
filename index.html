<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>都市傳說 - WebAR Game</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;background:#000;
            touch-action:none;-webkit-user-select:none;user-select:none}
        #camera-video{position:absolute;top:0;left:0;width:100%;height:100%;
            object-fit:cover;z-index:0;
            background:linear-gradient(180deg,#87CEEB 0%,#4a90d9 40%,#2c3e50 40.5%,#1a1a2e 100%)}
        #analysis-canvas{position:absolute;top:0;left:0;width:100%;height:100%;
            z-index:1;opacity:0.2;pointer-events:none}
        #debug-info{position:absolute;top:40px;left:10px;z-index:20;
            color:#fff;font:11px/1.4 monospace;background:rgba(0,0,0,.5);
            padding:5px 8px;border-radius:4px;pointer-events:none;max-width:220px}
        #joystick-zone{position:absolute;z-index:20;width:100px;height:100px;
            background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);
            border-radius:50%;touch-action:none}
        #joystick-knob{position:absolute;top:25px;left:25px;width:50px;height:50px;
            background:rgba(255,255,255,.5);border-radius:50%}
        #jump-btn{position:absolute;z-index:20;width:80px;height:80px;
            background:rgba(220,40,40,.6);border:2px solid rgba(255,80,80,.5);
            border-radius:50%;display:flex;justify-content:center;align-items:center;
            color:#fff;font:bold 14px sans-serif;touch-action:none}

        #loading-screen{position:absolute;top:0;left:0;width:100%;height:100%;
            background:rgba(0,0,0,.92);z-index:100;display:flex;flex-direction:column;
            justify-content:center;align-items:center;color:#fff;font-family:sans-serif}
        #loading-screen h2{margin-bottom:16px;font-size:20px}
        #loading-bar-bg{width:160px;height:5px;background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden}
        #loading-bar{width:0%;height:100%;background:#e63946;border-radius:3px;transition:width .3s}
        #loading-status{margin-top:10px;font-size:13px;opacity:.6}
        #start-btn{display:none;margin-top:20px;padding:12px 44px;background:#e63946;
            color:#fff;border:none;border-radius:10px;font-size:17px;font-weight:bold;cursor:pointer}
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">{"imports":{
        "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
    }}</script>
</head>
<body>
    <video id="camera-video" autoplay playsinline muted></video>
    <canvas id="analysis-canvas"></canvas>
    <div id="debug-info">Loading...</div>
    <div id="joystick-zone"><div id="joystick-knob"></div></div>
    <div id="jump-btn">JUMP</div>
    <div id="loading-screen">
        <h2>都市傳說</h2>
        <div id="loading-bar-bg"><div id="loading-bar"></div></div>
        <div id="loading-status">初始化中...</div>
        <button id="start-btn">開始遊戲</button>
    </div>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
import { DRACOLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/DRACOLoader.js';

// ===== Globals =====
const W = () => window.innerWidth, H = () => window.innerHeight;
function layoutUI() {
    const w = W(), h = H();
    const jz = document.getElementById('joystick-zone');
    jz.style.left = '24px'; jz.style.top = (h - 140) + 'px';
    const jb = document.getElementById('jump-btn');
    jb.style.left = (w - 104) + 'px'; jb.style.top = (h - 120) + 'px';
}
layoutUI(); window.addEventListener('resize', layoutUI);

// ===== Loading =====
const $bar = document.getElementById('loading-bar');
const $status = document.getElementById('loading-status');
const $loading = document.getElementById('loading-screen');
const $start = document.getElementById('start-btn');
let prog = { camera: 0, model: 0, anim: 0, death: 0 };
function updateBar() {
    $bar.style.width = Math.round((prog.camera+prog.model+prog.anim+prog.death)/4) + '%';
}

// ===== Camera =====
async function startCamera() {
    const v = document.getElementById('camera-video');
    try {
        v.srcObject = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false
        });
        await v.play();
        prog.camera = 100; updateBar();
        return true;
    } catch (e) {
        console.warn('Camera:', e);
        prog.camera = 100; updateBar();
        return false;
    }
}

// ===== Gyroscope =====
class GyroTracker {
    constructor() {
        this.tiltY = 0; // vertical tilt offset in "scene units"
        this.baseBeta = null;
        this.enabled = false;
    }
    async init() {
        // iOS requires permission
        if (typeof DeviceOrientationEvent !== 'undefined' &&
            typeof DeviceOrientationEvent.requestPermission === 'function') {
            try {
                const p = await DeviceOrientationEvent.requestPermission();
                if (p !== 'granted') return;
            } catch (e) { return; }
        }
        window.addEventListener('deviceorientation', e => {
            if (e.beta === null) return;
            if (this.baseBeta === null) this.baseBeta = e.beta;
            // beta: 0=flat, 90=vertical. tilt up = beta decreases
            const deltaBeta = e.beta - this.baseBeta;
            // Map: every 8 degrees of tilt = 1 scene unit of vertical pan
            // Negative because tilting up (decreasing beta) should move camera up
            this.tiltY = -deltaBeta / 8;
            this.enabled = true;
        });
    }
    resetBase() { this.baseBeta = null; }
}

// ===== Scene Analyzer =====
class SceneAnalyzer {
    constructor(video) {
        this.video = video;
        this.sc = document.createElement('canvas');
        this.sc.width = 32; this.sc.height = 48;
        this.sctx = this.sc.getContext('2d', { willReadFrequently: true });
        this.dc = document.getElementById('analysis-canvas');
        this.dctx = this.dc.getContext('2d');
        this.skyLine = 0.4;
        this.last = 0;
    }
    analyze(now) {
        if (now - this.last < 500) return;
        this.last = now;
        const v = this.video;
        if (!v.srcObject || v.readyState < 2) return;
        const sw = 32, sh = 48;
        this.sctx.drawImage(v, 0, 0, sw, sh);
        const d = this.sctx.getImageData(0, 0, sw, sh).data;
        let skyY = 0;
        for (let y = 0; y < sh; y++) {
            let sR=0,sG=0,sB=0; const cols=[];
            for (let x=0;x<sw;x++){const i=(y*sw+x)*4;const r=d[i],g=d[i+1],b=d[i+2];sR+=r;sG+=g;sB+=b;cols.push([r,g,b]);}
            const aR=sR/sw,aG=sG/sw,aB=sB/sw;
            let v2=0; for(const[r,g,b]of cols) v2+=(r-aR)**2+(g-aG)**2+(b-aB)**2;
            v2/=sw;
            if(y+2<sh && v2>800){skyY=y;break;}
        }
        this.skyLine = this.skyLine * 0.7 + (skyY/sh) * 0.3;
        // Draw overlay
        this.dc.width = W(); this.dc.height = H();
        const ctx = this.dctx, cw = this.dc.width/sw, ch = this.dc.height/sh;
        ctx.clearRect(0,0,this.dc.width,this.dc.height);
        for(let y=0;y<sh;y++){
            ctx.fillStyle = (y/sh)<=this.skyLine ? 'rgba(100,180,255,.12)' : 'rgba(0,255,100,.08)';
            ctx.fillRect(0, y*ch, this.dc.width, ch);
        }
        ctx.strokeStyle='rgba(0,200,255,.5)'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(0,this.skyLine*this.dc.height);
        ctx.lineTo(this.dc.width,this.skyLine*this.dc.height); ctx.stroke();
    }
}

// ===== Blood Particle System =====
class BloodEffect {
    constructor(scene) {
        this.scene = scene;
        this.particles = [];
        this.group = new THREE.Group();
        scene.add(this.group);
    }
    spawn(pos) {
        // Create 40 blood particles - big enough to see
        for (let i = 0; i < 40; i++) {
            const size = 0.005 + Math.random()*0.012; // proportional to character
            const geo = new THREE.SphereGeometry(size, 6, 6);
            const mat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(0.6 + Math.random()*0.4, 0, 0),
                transparent: true, opacity: 1.0, depthTest: false
            });
            const m = new THREE.Mesh(geo, mat);
            m.position.copy(pos);
            m.renderOrder = 999; // render on top
            // Random velocity - spread outward
            const angle = Math.random() * Math.PI * 2;
            const speed = 0.15 + Math.random() * 0.3;
            const vx = Math.cos(angle) * speed;
            const vy = Math.random() * 0.4 + 0.05;
            const vz = Math.sin(angle) * speed * 0.3 + 0.1; // bias toward camera
            this.particles.push({ mesh: m, vx, vy, vz, life: 2.0 + Math.random() * 1.5 });
            this.group.add(m);
        }
    }
    update(dt) {
        for (let i = this.particles.length - 1; i >= 0; i--) {
            const p = this.particles[i];
            p.vy -= 1.5 * dt; // gravity
            p.mesh.position.x += p.vx * dt;
            p.mesh.position.y += p.vy * dt;
            p.mesh.position.z += p.vz * dt;
            // Stop at ground
            if (p.mesh.position.y < 0) { p.mesh.position.y = 0; p.vx *= 0.9; p.vz *= 0.9; p.vy = 0; }
            p.life -= dt;
            p.mesh.material.opacity = Math.max(0, Math.min(1, p.life / 1.0));
            if (p.life <= 0) {
                this.group.remove(p.mesh);
                p.mesh.geometry.dispose(); p.mesh.material.dispose();
                this.particles.splice(i, 1);
            }
        }
    }
}

// ===== Character =====
class GameCharacter {
    constructor(scene) {
        this.scene = scene;
        this.root = new THREE.Group();
        scene.add(this.root);
        this.mixer = null;
        this.anims = {};
        this.curAction = null;
        this.curState = 'IDLE';
        this.root.rotation.y = Math.PI;
        this.charHeight = 0.033; // target height in scene units (~1/30 screen)
    }
    async load() {
        const gl = new GLTFLoader();
        const dr = new DRACOLoader();
        dr.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');
        gl.setDRACOLoader(dr);

        const texLoader = new THREE.TextureLoader();
        let skinTex = null;
        try {
            skinTex = await new Promise((r,j) =>
                texLoader.load('./playermodel/tripo_model_basecolor.JPEG', r, undefined, j));
            skinTex.flipY = false;
            skinTex.colorSpace = THREE.SRGBColorSpace;
        } catch(e) {}

        const load = (url) => new Promise((r,j) =>
            gl.load(url, g=>r(g), undefined, e=>j(e)));

        try {
            $status.textContent = '載入模型...';
            const idleG = await load('./playermodel/idle.glb');
            prog.model = 100; updateBar();

            const model = idleG.scene;
            // SCALE: make character 0.1 scene units tall
            // (scene is set up so 1 unit ≈ screen height)
            const box = new THREE.Box3().setFromObject(model);
            const origH = box.getSize(new THREE.Vector3()).y;
            const sc = this.charHeight / origH;
            model.scale.setScalar(sc);
            this.scaleFactor = sc;

            // Feet at y=0
            const box2 = new THREE.Box3().setFromObject(model);
            model.position.y = -box2.min.y;

            // Skin
            model.traverse(c => {
                if (c.isMesh) {
                    c.material = new THREE.MeshStandardMaterial({
                        map: skinTex, roughness: 0.8, metalness: 0.1, side: THREE.DoubleSide
                    });
                    c.frustumCulled = false;
                }
            });

            this.model3D = model;
            this.root.add(model);
            this.mixer = new THREE.AnimationMixer(model);

            const strip = clip => {
                clip.tracks = clip.tracks.filter(t =>
                    !/(Hips|RootNode)\.(position|quaternion)/i.test(t.name));
            };

            if (idleG.animations.length) {
                strip(idleG.animations[0]);
                this.anims['IDLE'] = this.mixer.clipAction(idleG.animations[0]);
                this.anims['IDLE'].play();
                this.curAction = this.anims['IDLE'];
            }

            $status.textContent = '載入動畫...';
            const [cR, jR, dR] = await Promise.allSettled([
                load('./playermodel/climb.glb'),
                load('./playermodel/jump.glb'),
                load('./playermodel/death.glb')
            ]);
            prog.anim = 100; prog.death = 100; updateBar();

            if (cR.status==='fulfilled' && cR.value.animations.length) {
                strip(cR.value.animations[0]);
                this.anims['CLIMB'] = this.mixer.clipAction(cR.value.animations[0]);
            }
            if (jR.status==='fulfilled' && jR.value.animations.length) {
                strip(jR.value.animations[0]);
                this.anims['JUMP'] = this.mixer.clipAction(jR.value.animations[0]);
                this.anims['JUMP'].setLoop(THREE.LoopOnce);
                this.anims['JUMP'].clampWhenFinished = true;
            }
            if (dR.status==='fulfilled' && dR.value.animations.length) {
                strip(dR.value.animations[0]);
                this.anims['DEATH'] = this.mixer.clipAction(dR.value.animations[0]);
                this.anims['DEATH'].setLoop(THREE.LoopOnce);
                this.anims['DEATH'].clampWhenFinished = true;
            }

            this.loaded = true;
        } catch(e) {
            console.error('Load fail:', e);
            $status.textContent = '載入失敗';
            prog.model=prog.anim=prog.death=100; updateBar();
        }
    }
    setState(s) {
        if (this.curState === s) return;
        this.curState = s;
        if (!this.mixer) return;
        const next = this.anims[s];
        if (!next) return;
        if (this.curAction && this.curAction !== next) {
            next.reset().play();
            next.crossFadeFrom(this.curAction, 0.15, true);
        } else next.reset().play();
        this.curAction = next;
    }
    update(dt, moveY) {
        if (!this.mixer) return;
        if (this.curState==='CLIMB' && this.anims['CLIMB'])
            this.anims['CLIMB'].timeScale = moveY>0?1.5:(moveY<0?-1.5:0);
        this.mixer.update(dt);
    }
}

// ===== Main =====
async function main() {
    $status.textContent = '載入中...';
    prog.camera = 100; updateBar();

    // ---- Scene setup ----
    // 1 scene unit ≈ screen height. Camera sees roughly -0.5 to +0.5 vertically
    const scene = new THREE.Scene();
    const VFOV = 60;
    const camera = new THREE.PerspectiveCamera(VFOV, W()/H(), 0.001, 100);
    // Position camera so visible height at z=0 ≈ 1 unit
    // visH = 2 * z * tan(fov/2) => z = visH / (2*tan(fov/2))
    const camZ = 1.0 / (2 * Math.tan(THREE.MathUtils.degToRad(VFOV/2)));
    camera.position.set(0, 0.5, camZ); // center of screen at y=0.5
    camera.lookAt(0, 0.5, 0);

    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(W(), H());
    renderer.setClearColor(0x000000, 0);
    const canvas3d = renderer.domElement;
    canvas3d.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none';
    document.getElementById('camera-video').after(canvas3d);

    // Lighting
    scene.add(new THREE.DirectionalLight(0xffffff, 2).translateX(2).translateY(3).translateZ(2));
    scene.add(new THREE.AmbientLight(0xaaaaaa));
    scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.5));

    // Character
    const character = new GameCharacter(scene);
    await character.load();

    // Blood
    const blood = new BloodEffect(scene);

    // Gyro
    const gyro = new GyroTracker();

    // Analyzer
    const analyzer = new SceneAnalyzer(document.getElementById('camera-video'));

    // Ready
    $status.textContent = '準備完成！';
    $start.style.display = 'block';

    await new Promise(r => $start.addEventListener('click', async () => {
        $status.textContent = '啟動中...';
        $start.style.display = 'none';
        const hasCam = await startCamera();
        window._hasCam = hasCam;
        await gyro.init();
        gyro.resetBase();
        $loading.style.display = 'none';
        r();
    }, { once: true }));

    const hasCamera = window._hasCam;

    // ===== Input =====
    const input = { x: 0, y: 0, jump: false };
    const jZone = document.getElementById('joystick-zone');
    const jKnob = document.getElementById('joystick-knob');
    let dragging = false, dragX0 = 0, dragY0 = 0;

    jZone.addEventListener('pointerdown', e => {
        dragging=true; dragX0=e.clientX; dragY0=e.clientY;
        jKnob.style.background='rgba(255,255,255,.8)'; e.preventDefault();
    }, {passive:false});
    window.addEventListener('pointermove', e => {
        if(!dragging)return;
        const dx=Math.max(-35,Math.min(35,e.clientX-dragX0));
        const dy=Math.max(-35,Math.min(35,e.clientY-dragY0));
        jKnob.style.transform=`translate(${dx}px,${dy}px)`;
        input.x=dx/35;
        input.y=-dy/35;
    });
    window.addEventListener('pointerup', ()=>{
        if(!dragging)return; dragging=false;
        jKnob.style.transform='translate(0,0)';
        jKnob.style.background='rgba(255,255,255,.5)';
        input.x=0; input.y=0;
    });

    const jBtn = document.getElementById('jump-btn');
    jBtn.addEventListener('pointerdown', e=>{input.jump=true;jBtn.classList.add('pressed');e.preventDefault()},{passive:false});
    jBtn.addEventListener('pointerup', ()=>jBtn.classList.remove('pressed'));
    jBtn.addEventListener('pointercancel', ()=>jBtn.classList.remove('pressed'));

    window.addEventListener('keydown', e=>{
        if(e.key==='ArrowUp'||e.key==='w')input.y=1;
        if(e.key==='ArrowDown'||e.key==='s')input.y=-1;
        if(e.key==='ArrowLeft'||e.key==='a')input.x=-1;
        if(e.key==='ArrowRight'||e.key==='d')input.x=1;
        if(e.key===' ')input.jump=true;
    });
    window.addEventListener('keyup', e=>{
        if(['ArrowUp','w','ArrowDown','s'].includes(e.key))input.y=0;
        if(['ArrowLeft','a','ArrowRight','d'].includes(e.key))input.x=0;
    });

    // ===== Game State =====
    const clock = new THREE.Clock();
    let state = 'CLIMB', vy = 0, deaths = 0;
    let deathTimer = 0, jumpStartY = 0;
    const dbg = document.getElementById('debug-info');

    // Character starts at bottom of screen (y=0.05)
    character.root.position.set(0, 0.05, 0);

    function tick() {
        requestAnimationFrame(tick);
        const dt = Math.min(clock.getDelta(), 0.05);
        const t = clock.getElapsedTime();
        const pos = character.root.position;

        analyzer.analyze(t * 1000);

        // Half visible width at z=0 plane
        const halfVisW = camZ * Math.tan(THREE.MathUtils.degToRad(VFOV/2)) * (W()/H());

        switch (state) {
            case 'CLIMB':
                if (Math.abs(input.y) > 0.1 || Math.abs(input.x) > 0.1) {
                    character.setState('CLIMB');
                    // Vertical climb
                    pos.y += input.y * 0.3 * dt;
                    if (pos.y < 0.05) pos.y = 0.05;
                    // Horizontal movement
                    pos.x += input.x * 0.25 * dt;
                    // Clamp X to stay within visible area
                    pos.x = Math.max(-halfVisW + 0.05, Math.min(halfVisW - 0.05, pos.x));
                } else {
                    character.setState('IDLE');
                }
                if (input.jump) {
                    input.jump = false;
                    state = 'JUMPING';
                    character.setState('JUMP');
                    character.root.rotation.y = 0; // face camera
                    vy = 0.5;
                    jumpStartY = pos.y; // remember where we jumped from
                    deaths++;
                }
                break;

            case 'JUMPING':
                vy -= 1.5 * dt; // gravity
                pos.y += vy * dt;
                pos.z += 0.3 * dt; // fly toward camera
                if (pos.y <= 0.02) {
                    // HIT GROUND — death!
                    pos.y = 0.02;
                    vy = 0;
                    state = 'DEAD';
                    character.setState('DEATH');
                    deathTimer = 4.0;
                    // Spawn blood bursts at impact point
                    const impactPos = pos.clone();
                    blood.spawn(impactPos);
                    blood.spawn(impactPos.clone().add(new THREE.Vector3(0, 0.03, 0)));
                    blood.spawn(impactPos.clone().add(new THREE.Vector3(0.02, 0.01, 0)));
                }
                break;

            case 'DEAD':
                deathTimer -= dt;
                if (deathTimer <= 0) {
                    state = 'CLIMB';
                    pos.set(0, 0.05, 0);
                    character.root.rotation.y = Math.PI;
                    character.setState('IDLE');
                    gyro.resetBase();
                }
                break;
        }
        input.jump = false;

        // Force wall-facing during climb
        if (state === 'CLIMB') character.root.rotation.y = Math.PI;

        // === Camera: FIXED base position, only gyro shifts it ===
        // Base: camera at y=0.5 sees scene y=0..1
        // Gyro tilt moves camera up/down to reveal beyond screen
        // NO auto-follow — character must visibly climb up the screen
        let gyroOffset = gyro.enabled ? gyro.tiltY : 0;
        gyroOffset = Math.max(-1.0, Math.min(5.0, gyroOffset));
        const targetCamY = 0.5 + gyroOffset;
        camera.position.y += (targetCamY - camera.position.y) * 0.12;
        camera.lookAt(0, camera.position.y, 0);

        // Update
        character.update(dt, input.y);
        blood.update(dt);

        // Debug
        dbg.innerHTML = [
            `Pos: ${pos.x.toFixed(2)},${pos.y.toFixed(2)} | ${state}`,
            `Input: ${input.x.toFixed(1)},${input.y.toFixed(1)}`,
            `CamY: ${camera.position.y.toFixed(2)}`,
            `Gyro: ${gyro.enabled ? gyro.tiltY.toFixed(2) : 'OFF'} base:${gyro.baseBeta !== null ? gyro.baseBeta.toFixed(0) : '-'}`,
            `Blood: ${blood.particles.length} | Deaths: ${deaths}`,
            hasCamera ? 'CAM:ON' : 'CAM:OFF',
        ].join('<br>');

        renderer.render(scene, camera);
    }

    function onResize() {
        camera.aspect = W()/H();
        camera.updateProjectionMatrix();
        renderer.setSize(W(), H());
        layoutUI();
    }
    window.addEventListener('resize', onResize);
    window.addEventListener('orientationchange', ()=>setTimeout(onResize,300));
    if(window.visualViewport) window.visualViewport.addEventListener('resize', onResize);

    tick();
}
