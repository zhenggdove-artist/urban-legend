<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebAR Meatball Game</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f0f0; touch-action: none; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Paper Texture Overlay */
        #paper-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 10; opacity: 0.3; mix-blend-mode: multiply;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.5"/></svg>');
        }

        /* UI Elements */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 20; }
        #joystick-zone { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; background: rgba(0,0,0,0.2); border-radius: 50%; pointer-events: auto; touch-action: none; }
        #joystick-knob { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%; }
        #jump-btn { position: absolute; bottom: 50px; right: 50px; width: 80px; height: 80px; background: rgba(255,0,0,0.5); border-radius: 50%; pointer-events: auto; display: flex; justify-content: center; align-items: center; color: white; font-family: sans-serif; font-weight: bold; user-select: none; }
        #debug-info { position: absolute; top: 10px; left: 10px; color: black; font-family: monospace; background: rgba(255,255,255,0.7); padding: 5px; }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="paper-overlay"></div>
    <div id="canvas-container"></div>
    <div id="ui-layer">
        <div id="debug-info">Height: 0<br>State: IDLE</div>
        <div id="joystick-zone"><div id="joystick-knob"></div></div>
        <div id="jump-btn">JUMP</div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import { FBXLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/FBXLoader.js';

        // --- 4. NPR Hand-drawn Shader ---
        const nprVertexShader = `
            uniform float time;
            varying vec3 vNormal;
            varying vec3 vViewPosition;
            
            // Simple noise function for boiling line effect
            float hash(float n) { return fract(sin(n) * 1e4); }
            float noise(vec3 x) {
                const vec3 step = vec3(110, 241, 171);
                vec3 i = floor(x); vec3 f = fract(x);
                float n = dot(i, step);
                vec3 u = f * f * (3.0 - 2.0 * f);
                return mix(mix(mix( hash(n + dot(step, vec3(0, 0, 0))), hash(n + dot(step, vec3(1, 0, 0))), u.x),
                               mix( hash(n + dot(step, vec3(0, 1, 0))), hash(n + dot(step, vec3(1, 1, 0))), u.x), u.y),
                           mix(mix( hash(n + dot(step, vec3(0, 0, 1))), hash(n + dot(step, vec3(1, 0, 1))), u.x),
                               mix( hash(n + dot(step, vec3(0, 1, 1))), hash(n + dot(step, vec3(1, 1, 1))), u.x), u.y), u.z);
            }

            void main() {
                vNormal = normalize(normalMatrix * normal);
                
                // Boiling line jitter
                float jitterAmount = 0.02;
                vec3 jitteredPos = position + normal * (noise(position * 10.0 + time * 5.0) - 0.5) * jitterAmount;
                
                vec4 mvPosition = modelViewMatrix * vec4(jitteredPos, 1.0);
                vViewPosition = -mvPosition.xyz;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const nprFragmentShader = `
            uniform vec3 color;
            uniform vec3 lightDir;
            varying vec3 vNormal;
            varying vec3 vViewPosition;

            void main() {
                vec3 normal = normalize(vNormal);
                vec3 viewDir = normalize(vViewPosition);
                
                // Cel shading (Toon)
                float ndotl = dot(normal, normalize(lightDir));
                float toonLight = ndotl > 0.5 ? 1.0 : (ndotl > 0.0 ? 0.5 : 0.2);
                
                // Outline (Rim light approach for simplicity in single pass)
                float rim = 1.0 - max(dot(viewDir, normal), 0.0);
                float outline = smoothstep(0.6, 0.8, rim);
                
                vec3 finalColor = color * toonLight;
                if (outline > 0.5) finalColor = vec3(0.0); // Black outline
                
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        const createNPRMaterial = (colorHex) => {
            return new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    color: { value: new THREE.Color(colorHex) },
                    lightDir: { value: new THREE.Vector3(1, 1, 1).normalize() }
                },
                vertexShader: nprVertexShader,
                fragmentShader: nprFragmentShader,
                side: THREE.FrontSide
            });
        };

        // --- 3. The Meatball System ---
        class MeatballManager {
            constructor(scene) {
                this.scene = scene;
                this.cluster = new THREE.Group();
                this.spheres = [];
                this.baseScale = 1.0;
                
                // Create initial cluster
                const mat = createNPRMaterial(0x8B4513); // Brownish
                for(let i=0; i<5; i++) {
                    const geo = new THREE.SphereGeometry(0.2, 16, 16);
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.set((Math.random()-0.5)*0.3, (Math.random()-0.5)*0.3, (Math.random()-0.5)*0.3);
                    this.cluster.add(mesh);
                    this.spheres.push(mesh);
                }
            }

            attachTo(bone) {
                if (bone) bone.add(this.cluster);
                else this.scene.add(this.cluster); // Fallback
            }

            update(time) {
                // Pulsate slightly
                const scale = this.baseScale + Math.sin(time * 3) * 0.1;
                this.cluster.scale.set(scale, scale, scale);
                
                // Update shader time
                this.spheres.forEach(s => {
                    if(s.material.uniforms) s.material.uniforms.time.value = time;
                });
            }

            scaleBasedOnGlobalCount(count) {
                // Scale up based on death count
                this.baseScale = 1.0 + Math.min(count / 100, 3.0); 
                // Add more spheres if count is high
                const targetSpheres = 5 + Math.floor(count / 10);
                while(this.spheres.length < targetSpheres && this.spheres.length < 20) {
                    const geo = new THREE.SphereGeometry(0.2, 16, 16);
                    const mesh = new THREE.Mesh(geo, createNPRMaterial(0x8B4513));
                    mesh.position.set((Math.random()-0.5)*0.5, (Math.random()-0.5)*0.5, (Math.random()-0.5)*0.5);
                    this.cluster.add(mesh);
                    this.spheres.push(mesh);
                }
            }
        }

        // --- 1. Three.js & Animation State Machine ---
        class GameCharacter {
            constructor(scene, meatballManager) {
                this.scene = scene;
                this.model = new THREE.Group(); // Placeholder until loaded
                this.scene.add(this.model);
                this.mixer = null;
                this.animations = {};
                this.currentState = 'IDLE';
                this.modelHeight = 2.0; // Assumed
                this.meatballManager = meatballManager;
                
                // Placeholder geometry while FBX loads
                const geo = new THREE.BoxGeometry(1, this.modelHeight, 1);
                const mat = createNPRMaterial(0xcccccc);
                this.mesh = new THREE.Mesh(geo, mat);
                this.mesh.position.y = this.modelHeight / 2;
                this.model.add(this.mesh);

                this.loadModels();
            }

            loadModels() {
                const loader = new FBXLoader();
                const animUrls = {
                    IDLE: './playermodel/Breathing Idle.fbx',
                    CLIMB: './playermodel/Climbing Ladder.fbx',
                    JUMP: './playermodel/Jumping.fbx'
                };

                // Load the idle FBX as the base model (it contains the skeleton)
                loader.load(animUrls.IDLE, (object) => {
                    // Remove placeholder
                    this.model.remove(this.mesh);

                    // Scale down the FBX model (Mixamo models are typically large)
                    object.scale.set(0.01, 0.01, 0.01);

                    // Apply NPR material to all meshes
                    object.traverse(child => {
                        if (child.isMesh) child.material = createNPRMaterial(0xaaaaaa);
                    });

                    this.model.add(object);
                    this.mixer = new THREE.AnimationMixer(object);

                    // Store idle animation
                    if (object.animations && object.animations.length > 0) {
                        this.animations['IDLE'] = this.mixer.clipAction(object.animations[0]);
                        this.animations['IDLE'].play();
                    }

                    // Attach meatball to head bone or model
                    const headBone = object.getObjectByName('Head') || object.getObjectByName('mixamorigHead');
                    this.meatballManager.attachTo(headBone || this.model);

                    // Load additional animations
                    const loadAnim = (name, url) => {
                        loader.load(url, (animObj) => {
                            if (animObj.animations && animObj.animations.length > 0) {
                                this.animations[name] = this.mixer.clipAction(animObj.animations[0]);
                            }
                        }, undefined, (err) => console.warn(`Failed to load ${name}:`, err));
                    };
                    loadAnim('CLIMB', animUrls.CLIMB);
                    loadAnim('JUMP', animUrls.JUMP);

                }, undefined, (err) => {
                    console.warn('FBX load failed, using placeholder:', err);
                    // Keep placeholder, attach meatball
                    this.meatballManager.attachTo(this.model);
                });
            }

            setState(newState) {
                if (this.currentState === newState) return;
                console.log(`Transitioning: ${this.currentState} -> ${newState}`);
                
                // Cross-fading logic (stubbed for when animations are loaded)
                if (this.mixer && this.animations[newState] && this.animations[this.currentState]) {
                    const prevAction = this.animations[this.currentState];
                    const nextAction = this.animations[newState];
                    nextAction.reset().play();
                    nextAction.crossFadeFrom(prevAction, 0.3, true);
                }
                
                this.currentState = newState;
                document.getElementById('debug-info').innerHTML = `Height: ${this.model.position.y.toFixed(2)}<br>State: ${this.currentState}`;
            }

            update(dt, time, moveSpeed) {
                if (this.mixer) {
                    // Sync climb animation speed with movement
                    if (this.currentState === 'CLIMB' && this.animations['CLIMB']) {
                        this.animations['CLIMB'].timeScale = moveSpeed > 0 ? 1.5 : (moveSpeed < 0 ? -1.5 : 0);
                    }
                    this.mixer.update(dt);
                }
                
                // Update placeholder shader time
                if(this.mesh && this.mesh.material.uniforms) {
                    this.mesh.material.uniforms.time.value = time;
                }
            }
        }

        // --- 5. Firebase Stub ---
        class FirebaseStub {
            constructor() {
                this.db = {}; // Mock DB
            }
            
            getCurrentMonthKey() {
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                return `stats/${year}-${month}/global_death_count`;
            }

            async getGlobalDeathCount() {
                const key = this.getCurrentMonthKey();
                console.log(`[Firebase] Fetching ${key}`);
                // Simulate network delay
                return new Promise(resolve => {
                    setTimeout(() => resolve(this.db[key] || 0), 500);
                });
            }

            async incrementDeathCount() {
                const key = this.getCurrentMonthKey();
                this.db[key] = (this.db[key] || 0) + 1;
                console.log(`[Firebase] Incremented ${key} to ${this.db[key]}`);
                return this.db[key];
            }
        }

        // --- 2. Game Loop & Mechanics ---
        const initGame = async () => {
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            scene.background = null; // Transparent for AR

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 5);

            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            // Lighting
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);
            const ambLight = new THREE.AmbientLight(0x404040);
            scene.add(ambLight);

            // Systems
            const firebase = new FirebaseStub();
            const meatballManager = new MeatballManager(scene);
            const character = new GameCharacter(scene, meatballManager);

            // Fetch initial stats
            const initialDeaths = await firebase.getGlobalDeathCount();
            meatballManager.scaleBasedOnGlobalCount(initialDeaths);

            // Input State
            const input = { y: 0, jumpPressed: false };

            // Joystick Logic (Simple vertical for climbing)
            const joystickZone = document.getElementById('joystick-zone');
            const joystickKnob = document.getElementById('joystick-knob');
            let isDragging = false;
            let startY = 0;

            joystickZone.addEventListener('pointerdown', (e) => {
                isDragging = true;
                startY = e.clientY;
                joystickKnob.style.background = 'rgba(255,255,255,0.8)';
            });
            window.addEventListener('pointermove', (e) => {
                if (!isDragging) return;
                const deltaY = e.clientY - startY;
                const clampedY = Math.max(-35, Math.min(35, deltaY));
                joystickKnob.style.transform = `translateY(${clampedY}px)`;
                input.y = -clampedY / 35; // Normalized -1 to 1 (up is positive)
            });
            window.addEventListener('pointerup', () => {
                isDragging = false;
                joystickKnob.style.transform = `translateY(0px)`;
                joystickKnob.style.background = 'rgba(255,255,255,0.5)';
                input.y = 0;
            });

            // Jump Button Logic
            const jumpBtn = document.getElementById('jump-btn');
            jumpBtn.addEventListener('pointerdown', () => {
                input.jumpPressed = true;
                jumpBtn.style.background = 'rgba(255,0,0,0.8)';
            });
            jumpBtn.addEventListener('pointerup', () => {
                input.jumpPressed = false;
                jumpBtn.style.background = 'rgba(255,0,0,0.5)';
            });

            // AR Plane Detection Stub
            const checkARWall = () => {
                // STUB: Return true if looking at a vertical plane
                return true; 
            };

            // Game Loop variables
            const clock = new THREE.Clock();
            let isDead = false;
            let fallVelocity = 0;

            const animate = () => {
                requestAnimationFrame(animate);
                const dt = clock.getDelta();
                const time = clock.getElapsedTime();

                if (!isDead) {
                    const onWall = checkARWall();

                    if (onWall) {
                        if (Math.abs(input.y) > 0.1) {
                            character.setState('CLIMB');
                            // Move character
                            character.model.position.y += input.y * 2.0 * dt;
                            // Prevent going below ground
                            if (character.model.position.y < 0) character.model.position.y = 0;
                        } else {
                            character.setState('IDLE');
                        }
                    } else {
                        character.setState('IDLE');
                    }

                    // Height Check & Jump
                    const heightLimit = 5 * character.modelHeight;
                    if (character.model.position.y > heightLimit && input.jumpPressed) {
                        character.setState('JUMP');
                        isDead = true;
                        fallVelocity = 5; // Initial jump up velocity
                        
                        // Increment death count
                        firebase.incrementDeathCount().then(count => {
                            meatballManager.scaleBasedOnGlobalCount(count);
                        });
                    }
                    
                    document.getElementById('debug-info').innerHTML = `Height: ${character.model.position.y.toFixed(2)}<br>State: ${character.currentState}`;

                } else {
                    // Physics fall logic
                    fallVelocity -= 9.8 * dt; // Gravity
                    character.model.position.y += fallVelocity * dt;
                    
                    // Reset on hit ground
                    if (character.model.position.y <= 0) {
                        character.model.position.y = 0;
                        isDead = false;
                        character.setState('IDLE');
                    }
                }

                character.update(dt, time, input.y);
                meatballManager.update(time);

                renderer.render(scene, camera);
            };

            // Handle Resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        };

        // Start game when DOM is ready
        initGame();
    </script>
</body>
</html>
