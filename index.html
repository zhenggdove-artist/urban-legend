// ===== VHS noise =====
const noiseCanvas = document.getElementById('vhs-noise');
const noiseCtx = noiseCanvas.getContext('2d');
let noiseFrame = 0;
function updateNoise() {
  noiseFrame++;
  if (noiseFrame % 3 !== 0) return;
  const w = 64, h = 64;
  noiseCanvas.width = w; noiseCanvas.height = h;
  const img = noiseCtx.createImageData(w, h);
  const d = img.data;
  for (let i=0; i<d.length; i+=4) {
    const v = Math.random()*255;
    d[i]=d[i+1]=d[i+2]=v; d[i+3]=50;
  }
  noiseCtx.putImageData(img, 0, 0);
}

// ===== Persistence / API =====
const API_BASE = localStorage.getItem('PLANT_API_URL') || '';
const STORAGE_KEY = 'urban_legend_plants_v1';
async function loadEntries() {
  if (API_BASE) {
    try {
      const res = await fetch(API_BASE + '/api/entries');
      if (res.ok) return await res.json();
    } catch (e) {}
  }
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return [];
  try { return JSON.parse(raw); } catch { return []; }
}
async function saveEntry(entry) {
  if (API_BASE) {
    try {
      await fetch(API_BASE + '/api/entries', {
        method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(entry)
      });
    } catch (e) {}
  }
  const list = await loadEntries();
  list.push(entry);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

// ===== Text -> DNA (deterministic) =====
function hashString(str) {
  let h = 2166136261;
  for (let i=0;i<str.length;i++) {
    h ^= str.charCodeAt(i);
    h += (h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24);
  }
  return h >>> 0;
}
function seededRandom(seed) {
  let s = seed >>> 0;
  return () => {
    s = (s * 1664525 + 1013904223) >>> 0;
    return (s & 0xffffffff) / 0x100000000;
  };
}
function pick(arr, r) { return arr[Math.floor(r()*arr.length)]; }
function randColor(r) {
  const h = Math.floor(r()*360);
  const s = 60 + Math.floor(r()*30);
  const l = 40 + Math.floor(r()*30);
  return `hsl(${h},${s}%,${l}%)`;
}

function generateDNAFromText(text) {
  const seed = hashString(text);
  const r = seededRandom(seed);
  const plantType = pick(['vine','fern','fungus','flower_stalk','bush'], r);
  const complexity = 2 + Math.floor(r()*8);
  const growthDirection = { x: r()*2-1, y: r()*0.8+0.2, z: r()*2-1 };
  const stemColor = randColor(r);
  const leafColor = randColor(r);
  const fruitColor = randColor(r);
  const hasLeaves = r() > 0.3;
  const hasFruits = r() > 0.45;
  const fruitType = pick(['eyeball','mouth','glowing_orb','generic','fungus_cap','giant_flower'], r);
  const leafType = pick(['fern','broad','needle'], r);
  return { name:'Mutation', description:'', plantType, complexity, growthDirection, stemColor, leafColor, fruitColor, hasLeaves, hasFruits, fruitType, leafType };
}

// ===== Procedural plant =====
function generateProceduralPlant(dna) {
  const stems = [];
  const fruits = [];
  const leaves = [];
  const startPt = new THREE.Vector3(0,0,0);
  const dir = new THREE.Vector3(dna.growthDirection.x, dna.growthDirection.y, dna.growthDirection.z).normalize();
  if (dir.lengthSq() === 0) dir.set(0,1,0);
  const length = 10 + dna.complexity * 1.5;
  let endPt = startPt.clone();

  const generateCurve = (start, direction, len, waviness, segments) => {
    const curve = [];
    let current = start.clone();
    curve.push({ x: current.x, y: current.y, z: current.z });
    const step = len / segments;
    let perp1 = new THREE.Vector3(1,0,0).cross(direction).normalize();
    if (perp1.lengthSq() < 0.1) perp1 = new THREE.Vector3(0,1,0).cross(direction).normalize();
    const perp2 = direction.clone().cross(perp1).normalize();
    for (let i=1;i<=segments;i++) {
      const t = i/segments;
      current.add(direction.clone().multiplyScalar(step));
      const wave1 = Math.sin(t*Math.PI*4) * waviness * (1-t);
      const wave2 = Math.cos(t*Math.PI*3) * waviness * (1-t);
      const offset = perp1.clone().multiplyScalar(wave1).add(perp2.clone().multiplyScalar(wave2));
      const pt = current.clone().add(offset);
      if (direction.y < 0.5) pt.y -= t*t*2;
      curve.push({ x: pt.x, y: pt.y, z: pt.z });
    }
    return { curve, end: current };
  };

  if (dna.plantType === 'vine' || dna.plantType === 'flower_stalk') {
    const { curve, end } = generateCurve(startPt, dir, length, 2, 20);
    stems.push(curve); endPt = end;
    const numBranches = Math.floor(dna.complexity/2);
    for (let i=0;i<numBranches;i++) {
      const t = 0.2 + Math.random()*0.6;
      const idx = Math.floor(t*curve.length);
      const branchStart = new THREE.Vector3(curve[idx].x, curve[idx].y, curve[idx].z);
      const branchDir = dir.clone().applyAxisAngle(new THREE.Vector3(Math.random(),Math.random(),Math.random()).normalize(), Math.PI/3).normalize();
      const branchLen = length * 0.4 * Math.random();
      const { curve: bCurve, end: bEnd } = generateCurve(branchStart, branchDir, branchLen, 1, 10);
      stems.push(bCurve);
      if (dna.hasLeaves && Math.random()>0.3) leaves.push({ position: bEnd, direction: branchDir, type: dna.leafType, color: dna.leafColor, scale: 1 });
      if (dna.hasFruits && Math.random()>0.6) fruits.push({ position: bEnd, direction: branchDir, type: dna.fruitType, color: dna.fruitColor, scale: 0.8 });
    }
    if (dna.hasFruits || dna.plantType==='flower_stalk') {
      fruits.push({ position: endPt, direction: dir, type: dna.plantType==='flower_stalk'?'giant_flower':dna.fruitType, color: dna.fruitColor, scale: 1.5 });
    }
  } else if (dna.plantType === 'bush' || dna.plantType === 'fern') {
    const numStems = 3 + Math.floor(dna.complexity/2);
    let highestY = -Infinity;
    for (let i=0;i<numStems;i++) {
      const spreadDir = dir.clone().applyAxisAngle(new THREE.Vector3(0,1,0), (i/numStems)*Math.PI*2 + Math.random()*0.5);
      spreadDir.y += 0.5; spreadDir.normalize();
      const { curve, end } = generateCurve(startPt, spreadDir, length*(0.6+Math.random()*0.4), 1.5, 15);
      stems.push(curve);
      if (end.y > highestY) { highestY = end.y; endPt = end; }
      if (dna.plantType==='fern' && dna.hasLeaves) {
        for (let j=2;j<curve.length-1;j+=2) {
          const p = curve[j];
          const pDir = new THREE.Vector3(p.x-curve[j-1].x, p.y-curve[j-1].y, p.z-curve[j-1].z).normalize();
          const side1 = pDir.clone().cross(new THREE.Vector3(0,1,0)).normalize();
          const side2 = side1.clone().negate();
          leaves.push({ position:p, direction:side1, type:'fern', color:dna.leafColor, scale:0.5*(1-j/curve.length) });
          leaves.push({ position:p, direction:side2, type:'fern', color:dna.leafColor, scale:0.5*(1-j/curve.length) });
        }
      } else if (dna.hasLeaves) {
        leaves.push({ position:end, direction:spreadDir, type:dna.leafType, color:dna.leafColor, scale:1.2 });
      }
      if (dna.hasFruits && Math.random()>0.7) fruits.push({ position:end, direction:spreadDir, type:dna.fruitType, color:dna.fruitColor, scale:1 });
    }
  } else if (dna.plantType === 'fungus') {
    const { curve, end } = generateCurve(startPt, dir, length*0.5, 0.5, 10);
    stems.push(curve); endPt = end;
    fruits.push({ position:end, direction:dir, type:'fungus_cap', color:dna.fruitColor, scale:2 + dna.complexity*0.2 });
    const numSmall = Math.floor(dna.complexity/3);
    for (let i=0;i<numSmall;i++) {
      const offset = new THREE.Vector3((Math.random()-0.5)*4, 0, (Math.random()-0.5)*4);
      const { curve: sCurve, end: sEnd } = generateCurve(startPt.clone().add(offset), new THREE.Vector3(0,1,0), length*0.2, 0.2, 5);
      stems.push(sCurve);
      fruits.push({ position:sEnd, direction:new THREE.Vector3(0,1,0), type:'fungus_cap', color:dna.fruitColor, scale:0.8 });
    }
  }
  return { stems, fruits, leaves, endPoint:{ x:endPt.x, y:endPt.y, z:endPt.z } };
}

function buildPlantPartMesh(part) {
  const group = new THREE.Group();
  group.position.set(part.startX, part.startY, part.startZ);
  // stems
  for (let i=0;i<part.stems.length;i++) {
    const stem = part.stems[i];
    if (stem.length < 2) continue;
    const curve = new THREE.CatmullRomCurve3(stem.map(p=>new THREE.Vector3(p.x,p.y,p.z)));
    const radius = Math.max(0.05, 0.18 - (part.stems.length * 0.008));
    const geo = new THREE.TubeGeometry(curve, 64, radius, 10, false);
    const mat = new THREE.MeshStandardMaterial({ color: part.stemColor, roughness:0.5, metalness:0.2, emissive: new THREE.Color(part.stemColor).multiplyScalar(0.1) });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.castShadow = true; mesh.receiveShadow = true;
    mesh.userData.entryText = part.textInput;
    group.add(mesh);
  }
  // fruits
  for (const f of part.fruits) {
    const pos = new THREE.Vector3(f.position.x, f.position.y, f.position.z);
    const dir = new THREE.Vector3(f.direction.x, f.direction.y, f.direction.z).normalize();
    const quat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
    const fruitGroup = new THREE.Group();
    fruitGroup.position.copy(pos); fruitGroup.quaternion.copy(quat); fruitGroup.scale.setScalar(f.scale||1);
    const mat = new THREE.MeshStandardMaterial({ color: f.color, roughness:0.3, metalness:0.4, emissive: new THREE.Color(f.color).multiplyScalar(0.4) });
    if (f.type === 'fungus_cap') {
      const cap = new THREE.Mesh(new THREE.SphereGeometry(1.2, 20, 16), mat);
      cap.scale.set(1,0.4,1); fruitGroup.add(cap);
    } else if (f.type === 'giant_flower') {
      for (let i=0;i<10;i++) {
        const petal = new THREE.Mesh(new THREE.SphereGeometry(0.8, 16, 12), mat);
        petal.scale.set(0.3,0.08,1.1);
        petal.position.set(1.1,0,0);
        petal.rotation.z = 0.2;
        petal.rotation.y = (i/10)*Math.PI*2;
        fruitGroup.add(petal);
      }
      const core = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 12), new THREE.MeshStandardMaterial({ color:'#ffd200', emissive:'#ffd200', emissiveIntensity:1 }));
      fruitGroup.add(core);
    } else {
      const orb = new THREE.Mesh(new THREE.SphereGeometry(0.7, 16, 12), mat);
      fruitGroup.add(orb);
    }
    fruitGroup.userData.entryText = part.textInput;
    group.add(fruitGroup);
  }
  // leaves
  for (const l of part.leaves) {
    const pos = new THREE.Vector3(l.position.x, l.position.y, l.position.z);
    const dir = new THREE.Vector3(l.direction.x, l.direction.y, l.direction.z).normalize();
    const quat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0), dir);
    const leaf = new THREE.Mesh(new THREE.ConeGeometry(0.2, 1.2, 8), new THREE.MeshStandardMaterial({ color:l.color, roughness:0.5, metalness:0.2 }));
    leaf.position.copy(pos); leaf.quaternion.copy(quat); leaf.scale.setScalar(l.scale||1);
    leaf.userData.entryText = part.textInput;
    group.add(leaf);
  }
  return group;
}

// ===== Character =====
class GameCharacter {
  constructor(scene) {
    this.scene = scene;
    this.root = new THREE.Group();
    scene.add(this.root);
    this.mixer = null;
    this.anims = {};
    this.curAction = null;
    this.curState = 'IDLE';
    this.charHeight = 0.066;
    this.loaded = false;
    this.drinkDuration = 1.0;
  }
  async load() {
    const gl = new GLTFLoader();
    const dr = new DRACOLoader();
    dr.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');
    gl.setDRACOLoader(dr);
    const fbx = new FBXLoader();
    const texLoader = new THREE.TextureLoader();
    let skinTex = null;
    try { skinTex = await new Promise((r,j)=>texLoader.load('./playermodel/tripo_model_basecolor.JPEG',r,undefined,j)); } catch {}
    if (skinTex) { skinTex.flipY=false; skinTex.colorSpace = THREE.SRGBColorSpace; }

    const load = url => new Promise((r,j)=>gl.load(url,g=>r(g),undefined,e=>j(e)));
    const idleG = await load('./playermodel/idle.glb');
    const model = idleG.scene;
    const box = new THREE.Box3().setFromObject(model);
    const origH = box.getSize(new THREE.Vector3()).y;
    const sc = this.charHeight / origH;
    model.scale.setScalar(sc);
    const box2 = new THREE.Box3().setFromObject(model);
    model.position.y = -box2.min.y;
    model.traverse(c=>{
      if (c.isMesh) {
        c.material = new THREE.MeshStandardMaterial({ map: skinTex || null, roughness:0.8, metalness:0.1 });
        c.frustumCulled = false;
      }
    });
    this.model3D = model;
    this.root.add(model);
    this.mixer = new THREE.AnimationMixer(model);
    const strip = clip => { clip.tracks = clip.tracks.filter(t=>!/(Hips|RootNode)\.(position|quaternion)/i.test(t.name)); };
    if (idleG.animations.length) {
      strip(idleG.animations[0]);
      this.anims['IDLE'] = this.mixer.clipAction(idleG.animations[0]);
      this.anims['IDLE'].play();
      this.curAction = this.anims['IDLE'];
    }
    const jumpG = await load('./playermodel/jump.glb');
    if (jumpG.animations.length) {
      strip(jumpG.animations[0]);
      this.anims['JUMP'] = this.mixer.clipAction(jumpG.animations[0]);
      this.anims['JUMP'].setLoop(THREE.LoopOnce);
      this.anims['JUMP'].clampWhenFinished = true;
    }
    // Drinking FBX
    try {
      const drinkFbx = await new Promise((r,j)=>fbx.load('./playermodel/Drinking.fbx', r, undefined, j));
      if (drinkFbx.animations && drinkFbx.animations.length) {
        strip(drinkFbx.animations[0]);
        this.anims['DRINK'] = this.mixer.clipAction(drinkFbx.animations[0]);
        this.anims['DRINK'].setLoop(THREE.LoopOnce);
        this.anims['DRINK'].clampWhenFinished = true;
        this.drinkDuration = drinkFbx.animations[0].duration || this.drinkDuration;
      }
    } catch(e) {}

    this.loaded = true;
  }
  setState(s) {
    if (this.curState === s) return;
    this.curState = s;
    if (!this.mixer) return;
    const next = this.anims[s];
    if (!next) return;
    if (this.curAction && this.curAction !== next) {
      next.reset().play();
      next.crossFadeFrom(this.curAction, 0.2, true);
    } else next.reset().play();
    this.curAction = next;
  }
  update(dt) {
    if (this.mixer) this.mixer.update(dt);
  }
}

const character = new GameCharacter(scene);
await character.load();

// ===== Plant system =====
const plantRoot = new THREE.Group();
plantRoot.scale.setScalar(0.12);
scene.add(plantRoot);
const plantParts = [];

function addPlantPart(part, grow=true) {
  const mesh = buildPlantPartMesh(part);
  mesh.userData.partId = part.id;
  mesh.userData.entryText = part.textInput;
  if (grow) {
    mesh.userData.grow = 0;
    mesh.scale.setScalar(0.01);
  }
  plantRoot.add(mesh);
  plantParts.push({ data: part, mesh });
}

async function loadSavedPlants() {
  const entries = await loadEntries();
  let startX=0, startY=0, startZ=0;
  for (const entry of entries) {
    const part = entry.part;
    part.startX = startX; part.startY = startY; part.startZ = startZ;
    addPlantPart(part, false);
    startX += part.endPoint.x; startY += part.endPoint.y; startZ += part.endPoint.z;
  }
}
await loadSavedPlants();

// ===== Light burst =====
class LightBurst {
  constructor(scene) {
    this.points = [];
    this.geo = new THREE.BufferGeometry();
    this.mat = new THREE.PointsMaterial({ color:0xffe55a, size:0.06, transparent:true, opacity:1, depthWrite:false });
    this.mesh = new THREE.Points(this.geo, this.mat);
    scene.add(this.mesh);
  }
  burst(pos) {
    this.points = [];
    for (let i=0;i<200;i++) {
      const v = new THREE.Vector3((Math.random()-0.5)*1.2, Math.random()*1.2, (Math.random()-0.5)*1.2);
      this.points.push({ pos: pos.clone(), vel: v, life: 1 + Math.random()*0.6 });
    }
  }
  update(dt) {
    const verts = [];
    for (const p of this.points) {
      p.life -= dt;
      if (p.life <= 0) continue;
      p.vel.y -= dt*0.8;
      p.pos.add(p.vel.clone().multiplyScalar(dt));
      verts.push(p.pos.x, p.pos.y, p.pos.z);
    }
    this.points = this.points.filter(p=>p.life>0);
    this.geo.setAttribute('position', new THREE.Float32BufferAttribute(verts,3));
    this.geo.computeBoundingSphere();
    this.mat.opacity = this.points.length ? 0.9 : 0;
  }
}
const lightBurst = new LightBurst(scene);
let lightRing = null;
function spawnLightRing(pos) {
  if (lightRing) scene.remove(lightRing);
  const geo = new THREE.TorusGeometry(0.6, 0.05, 16, 48);
  const mat = new THREE.MeshStandardMaterial({ color:0xffe55a, emissive:0xffe55a, emissiveIntensity:1.5, transparent:true, opacity:0.8 });
  lightRing = new THREE.Mesh(geo, mat);
  lightRing.position.copy(pos);
  lightRing.rotation.x = Math.PI/2;
  lightRing.userData.grow = 0;
  scene.add(lightRing);
}

// ===== Camera controls =====
let orbitYaw = 0;
let orbitPitch = 0.25;
let orbitRadius = 6;
let orbitTarget = new THREE.Vector3(0, rooftopY, 0);
let userInteracting = false;
let interactionTimer = 0;

const pointers = new Map();
let dragStart = { x:0, y:0, yaw:0, pitch:0 };
let pinchStartDist = 0;
let pinchStartRadius = 6;

function dist(a,b){ return Math.hypot(a.x-b.x,a.y-b.y); }

renderer.domElement.addEventListener('pointerdown', e=>{
  pointers.set(e.pointerId, { x:e.clientX, y:e.clientY });
  renderer.domElement.setPointerCapture(e.pointerId);
  userInteracting = true;
  interactionTimer = 0;
  if (pointers.size===1) {
    dragStart = { x:e.clientX, y:e.clientY, yaw:orbitYaw, pitch:orbitPitch };
  } else if (pointers.size===2) {
    const pts=[...pointers.values()];
    pinchStartDist = dist(pts[0], pts[1]);
    pinchStartRadius = orbitRadius;
  }
});
renderer.domElement.addEventListener('pointermove', e=>{
  if (!pointers.has(e.pointerId)) return;
  pointers.set(e.pointerId, { x:e.clientX, y:e.clientY });
  userInteracting = true;
  interactionTimer = 0;
  if (pointers.size===1) {
    const dx = e.clientX - dragStart.x;
    const dy = e.clientY - dragStart.y;
    orbitYaw = dragStart.yaw + dx/W()*2.2;
    orbitPitch = clamp(dragStart.pitch + dy/H()*1.4, -0.2, 1.2);
  } else if (pointers.size>=2) {
    const pts=[...pointers.values()];
    const d = dist(pts[0], pts[1]);
    if (pinchStartDist>0) orbitRadius = clamp(pinchStartRadius * (pinchStartDist / d), 3.5, 12);
  }
});
renderer.domElement.addEventListener('pointerup', e=>{ pointers.delete(e.pointerId); });
renderer.domElement.addEventListener('pointercancel', e=>{ pointers.delete(e.pointerId); });

function updateCamera() {
  const cx = orbitTarget.x + orbitRadius * Math.cos(orbitPitch) * Math.sin(orbitYaw);
  const cz = orbitTarget.z + orbitRadius * Math.cos(orbitPitch) * Math.cos(orbitYaw);
  const cy = orbitTarget.y + orbitRadius * Math.sin(orbitPitch);
  camera.position.set(cx, cy, cz);
  camera.lookAt(orbitTarget);
}

// ===== Game flow =====
const uiPanel = document.getElementById('ui-panel');
const leaveBtn = document.getElementById('leave-btn');
const textInput = document.getElementById('text-input');
const popup = document.getElementById('text-popup');

let phase = 'INTRO';
let timer = 0;
let pendingText = '';
let fallVel = 0;

function worldToScreen(p) {
  const v = p.clone().project(camera);
  return { x: (v.x*0.5+0.5)*W(), y: (-v.y*0.5+0.5)*H() };
}

function startLeave() {
  const text = textInput.value.trim();
  if (!text) return;
  pendingText = text;
  textInput.value = '';
  // animate UI into hand
  const handPos = character.root.position.clone().add(new THREE.Vector3(0, character.charHeight*0.7, 0));
  const screen = worldToScreen(handPos);
  const dx = screen.x - W()/2;
  const dy = screen.y - H()/2;
  uiPanel.style.setProperty('--to-x', `${dx}px`);
  uiPanel.style.setProperty('--to-y', `${dy}px`);
  uiPanel.classList.add('leaving');
  phase = 'UI_SHRINK';
  timer = 0;
}
leaveBtn.addEventListener('click', startLeave);

// Plant text popup
const raycaster = new THREE.Raycaster();
renderer.domElement.addEventListener('pointerdown', e=>{
  if (!plantRoot.children.length) return;
  const rect = renderer.domElement.getBoundingClientRect();
  const nx = ((e.clientX - rect.left)/rect.width)*2-1;
  const ny = -((e.clientY - rect.top)/rect.height)*2+1;
  raycaster.setFromCamera({x:nx,y:ny}, camera);
  const hits = raycaster.intersectObjects(plantRoot.children, true);
  if (hits.length) {
    let obj = hits[0].object;
    while (obj && !obj.userData.entryText) obj = obj.parent;
    if (obj && obj.userData.entryText) {
      popup.textContent = obj.userData.entryText;
      popup.classList.add('show');
      setTimeout(()=>popup.classList.remove('show'), 4000);
    }
  }
});

// Start camera
async function startCamera() {
  try {
    const v = document.getElementById('camera-video');
    v.srcObject = await navigator.mediaDevices.getUserMedia({ video:{facingMode:{ideal:'environment'}}, audio:false });
    await v.play();
  } catch (e) {}
}
await startCamera();

// Initialize positions
character.root.position.set(0, rooftopY, 0);
orbitTarget = character.root.position.clone();

// Load done
document.getElementById('loading').style.display = 'none';

const clock = new THREE.Clock();
function tick() {
  requestAnimationFrame(tick);
  const dt = Math.min(clock.getDelta(), 0.05);
  timer += dt;
  interactionTimer += dt;
  if (interactionTimer > 1.2) userInteracting = false;

  // update camera target and default framing
  if (phase === 'INTRO' || phase === 'UI_SHRINK' || phase === 'DRINK') {
    orbitTarget.copy(character.root.position).add(new THREE.Vector3(0, 0.05, 0));
    if (!userInteracting) {
      orbitPitch += (0.25 - orbitPitch) * 0.05;
      orbitRadius += (6 - orbitRadius) * 0.05;
    }
  } else if (phase === 'JUMP' || phase === 'IMPACT') {
    orbitTarget.set(0, 1.0, 0);
    if (!userInteracting) {
      orbitPitch += (-0.15 - orbitPitch) * 0.05;
      orbitRadius += (7.5 - orbitRadius) * 0.05;
    }
  } else {
    orbitTarget.set(0, 0.6, 0);
    if (!userInteracting) {
      orbitPitch += (0.1 - orbitPitch) * 0.05;
      orbitRadius += (6.5 - orbitRadius) * 0.05;
    }
  }

  // state machine
  if (phase === 'UI_SHRINK' && timer > 0.6) {
    uiPanel.classList.add('hidden');
    phase = 'DRINK';
    timer = 0;
    character.setState(character.anims['DRINK'] ? 'DRINK' : 'IDLE');
  }
  if (phase === 'DRINK' && timer > (character.drinkDuration||1)) {
    phase = 'JUMP';
    timer = 0;
    character.setState(character.anims['JUMP'] ? 'JUMP' : 'IDLE');
    fallVel = 0.8;
  }
  if (phase === 'JUMP') {
    fallVel -= 1.2 * dt;
    character.root.position.y += fallVel * dt;
    if (character.root.position.y <= 0.05) {
      character.root.position.y = 0.05;
      phase = 'IMPACT';
      timer = 0;
      // light burst
      const impactPos = new THREE.Vector3(0, 0.05, 0);
      lightBurst.burst(impactPos);
      spawnLightRing(impactPos.clone().add(new THREE.Vector3(0,0.1,0)));
      // generate new plant
      const dna = generateDNAFromText(pendingText);
      const gen = generateProceduralPlant(dna);
      let startX=0, startY=0, startZ=0;
      if (plantParts.length) {
        const last = plantParts[plantParts.length-1].data;
        startX = last.startX + last.endPoint.x;
        startY = last.startY + last.endPoint.y;
        startZ = last.startZ + last.endPoint.z;
      }
      const part = {
        id: Date.now().toString(),
        textInput: pendingText,
        stems: gen.stems,
        fruits: gen.fruits,
        leaves: gen.leaves,
        stemColor: dna.stemColor,
        startX, startY, startZ,
        endPoint: gen.endPoint
      };
      addPlantPart(part, true);
      saveEntry({ text: pendingText, part });
    }
  }
  if (phase === 'IMPACT') {
    if (lightRing) {
      lightRing.userData.grow += dt;
      const g = clamp(lightRing.userData.grow/2, 0, 1);
      lightRing.scale.setScalar(0.3 + g*1.4);
      lightRing.position.y = 0.1 + g*0.8;
      lightRing.material.opacity = 0.8 - g*0.5;
      if (g >= 1) {
        phase = 'PLANT_VIEW';
      }
    }
  }

  // grow new plant part
  for (const p of plantParts) {
    if (p.mesh.userData.grow !== undefined) {
      p.mesh.userData.grow = Math.min(1, p.mesh.userData.grow + dt*0.6);
      const s = 0.01 + p.mesh.userData.grow * 0.99;
      p.mesh.scale.setScalar(s);
      if (p.mesh.userData.grow >= 1) delete p.mesh.userData.grow;
    }
  }

  character.update(dt);
  updateCamera();
  lightBurst.update(dt);
  updateNoise();
  renderer.setSize(W(), H());
  camera.aspect = W()/H();
  camera.updateProjectionMatrix();
  renderer.render(scene, camera);
}

window.addEventListener('resize', ()=>{
  renderer.setSize(W(),H());
  camera.aspect=W()/H();
  camera.updateProjectionMatrix();
});

// Move character to rooftop when building loads
const checkReady = setInterval(()=>{
  if (building && character.loaded) {
    character.root.position.set(0, rooftopY, 0);
    orbitTarget.copy(character.root.position);
    clearInterval(checkReady);
  }
}, 200);

// leave button enable
textInput.addEventListener('input', ()=>{
  leaveBtn.disabled = !textInput.value.trim();
});
leaveBtn.disabled = true;

tick();
</script>
