<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>都市傳說 - WebAR Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background-color: #000; touch-action: none; }

        /* Camera background */
        #camera-video {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; z-index: 0;
        }

        /* Three.js canvas on top of camera */
        #canvas-container {
            width: 100vw; height: 100vh;
            position: absolute; top: 0; left: 0; z-index: 1;
        }

        /* Paper Texture Overlay */
        #paper-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 10; opacity: 0.15; mix-blend-mode: multiply;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.5"/></svg>');
        }

        /* UI Elements */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 20;
        }
        #joystick-zone {
            position: absolute; bottom: 40px; left: 40px;
            width: 120px; height: 120px;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            pointer-events: auto; touch-action: none;
        }
        #joystick-knob {
            position: absolute; top: 35px; left: 35px;
            width: 50px; height: 50px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            transition: background 0.1s;
        }
        #jump-btn {
            position: absolute; bottom: 40px; right: 40px;
            width: 90px; height: 90px;
            background: rgba(220, 40, 40, 0.6);
            border: 2px solid rgba(255,100,100,0.5);
            border-radius: 50%;
            pointer-events: auto;
            display: flex; justify-content: center; align-items: center;
            color: white; font-family: sans-serif; font-size: 16px; font-weight: bold;
            user-select: none;
            transition: transform 0.1s, background 0.1s;
        }
        #jump-btn:active, #jump-btn.pressed {
            transform: scale(0.9);
            background: rgba(255, 60, 60, 0.9);
        }
        #debug-info {
            position: absolute; top: 10px; left: 10px;
            color: white; font-family: monospace; font-size: 12px;
            background: rgba(0,0,0,0.5); padding: 8px; border-radius: 4px;
            line-height: 1.5;
        }
        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); z-index: 100;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: white; font-family: sans-serif;
        }
        #loading-screen h2 { margin-bottom: 20px; }
        #loading-bar-bg {
            width: 200px; height: 8px; background: rgba(255,255,255,0.2);
            border-radius: 4px; overflow: hidden;
        }
        #loading-bar {
            width: 0%; height: 100%; background: #ff4444;
            border-radius: 4px; transition: width 0.3s;
        }
        #loading-status { margin-top: 10px; font-size: 14px; opacity: 0.7; }
        #start-btn {
            display: none; margin-top: 20px; padding: 12px 40px;
            background: #ff4444; color: white; border: none; border-radius: 8px;
            font-size: 18px; font-weight: bold; cursor: pointer;
        }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <video id="camera-video" autoplay playsinline muted></video>
    <div id="paper-overlay"></div>
    <div id="canvas-container"></div>
    <div id="ui-layer">
        <div id="debug-info">Loading...</div>
        <div id="joystick-zone"><div id="joystick-knob"></div></div>
        <div id="jump-btn">JUMP</div>
    </div>
    <div id="loading-screen">
        <h2>都市傳說</h2>
        <div id="loading-bar-bg"><div id="loading-bar"></div></div>
        <div id="loading-status">初始化中...</div>
        <button id="start-btn">開始遊戲</button>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import { FBXLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/FBXLoader.js';

        // ========== Loading UI ==========
        const loadingBar = document.getElementById('loading-bar');
        const loadingStatus = document.getElementById('loading-status');
        const loadingScreen = document.getElementById('loading-screen');
        const startBtn = document.getElementById('start-btn');
        let loadProgress = { camera: 0, idle: 0, climb: 0, jump: 0 };

        function updateLoadingBar() {
            const total = (loadProgress.camera + loadProgress.idle + loadProgress.climb + loadProgress.jump) / 4;
            loadingBar.style.width = total + '%';
        }

        // ========== 1. Camera AR Background ==========
        async function startCamera() {
            const video = document.getElementById('camera-video');
            loadingStatus.textContent = '正在啟動相機...';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
                video.srcObject = stream;
                await video.play();
                loadProgress.camera = 100;
                updateLoadingBar();
                loadingStatus.textContent = '相機已啟動';
                return true;
            } catch (err) {
                console.warn('Camera not available:', err);
                // Fallback: show a dark gradient background
                video.style.display = 'none';
                document.body.style.background = 'linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)';
                loadProgress.camera = 100;
                updateLoadingBar();
                loadingStatus.textContent = '無法開啟相機，使用模擬背景';
                return false;
            }
        }

        // ========== 2. NPR Hand-drawn Shader ==========
        const nprVertexShader = `
            uniform float time;
            varying vec3 vNormal;
            varying vec3 vViewPosition;

            float hash(float n) { return fract(sin(n) * 1e4); }
            float noise(vec3 x) {
                const vec3 step = vec3(110, 241, 171);
                vec3 i = floor(x); vec3 f = fract(x);
                float n = dot(i, step);
                vec3 u = f * f * (3.0 - 2.0 * f);
                return mix(mix(mix(hash(n+dot(step,vec3(0,0,0))),hash(n+dot(step,vec3(1,0,0))),u.x),
                               mix(hash(n+dot(step,vec3(0,1,0))),hash(n+dot(step,vec3(1,1,0))),u.x),u.y),
                           mix(mix(hash(n+dot(step,vec3(0,0,1))),hash(n+dot(step,vec3(1,0,1))),u.x),
                               mix(hash(n+dot(step,vec3(0,1,1))),hash(n+dot(step,vec3(1,1,1))),u.x),u.y),u.z);
            }
            void main() {
                vNormal = normalize(normalMatrix * normal);
                float jitterAmount = 0.02;
                vec3 jitteredPos = position + normal * (noise(position * 10.0 + time * 5.0) - 0.5) * jitterAmount;
                vec4 mvPosition = modelViewMatrix * vec4(jitteredPos, 1.0);
                vViewPosition = -mvPosition.xyz;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const nprFragmentShader = `
            uniform vec3 color;
            uniform vec3 lightDir;
            varying vec3 vNormal;
            varying vec3 vViewPosition;
            void main() {
                vec3 normal = normalize(vNormal);
                vec3 viewDir = normalize(vViewPosition);
                float ndotl = dot(normal, normalize(lightDir));
                float toonLight = ndotl > 0.5 ? 1.0 : (ndotl > 0.0 ? 0.5 : 0.2);
                float rim = 1.0 - max(dot(viewDir, normal), 0.0);
                float outline = smoothstep(0.6, 0.8, rim);
                vec3 finalColor = color * toonLight;
                if (outline > 0.5) finalColor = vec3(0.0);
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        function createNPRMaterial(colorHex) {
            return new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    color: { value: new THREE.Color(colorHex) },
                    lightDir: { value: new THREE.Vector3(1, 1, 1).normalize() }
                },
                vertexShader: nprVertexShader,
                fragmentShader: nprFragmentShader,
                side: THREE.DoubleSide
            });
        }

        // ========== 3. Meatball System ==========
        class MeatballManager {
            constructor(scene) {
                this.scene = scene;
                this.cluster = new THREE.Group();
                this.spheres = [];
                this.baseScale = 1.0;
                const mat = createNPRMaterial(0x8B4513);
                for (let i = 0; i < 5; i++) {
                    const geo = new THREE.SphereGeometry(0.15, 12, 12);
                    const mesh = new THREE.Mesh(geo, mat.clone());
                    mesh.position.set((Math.random()-0.5)*0.3, (Math.random()-0.5)*0.3, (Math.random()-0.5)*0.3);
                    this.cluster.add(mesh);
                    this.spheres.push(mesh);
                }
            }
            attachTo(parent) {
                if (parent) parent.add(this.cluster);
                else this.scene.add(this.cluster);
            }
            update(time) {
                const scale = this.baseScale + Math.sin(time * 3) * 0.1;
                this.cluster.scale.set(scale, scale, scale);
                this.spheres.forEach(s => {
                    if (s.material.uniforms) s.material.uniforms.time.value = time;
                });
            }
            scaleBasedOnGlobalCount(count) {
                this.baseScale = 1.0 + Math.min(count / 100, 3.0);
                const targetSpheres = 5 + Math.floor(count / 10);
                while (this.spheres.length < targetSpheres && this.spheres.length < 20) {
                    const geo = new THREE.SphereGeometry(0.15, 12, 12);
                    const mesh = new THREE.Mesh(geo, createNPRMaterial(0x8B4513));
                    mesh.position.set((Math.random()-0.5)*0.5, (Math.random()-0.5)*0.5, (Math.random()-0.5)*0.5);
                    this.cluster.add(mesh);
                    this.spheres.push(mesh);
                }
            }
        }

        // ========== 4. Game Character with FBX ==========
        class GameCharacter {
            constructor(scene, meatballManager) {
                this.scene = scene;
                this.model = new THREE.Group();
                this.scene.add(this.model);
                this.mixer = null;
                this.animations = {};
                this.currentAction = null;
                this.currentState = 'IDLE';
                this.modelHeight = 2.0;
                this.meatballManager = meatballManager;
                this.loaded = false;

                // Placeholder while FBX loads
                const geo = new THREE.CapsuleGeometry(0.4, 1.2, 8, 16);
                const mat = createNPRMaterial(0xcccccc);
                this.placeholder = new THREE.Mesh(geo, mat);
                this.placeholder.position.y = 1.0;
                this.model.add(this.placeholder);
                this.meatballManager.attachTo(this.model);
            }

            async loadModels() {
                const loader = new FBXLoader();
                const animUrls = {
                    IDLE: './playermodel/Breathing Idle.fbx',
                    CLIMB: './playermodel/Climbing Ladder.fbx',
                    JUMP: './playermodel/Jumping.fbx'
                };

                const loadFBX = (url, progressKey) => {
                    return new Promise((resolve, reject) => {
                        loader.load(url,
                            (obj) => {
                                loadProgress[progressKey] = 100;
                                updateLoadingBar();
                                resolve(obj);
                            },
                            (xhr) => {
                                if (xhr.total > 0) {
                                    loadProgress[progressKey] = (xhr.loaded / xhr.total) * 100;
                                    updateLoadingBar();
                                }
                            },
                            (err) => {
                                loadProgress[progressKey] = 100; // Don't block loading
                                updateLoadingBar();
                                reject(err);
                            }
                        );
                    });
                };

                try {
                    // Load base model (idle)
                    loadingStatus.textContent = '載入角色模型...';
                    const idleObj = await loadFBX(animUrls.IDLE, 'idle');

                    // Remove placeholder
                    this.model.remove(this.placeholder);

                    // Setup the FBX model
                    idleObj.scale.set(0.02, 0.02, 0.02);
                    idleObj.traverse(child => {
                        if (child.isMesh) {
                            child.material = createNPRMaterial(0xbbbbbb);
                            child.castShadow = true;
                        }
                    });

                    this.fbxRoot = idleObj;
                    this.model.add(idleObj);
                    this.mixer = new THREE.AnimationMixer(idleObj);

                    // Idle animation
                    if (idleObj.animations.length > 0) {
                        this.animations['IDLE'] = this.mixer.clipAction(idleObj.animations[0]);
                        this.animations['IDLE'].play();
                        this.currentAction = this.animations['IDLE'];
                    }

                    // Attach meatball to head
                    const headBone = idleObj.getObjectByName('Head')
                        || idleObj.getObjectByName('mixamorigHead')
                        || idleObj.getObjectByName('mixamorig:Head');
                    if (headBone) {
                        this.meatballManager.cluster.parent?.remove(this.meatballManager.cluster);
                        this.meatballManager.attachTo(headBone);
                    }

                    // Load climb and jump animations in parallel
                    loadingStatus.textContent = '載入動畫...';
                    const [climbObj, jumpObj] = await Promise.allSettled([
                        loadFBX(animUrls.CLIMB, 'climb'),
                        loadFBX(animUrls.JUMP, 'jump')
                    ]);

                    if (climbObj.status === 'fulfilled' && climbObj.value.animations.length > 0) {
                        this.animations['CLIMB'] = this.mixer.clipAction(climbObj.value.animations[0]);
                    }
                    if (jumpObj.status === 'fulfilled' && jumpObj.value.animations.length > 0) {
                        this.animations['JUMP'] = this.mixer.clipAction(jumpObj.value.animations[0]);
                        this.animations['JUMP'].setLoop(THREE.LoopOnce);
                        this.animations['JUMP'].clampWhenFinished = true;
                    }

                    this.loaded = true;
                    console.log('All models loaded. Animations:', Object.keys(this.animations));

                } catch (err) {
                    console.error('FBX loading failed:', err);
                    loadingStatus.textContent = '模型載入失敗，使用替代模型';
                    // Keep placeholder
                    loadProgress.idle = 100;
                    loadProgress.climb = 100;
                    loadProgress.jump = 100;
                    updateLoadingBar();
                }
            }

            setState(newState) {
                if (this.currentState === newState) return;
                this.currentState = newState;

                if (this.mixer && this.animations[newState]) {
                    const nextAction = this.animations[newState];
                    if (this.currentAction && this.currentAction !== nextAction) {
                        nextAction.reset();
                        nextAction.play();
                        nextAction.crossFadeFrom(this.currentAction, 0.25, true);
                    } else {
                        nextAction.reset().play();
                    }
                    this.currentAction = nextAction;
                }
            }

            update(dt, time, moveSpeed) {
                if (this.mixer) {
                    if (this.currentState === 'CLIMB' && this.animations['CLIMB']) {
                        this.animations['CLIMB'].timeScale = moveSpeed > 0 ? 1.5 : (moveSpeed < 0 ? -1.5 : 0);
                    }
                    this.mixer.update(dt);
                }
                // Update shader time on all NPR materials
                this.model.traverse(child => {
                    if (child.isMesh && child.material?.uniforms?.time) {
                        child.material.uniforms.time.value = time;
                    }
                });
            }
        }

        // ========== 5. Firebase Stub ==========
        class FirebaseStub {
            constructor() { this.db = {}; }
            getCurrentMonthKey() {
                const now = new Date();
                return `stats/${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}/global_death_count`;
            }
            async getGlobalDeathCount() {
                return this.db[this.getCurrentMonthKey()] || 0;
            }
            async incrementDeathCount() {
                const key = this.getCurrentMonthKey();
                this.db[key] = (this.db[key] || 0) + 1;
                return this.db[key];
            }
        }

        // ========== 6. Main Game ==========
        const initGame = async () => {
            // Start camera first
            const hasCamera = await startCamera();

            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            // Transparent background so camera video shows through

            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2.5, 6);
            camera.lookAt(0, 2, 0);

            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 0); // Fully transparent
            container.appendChild(renderer.domElement);

            // Lighting
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);
            scene.add(new THREE.AmbientLight(0x606060));

            // A subtle ground grid for spatial reference
            const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
            gridHelper.material.opacity = 0.3;
            gridHelper.material.transparent = true;
            scene.add(gridHelper);

            // Systems
            const firebase = new FirebaseStub();
            const meatballManager = new MeatballManager(scene);
            const character = new GameCharacter(scene, meatballManager);

            // Load FBX models
            await character.loadModels();

            const initialDeaths = await firebase.getGlobalDeathCount();
            meatballManager.scaleBasedOnGlobalCount(initialDeaths);

            // Show start button
            loadingStatus.textContent = '準備完成！';
            startBtn.style.display = 'block';

            // Wait for user to tap start
            await new Promise(resolve => {
                startBtn.addEventListener('click', () => {
                    loadingScreen.style.display = 'none';
                    resolve();
                }, { once: true });
            });

            // ===== Input =====
            const input = { y: 0, jumpPressed: false, jumpTriggered: false };

            // Joystick
            const joystickZone = document.getElementById('joystick-zone');
            const joystickKnob = document.getElementById('joystick-knob');
            let isDragging = false;
            let dragStartY = 0;

            joystickZone.addEventListener('pointerdown', (e) => {
                isDragging = true;
                dragStartY = e.clientY;
                joystickKnob.style.background = 'rgba(255,255,255,0.8)';
                e.preventDefault();
            });
            window.addEventListener('pointermove', (e) => {
                if (!isDragging) return;
                const deltaY = e.clientY - dragStartY;
                const clampedY = Math.max(-40, Math.min(40, deltaY));
                joystickKnob.style.transform = `translateY(${clampedY}px)`;
                input.y = -clampedY / 40; // -1 (down) to 1 (up)
            });
            window.addEventListener('pointerup', (e) => {
                if (!isDragging) return;
                isDragging = false;
                joystickKnob.style.transform = 'translateY(0px)';
                joystickKnob.style.background = 'rgba(255,255,255,0.5)';
                input.y = 0;
            });

            // Jump button - trigger on press, not hold
            const jumpBtn = document.getElementById('jump-btn');
            jumpBtn.addEventListener('pointerdown', (e) => {
                input.jumpTriggered = true;
                jumpBtn.classList.add('pressed');
                e.preventDefault();
            });
            jumpBtn.addEventListener('pointerup', () => {
                jumpBtn.classList.remove('pressed');
            });
            jumpBtn.addEventListener('pointerleave', () => {
                jumpBtn.classList.remove('pressed');
            });

            // Keyboard support (for desktop testing)
            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowUp' || e.key === 'w') input.y = 1;
                if (e.key === 'ArrowDown' || e.key === 's') input.y = -1;
                if (e.key === ' ') input.jumpTriggered = true;
            });
            window.addEventListener('keyup', (e) => {
                if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'ArrowDown' || e.key === 's') input.y = 0;
            });

            // ===== Game State =====
            const clock = new THREE.Clock();
            let gameState = 'CLIMBING'; // CLIMBING | JUMPING | FALLING | LANDED
            let velocityY = 0;
            let deathCount = 0;

            const debugInfo = document.getElementById('debug-info');

            const animate = () => {
                requestAnimationFrame(animate);
                const dt = Math.min(clock.getDelta(), 0.05); // Cap delta time
                const time = clock.getElapsedTime();
                const charY = character.model.position.y;

                switch (gameState) {
                    case 'CLIMBING':
                        if (Math.abs(input.y) > 0.1) {
                            character.setState('CLIMB');
                            character.model.position.y += input.y * 3.0 * dt;
                            if (character.model.position.y < 0) character.model.position.y = 0;
                        } else {
                            character.setState('IDLE');
                        }

                        // Jump triggered at any height
                        if (input.jumpTriggered) {
                            input.jumpTriggered = false;
                            gameState = 'JUMPING';
                            character.setState('JUMP');
                            velocityY = 4.0; // Jump upward impulse

                            // Count death
                            deathCount++;
                            firebase.incrementDeathCount().then(count => {
                                meatballManager.scaleBasedOnGlobalCount(count);
                            });
                        }
                        break;

                    case 'JUMPING':
                        // Brief upward arc, then fall
                        velocityY -= 15.0 * dt; // Strong gravity
                        character.model.position.y += velocityY * dt;
                        // Also push character slightly forward (toward camera) for dramatic effect
                        character.model.position.z += 2.0 * dt;

                        if (velocityY < 0) {
                            gameState = 'FALLING';
                        }
                        break;

                    case 'FALLING':
                        velocityY -= 15.0 * dt;
                        character.model.position.y += velocityY * dt;
                        character.model.position.z += 1.0 * dt;

                        // Hit ground
                        if (character.model.position.y <= 0) {
                            character.model.position.y = 0;
                            gameState = 'LANDED';
                            character.setState('IDLE');
                            velocityY = 0;
                            // Reset z position and return to climbing after a moment
                            setTimeout(() => {
                                character.model.position.z = 0;
                                gameState = 'CLIMBING';
                            }, 1500);
                        }
                        break;

                    case 'LANDED':
                        // Waiting to reset
                        break;
                }

                // Consume jump trigger if not used
                input.jumpTriggered = false;

                // Camera follows character height smoothly
                const targetCamY = charY + 2.0;
                camera.position.y += (targetCamY - camera.position.y) * 3.0 * dt;
                camera.lookAt(character.model.position.x, charY + 1.0, character.model.position.z);

                // Update systems
                character.update(dt, time, input.y);
                meatballManager.update(time);

                // Debug info
                debugInfo.innerHTML =
                    `Height: ${charY.toFixed(1)}m<br>` +
                    `State: ${gameState}<br>` +
                    `Anim: ${character.currentState}<br>` +
                    `Deaths: ${deathCount}<br>` +
                    `Camera: ${hasCamera ? 'AR' : 'Sim'}`;

                renderer.render(scene, camera);
            };

            // Resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        };

        initGame().catch(err => {
            console.error('Game init failed:', err);
            document.getElementById('loading-status').textContent = '遊戲初始化失敗: ' + err.message;
        });
    </script>
</body>
</html>
