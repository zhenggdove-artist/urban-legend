const W = () => window.innerWidth, H = () => window.innerHeight;
function layoutUI() {
    const w = W(), h = H();

        `;left:20px;top:${h-160}px`;

// ===== Loading =====
const $bar = document.getElementById('loading-bar');

let prog = { camera:0, model:0, anim:0, death:0 };
function updateBar() {
    $bar.style.width = Math.round((prog.camera+prog.model+prog.anim+prog.death)/4)+'%';

// ===== Camera =====
async function startCamera() {
    const v = document.getElementById('camera-video');
    try {
        v.srcObject = await navigator.mediaDevices.getUserMedia({
            video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},
            audio:false
        });
        await v.play();
        prog.camera=100; updateBar();
        return true;
    } catch(e) { console.warn('Camera:',e); prog.camera=100; updateBar(); return false; }
}

// ===== Gyroscope =====
class GyroTracker {
    constructor() {
        this.viewX=0; this.viewY=0.5;
        this.smoothX=0; this.smoothY=0.5;
        this.rawBeta=90; this.rawGamma=0;
        this.enabled=false; this.status='init';
    }
    _onOrientation(e) {
        if (e.beta===null) { this.status='beta-null'; return; }
        this.rawBeta=e.beta;
        // Clamp gamma to avoid gimbal lock flicker near +-90
        this.rawGamma=Math.max(-60, Math.min(60, e.gamma||0));
        this.viewY = 0.5 + (e.beta-90)*0.025;
        this.viewX = this.rawGamma*0.002;
        // Heavier smoothing to prevent jitter/flicker
        const sf = 0.04;
        this.smoothX += (this.viewX-this.smoothX)*sf;
        this.smoothY += (this.viewY-this.smoothY)*sf;
        this.enabled=true; this.status='active';
    }
    async init() {
        const h = e => this._onOrientation(e);
        if (typeof DeviceOrientationEvent!=='undefined' &&
            typeof DeviceOrientationEvent.requestPermission==='function') {
            try {
                const p = await DeviceOrientationEvent.requestPermission();
                this.status='ios-'+p;
                if (p==='granted') window.addEventListener('deviceorientation',h);
            } catch(e) { this.status='ios-err:'+e.message; }
            return;
        }
        this.status='listening';
        window.addEventListener('deviceorientation',h);
        window.addEventListener('deviceorientationabsolute',h);
        setTimeout(()=>{ if(!this.enabled) this.status='no-events'; },2000);
    }
}

// ===== VHS Effect =====
class VHSEffect {
    constructor() {
        this.noiseCanvas = document.getElementById('vhs-noise');
        this.noiseCtx = this.noiseCanvas.getContext('2d');
        this.tracking = document.getElementById('vhs-tracking');
        this.frame = 0;
    }
    update() {
        this.frame++;
        // Update noise every 3 frames
        if (this.frame % 3 === 0) {
            const w = 64, h = 64;
            this.noiseCanvas.width = w; this.noiseCanvas.height = h;
            const ctx = this.noiseCtx;
            const img = ctx.createImageData(w, h);
            const d = img.data;
            for (let i = 0; i < d.length; i += 4) {
                const v = Math.random()*255;
                d[i]=d[i+1]=d[i+2]=v; d[i+3]=40;
            }
            ctx.putImageData(img, 0, 0);
        }
        // Random tracking line
        if (Math.random() > 0.96) {
            const y = Math.random()*100;
            const h = 2+Math.random()*6;
            this.tracking.style.cssText =
                `position:absolute;left:0;width:100%;z-index:4;pointer-events:none;`+
                `top:${y}%;height:${h}px;background:rgba(255,255,255,${0.04+Math.random()*0.08})`;
            setTimeout(()=>{ this.tracking.style.height='0'; }, 80+Math.random()*120);
        }
    }
}

// ===== 2D Tentacle System (matching reference site style) =====
// Donut-ring tentacles with spine, growth→recoil→relax, wriggle, floating glyphs
class TentacleSystem2D {
    constructor() {
        this.canvas = document.getElementById('tentacle-canvas');
        this.ctx = this.canvas.getContext('2d');
        this.tentacles = []; // persists across deaths
        this.RINGS = 35;
        this.PTS_PER_RING = 10;
        this.GLYPHS = ['.', '\u00B7', '\u2022', '\u2219', '\u25E6', '\u2218', 'o', '\u00B0', '*', '+'];
        this.PALETTES = [[0,255,220],[255,50,200],[50,255,120],[220,180,255],[255,100,100]];
    }
    // Build interpolated spine from control points
    _buildSpine(ctrls, numSeg) {
        const spine = [];
        for (let i=0; i<numSeg; i++) {
            const u = i/(numSeg-1);
            const ci = u*(ctrls.length-1);
            const i0 = Math.floor(ci), i1 = Math.min(i0+1, ctrls.length-1);
            const f = ci-i0;
            spine.push({
                x: ctrls[i0].x+(ctrls[i1].x-ctrls[i0].x)*f,
                y: ctrls[i0].y+(ctrls[i1].y-ctrls[i0].y)*f
            });
        }
        return spine;
    }
    // Generate donut rings along spine
    _generateRings(spine, baseR, taperEnd) {
        const rings = [];
        for (let r=0; r<spine.length; r++) {
            const u = r/(spine.length-1);
            const ringR = baseR*(1.0-u*taperEnd);
            const ringPts = [];
            let tx,ty;
            if (r<spine.length-1) { tx=spine[r+1].x-spine[r].x; ty=spine[r+1].y-spine[r].y; }
            else { tx=spine[r].x-spine[r-1].x; ty=spine[r].y-spine[r-1].y; }
            const tLen = Math.sqrt(tx*tx+ty*ty)||1;
            const nx=-ty/tLen, ny=tx/tLen;
            const tiltC = 0.3+Math.abs(ny)*0.5;
            for (let j=0; j<this.PTS_PER_RING; j++) {
                const theta = (j/this.PTS_PER_RING)*Math.PI*2;
                ringPts.push({
                    baseX: spine[r].x + Math.cos(theta)*ringR*nx - Math.sin(theta)*ringR*tiltC*tx/tLen,
                    baseY: spine[r].y + Math.cos(theta)*ringR*ny - Math.sin(theta)*ringR*tiltC*ty/tLen,
                    x:0, y:0,
                    phase: Math.random()*Math.PI*2,
                    speed: 0.3+Math.random()*1.0,
                    amp: 0.3+Math.random()*1.5*(1-u*0.5),
                    glyph: this.GLYPHS[Math.floor(Math.random()*this.GLYPHS.length)],
                    size: 1.5*(1-u*0.4),
                    alpha: 0.8*(1-u*0.3)
                });
            }
            rings.push(ringPts);
        }
        return rings;
    }
    _rebuildRings(rings, spine, baseR, taperEnd) {
        for (let r=0; r<spine.length&&r<rings.length; r++) {
            const u = r/(spine.length-1);
            const ringR = baseR*(1.0-u*taperEnd);
            let tx,ty;
            if (r<spine.length-1) { tx=spine[r+1].x-spine[r].x; ty=spine[r+1].y-spine[r].y; }
            else { tx=spine[r].x-spine[r-1].x; ty=spine[r].y-spine[r-1].y; }
            const tLen = Math.sqrt(tx*tx+ty*ty)||1;
            const nx=-ty/tLen, ny=tx/tLen;
            const tiltC = 0.3+Math.abs(ny)*0.5;
            const ring = rings[r];
            for (let j=0; j<ring.length; j++) {
                const theta = (j/ring.length)*Math.PI*2;
                ring[j].baseX = spine[r].x + Math.cos(theta)*ringR*nx - Math.sin(theta)*ringR*tiltC*tx/tLen;
                ring[j].baseY = spine[r].y + Math.cos(theta)*ringR*ny - Math.sin(theta)*ringR*tiltC*ty/tLen;
            }
        }
    }
    // Spawn 3-5 tentacles from a screen position (character's projected position)
    spawnAtScreen(sx, sy) {
        const count = 3+Math.floor(Math.random()*3);
        for (let i=0; i<count; i++) {
            const baseAngle = Math.random()*Math.PI*2;
            const totalLen = 30+Math.random()*50;
            const spiralDir = Math.random()<0.5?1:-1;
            const spiralStr = 0.5+Math.random()*1.2;
            const wiggle = 2+Math.random()*4;
            const ctrlCount = 18;
            const ctrls = [{x:sx, y:sy}];
            let cx=sx, cy=sy, angle=baseAngle;
            for (let c=0; c<ctrlCount; c++) {
                const seg = totalLen/ctrlCount;
                angle += spiralDir*spiralStr*(Math.PI/ctrlCount);
                angle += (Math.random()-0.5)*wiggle*(Math.PI/ctrlCount);
                cx += Math.cos(angle)*seg;
                cy += Math.sin(angle)*seg;
                ctrls.push({x:cx, y:cy});
            }
            const spine = this._buildSpine(ctrls, this.RINGS);
            const baseR = 2+Math.random()*3;
            const rings = this._generateRings(spine, baseR, 0.85);
            const pal = this.PALETTES[Math.floor(Math.random()*this.PALETTES.length)];
            const gd = 200+Math.random()*500;
            const recoilRand = Math.random();
            const recoilTarget = 0.2+recoilRand*0.5;
            const recoilSpeedMul = 1.0-recoilRand*0.7;
            this.tentacles.push({
                rings, spine,
                spineBase: spine.map(p=>({x:p.x,y:p.y})),
                birth: Date.now(), growDuration: gd,
                totalRings: this.RINGS, color: pal, baseR,
                wrigglePhase: Math.random()*Math.PI*2,
                wriggleFreq: 1.5+Math.random()*2.5,
                wriggleAmp: 2+Math.random()*4,
                recoilTarget,
                recoilDuration: gd*(1-recoilTarget)*recoilSpeedMul*(0.8+Math.random()*0.4)*4,
                relaxDuration: gd*(1-recoilTarget)/(0.15+Math.random()*0.1),
                anchorX: sx, anchorY: sy // follows character
            });
        }
    }
    // Move all tentacle anchors to follow character screen position
    moveAnchors(newSX, newSY) {
        for (const ten of this.tentacles) {
            const dx = newSX-ten.anchorX, dy = newSY-ten.anchorY;
            ten.anchorX = newSX; ten.anchorY = newSY;
            for (const p of ten.spineBase) { p.x+=dx; p.y+=dy; }
        }
    }
    update(t) {
        const cw = W(), ch = H();
        this.canvas.width = cw; this.canvas.height = ch;
        const ctx = this.ctx;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        const now = Date.now();

        for (const ten of this.tentacles) {
            const ms = now-ten.birth;
            // Growth phases: grow → recoil → relax
            let lengthFrac;
            const p2Start = ten.growDuration;
            const p3Start = p2Start+ten.recoilDuration;
            const p3End = p3Start+ten.relaxDuration;
            if (ms<p2Start) {
                lengthFrac = ms/p2Start;
            } else if (ms<p3Start) {
                const rc = (ms-p2Start)/ten.recoilDuration;
                lengthFrac = 1-(1-ten.recoilTarget)*rc;
            } else if (ms<p3End) {
                const rl = (ms-p3Start)/ten.relaxDuration;
                lengthFrac = ten.recoilTarget+(1-ten.recoilTarget)*rl;
            } else {
                lengthFrac = 1;
            }
            lengthFrac = Math.max(0,Math.min(1,lengthFrac));
            const growT = Math.min(1, ms/p2Start);

            // Wriggle spine + contraction
            const cutoff = lengthFrac*(ten.spine.length-1);
            for (let i=0; i<ten.spine.length; i++) {
                const u = i/ten.spine.length;
                const wave = Math.sin(t*ten.wriggleFreq+u*Math.PI*5+ten.wrigglePhase);
                const wave2 = Math.cos(t*ten.wriggleFreq*0.6+u*Math.PI*3+ten.wrigglePhase);
                if (i<=cutoff) {
                    ten.spine[i].x = ten.spineBase[i].x + wave*ten.wriggleAmp*u;
                    ten.spine[i].y = ten.spineBase[i].y + wave2*ten.wriggleAmp*0.6*u;
                } else {
                    const ci = Math.floor(cutoff), cf = cutoff-ci;
                    const ccx = ten.spineBase[ci].x + (ci<ten.spineBase.length-1?
                        (ten.spineBase[ci+1].x-ten.spineBase[ci].x)*cf:0);
                    const ccy = ten.spineBase[ci].y + (ci<ten.spineBase.length-1?
                        (ten.spineBase[ci+1].y-ten.spineBase[ci].y)*cf:0);
                    const collapse = (i-cutoff)/(ten.spine.length-1-cutoff+0.001);
                    const bx = ten.spineBase[i].x*(1-collapse)+ccx*collapse;
                    const by = ten.spineBase[i].y*(1-collapse)+ccy*collapse;
                    const tw1 = Math.sin(t*ten.wriggleFreq*1.3+i*1.7+ten.wrigglePhase*2.1);
                    const tw2 = Math.cos(t*ten.wriggleFreq*0.9+i*2.3+ten.wrigglePhase*1.4);
                    ten.spine[i].x = bx+(wave+tw1*2.25)*ten.wriggleAmp*u;
                    ten.spine[i].y = by+(wave2+tw2*2.25)*ten.wriggleAmp*0.6*u;
                }
            }
            this._rebuildRings(ten.rings, ten.spine, ten.baseR, 0.85);

            // Float each point
            ten.rings.forEach(ring=>ring.forEach(p=>{
                p.x = p.baseX+Math.sin(t*p.speed+p.phase)*p.amp;
                p.y = p.baseY+Math.cos(t*p.speed*0.7+p.phase)*p.amp;
            }));

            // Draw with glow
            const visRings = Math.ceil(ten.totalRings*growT);
            const cr0=ten.color[0], cg0=ten.color[1], cb0=ten.color[2];
            ctx.shadowColor=`rgba(${cr0},${cg0},${cb0},0.8)`;
            ctx.shadowBlur=10;
            for (let r=0; r<visRings&&r<ten.rings.length; r++) {
                const u = r/ten.rings.length;
                let ringAlpha = 1;
                if (growT<1) {
                    const fadeZone=0.15;
                    ringAlpha = Math.max(0,Math.min(1,(growT-u+fadeZone)/fadeZone));
                }
                const cr=Math.min(255,Math.floor(cr0*(1-u*0.15)));
                const cg=Math.min(255,Math.floor(cg0*(1-u*0.1)));
                const cb=Math.min(255,Math.floor(cb0*(1-u*0.05)));
                ctx.fillStyle=`rgb(${cr},${cg},${cb})`;
                const ring=ten.rings[r];
                for (let j=0; j<ring.length; j++) {
                    const p=ring[j];
                    ctx.globalAlpha = Math.min(1,p.alpha*ringAlpha*1.3);
                    ctx.font = `bold ${Math.max(3,p.size*ringAlpha*1.4)}px "Courier New",monospace`;
                    ctx.fillText(p.glyph, p.x, p.y);
                }
            }
            ctx.shadowBlur=0;
        }
        ctx.globalAlpha=1;
    }
}

// ===== ASCII Blood Splatter =====
class BloodSplatter2D {
    constructor() {
        this.canvas = document.getElementById('tentacle-canvas');
        this.ctx = this.canvas.getContext('2d');
        this.particles = [];
        this.GLYPHS = ['*','#','@','%','&','+','x','X','!','.',',','$','~'];
        this.COLORS = ['#ff2222','#ff0000','#ff4444','#ee0033','#ff1155','#ff0044','#cc0000'];
    }
    spawn(sx, sy) {
        const count = 60+Math.floor(Math.random()*40);
        for (let i=0; i<count; i++) {
            const angle = Math.random()*Math.PI*2;
            const speed = 80+Math.random()*350;
            const size = 10+Math.random()*22;
            this.particles.push({
                x:sx, y:sy,
                vx: Math.cos(angle)*speed,
                vy: Math.sin(angle)*speed - Math.random()*150,
                gravity: 300+Math.random()*200,
                life: 1.0,
                decay: 0.3+Math.random()*0.5,
                glyph: this.GLYPHS[Math.floor(Math.random()*this.GLYPHS.length)],
                color: this.COLORS[Math.floor(Math.random()*this.COLORS.length)],
                size,
                rotation: Math.random()*Math.PI*2,
                rotSpeed: (Math.random()-0.5)*5,
                trail: [] // blood trail
            });
        }
    }
    update(dt) {
        const ctx = this.ctx;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        for (let i=this.particles.length-1; i>=0; i--) {
            const p=this.particles[i];
            p.vy += p.gravity*dt;
            p.x += p.vx*dt;
            p.y += p.vy*dt;
            p.vx *= 0.98;
            p.rotation += p.rotSpeed*dt;
            p.life -= p.decay*dt;
            if (p.life<=0) { this.particles.splice(i,1); continue; }
            // Draw dripping/splatting glyph with glow
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation);
            ctx.globalAlpha = Math.min(1, p.life*1.2);
            ctx.fillStyle = p.color;
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = 12*p.life;
            ctx.font = `bold ${Math.max(4, p.size*Math.max(0.4,p.life))}px "Courier New",monospace`;
            ctx.fillText(p.glyph, 0, 0);
            // Drip trail effect
            if (p.life>0.3) {
                ctx.globalAlpha = p.life*0.5;
                ctx.font = `bold ${Math.max(3, p.size*0.6)}px "Courier New",monospace`;
                ctx.fillText('.', 0, -p.size*0.5);
                ctx.fillText(',', 0, -p.size*1.0);
                ctx.fillText('.', 0, -p.size*1.5);
            }
            ctx.shadowBlur = 0;
            ctx.restore();
        }
        ctx.globalAlpha=1;
    }
}

// ===== Character =====
class GameCharacter {
    constructor(scene) {
        this.scene = scene;
        this.root = new THREE.Group();
        scene.add(this.root);
        this.mixer=null; this.anims={}; this.curAction=null; this.curState='IDLE';
        this.root.rotation.y = Math.PI;
        this.charHeight = 0.033;
    }
    async load() {
        const gl = new GLTFLoader();
        const dr = new DRACOLoader();
        dr.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');
        gl.setDRACOLoader(dr);
        const texLoader = new THREE.TextureLoader();
        let skinTex = null;
        try {
            skinTex = await new Promise((r,j)=>
                texLoader.load('./playermodel/tripo_model_basecolor.JPEG',r,undefined,j));
            skinTex.flipY=false; skinTex.colorSpace=THREE.SRGBColorSpace;
        } catch(e){}
        const load = url => new Promise((r,j)=>gl.load(url,g=>r(g),undefined,e=>j(e)));
        try {
            $status.textContent='載入模型...';
            const idleG = await load('./playermodel/idle.glb');
            prog.model=100; updateBar();
            const model = idleG.scene;
            const box = new THREE.Box3().setFromObject(model);
            const origH = box.getSize(new THREE.Vector3()).y;
            const sc = this.charHeight/origH;
            model.scale.setScalar(sc); this.scaleFactor=sc;
            const box2 = new THREE.Box3().setFromObject(model);
            model.position.y = -box2.min.y;
            model.traverse(c=>{
                if(c.isMesh){
                    c.material = new THREE.MeshStandardMaterial({
                        map:skinTex, roughness:0.8, metalness:0.1, side:THREE.DoubleSide
                    });
                    c.frustumCulled=false;
                }
            });
            this.model3D=model; this.root.add(model);
            this.mixer = new THREE.AnimationMixer(model);
            const strip = clip => {
                clip.tracks = clip.tracks.filter(t=>
                    !/(Hips|RootNode)\.(position|quaternion)/i.test(t.name));
            };
            if(idleG.animations.length){
                strip(idleG.animations[0]);
                this.anims['IDLE']=this.mixer.clipAction(idleG.animations[0]);
                this.anims['IDLE'].play(); this.curAction=this.anims['IDLE'];
            }
            $status.textContent='載入動畫...';
            const [cR,jR,dR] = await Promise.allSettled([
                load('./playermodel/climb.glb'),
                load('./playermodel/jump.glb'),
                load('./playermodel/death.glb')
            ]);
            prog.anim=100; prog.death=100; updateBar();
            if(cR.status==='fulfilled'&&cR.value.animations.length){
                strip(cR.value.animations[0]);
                this.anims['CLIMB']=this.mixer.clipAction(cR.value.animations[0]);
            }
            if(jR.status==='fulfilled'&&jR.value.animations.length){
                strip(jR.value.animations[0]);
                this.anims['JUMP']=this.mixer.clipAction(jR.value.animations[0]);
                this.anims['JUMP'].setLoop(THREE.LoopOnce);
                this.anims['JUMP'].clampWhenFinished=true;
            }
            if(dR.status==='fulfilled'&&dR.value.animations.length){
                strip(dR.value.animations[0]);
                this.anims['DEATH']=this.mixer.clipAction(dR.value.animations[0]);
                this.anims['DEATH'].setLoop(THREE.LoopOnce);
                this.anims['DEATH'].clampWhenFinished=true;
            }
            this.loaded=true;
        } catch(e){
            console.error('Load fail:',e);
            $status.textContent='載入失敗';
            prog.model=prog.anim=prog.death=100; updateBar();
        }
    }
    setState(s) {
        if(this.curState===s) return;
        this.curState=s;
        if(!this.mixer) return;
        const next=this.anims[s]; if(!next) return;
        if(this.curAction) this.curAction.timeScale=1;
        if(this.curAction&&this.curAction!==next){
            next.reset().play();
            next.crossFadeFrom(this.curAction,0.2,true);
        } else next.reset().play();
        this.curAction=next;
    }
    update(dt, moveY) {
        if(!this.mixer) return;
        if(this.curState==='CLIMB'&&this.anims['CLIMB'])
            this.anims['CLIMB'].timeScale = moveY>0?1.5:(moveY<0?-1.5:0);
        this.mixer.update(dt);
    }
}

// ===== Main =====
async function main() {
    $status.textContent='載入中...';
    prog.camera=100; updateBar();

    const scene = new THREE.Scene();
    const VFOV=60;
    const camera = new THREE.PerspectiveCamera(VFOV, W()/H(), 0.001, 100);
    const camZ = 1.0/(2*Math.tan(THREE.MathUtils.degToRad(VFOV/2)));
    camera.position.set(0,0.5,camZ);
    camera.lookAt(0,0.5,0);

    const renderer = new THREE.WebGLRenderer({alpha:true, antialias:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setSize(W(),H());
    renderer.setClearColor(0x000000,0);
    const canvas3d = renderer.domElement;
    canvas3d.id='canvas3d';
    canvas3d.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none';
    document.getElementById('camera-video').after(canvas3d);

    scene.add(new THREE.DirectionalLight(0xffffff,2).translateX(2).translateY(3).translateZ(2));
    scene.add(new THREE.AmbientLight(0xaaaaaa));
    scene.add(new THREE.HemisphereLight(0xffffff,0x444444,0.5));

    const character = new GameCharacter(scene);
    await character.load();

    const tentacles = new TentacleSystem2D();
    const blood = new BloodSplatter2D();
    const gyro = new GyroTracker();
    const vhs = new VHSEffect();

    $status.textContent='準備完成！';
    $start.style.display='block';

    await new Promise(r => $start.addEventListener('click', async ()=>{
        $status.textContent='啟動中...';
        $start.style.display='none';
        try {
            await gyro.init();
            const hasCam = await startCamera();
            window._hasCam = hasCam;
        } catch(e){ console.warn('Init error:',e); }
        $loading.style.display='none';
        r();
    },{once:true}));

    const hasCamera = window._hasCam;

    let viewX=0, viewY=0.5;
    const panZone = document.getElementById('pan-zone');
    let panTouchId=null, panLastX=0, panLastY=0;

    panZone.addEventListener('pointerdown', e=>{
        const ex=e.clientX, ey=e.clientY;
        const jz=document.getElementById('joystick-zone').getBoundingClientRect();
        const jb=document.getElementById('jump-btn').getBoundingClientRect();
        const pad=20;
        if(ex>=jz.left-pad&&ex<=jz.right+pad&&ey>=jz.top-pad&&ey<=jz.bottom+pad) return;
        if(ex>=jb.left-pad&&ex<=jb.right+pad&&ey>=jb.top-pad&&ey<=jb.bottom+pad) return;
        panTouchId=e.pointerId; panLastX=e.clientX; panLastY=e.clientY;
        panZone.setPointerCapture(e.pointerId); e.preventDefault();
    },{passive:false});
    panZone.addEventListener('pointermove', e=>{
        if(e.pointerId!==panTouchId) return;
        const dx=e.clientX-panLastX, dy=e.clientY-panLastY;
        panLastX=e.clientX; panLastY=e.clientY;
        viewY -= dy/H()*2.0;
        viewX += dx/W()*1.5;
        e.preventDefault();
    },{passive:false});
    panZone.addEventListener('pointerup', e=>{ if(e.pointerId===panTouchId) panTouchId=null; });
    panZone.addEventListener('pointercancel', e=>{ if(e.pointerId===panTouchId) panTouchId=null; });

    const input={x:0,y:0,jump:false};
    const jZone=document.getElementById('joystick-zone');
    const jKnob=document.getElementById('joystick-knob');
    let joyTouchId=null, joyX0=0, joyY0=0;
    jZone.addEventListener('pointerdown', e=>{
        joyTouchId=e.pointerId; joyX0=e.clientX; joyY0=e.clientY;
        jKnob.style.background='rgba(184,184,208,.5)';
        jZone.setPointerCapture(e.pointerId);
        e.preventDefault(); e.stopPropagation();
    },{passive:false});
    jZone.addEventListener('pointermove', e=>{
        if(e.pointerId!==joyTouchId) return;
        const dx=Math.max(-45,Math.min(45,e.clientX-joyX0));
        const dy=Math.max(-45,Math.min(45,e.clientY-joyY0));
        jKnob.style.transform=`translate(${dx}px,${dy}px)`;
        input.x=dx/45; input.y=-dy/45;
        e.stopPropagation();
    });
    jZone.addEventListener('pointerup', e=>{
        if(e.pointerId!==joyTouchId) return;
        joyTouchId=null;
        jKnob.style.transform='translate(0,0)';
        jKnob.style.background='rgba(184,184,208,.25)';
        input.x=0; input.y=0; e.stopPropagation();
    });
    jZone.addEventListener('pointercancel', e=>{
        if(e.pointerId!==joyTouchId) return;
        joyTouchId=null;
        jKnob.style.transform='translate(0,0)';
        jKnob.style.background='rgba(184,184,208,.25)';
        input.x=0; input.y=0;
    });

    const jBtn=document.getElementById('jump-btn');
    jBtn.addEventListener('pointerdown', e=>{
        input.jump=true; jBtn.classList.add('pressed');
        e.preventDefault(); e.stopPropagation();
    },{passive:false});
    jBtn.addEventListener('pointerup', e=>{ jBtn.classList.remove('pressed'); e.stopPropagation(); });
    jBtn.addEventListener('pointercancel', ()=>jBtn.classList.remove('pressed'));

    window.addEventListener('keydown', e=>{
        if(e.key==='ArrowUp'||e.key==='w')input.y=1;
        if(e.key==='ArrowDown'||e.key==='s')input.y=-1;
        if(e.key==='ArrowLeft'||e.key==='a')input.x=-1;
        if(e.key==='ArrowRight'||e.key==='d')input.x=1;
        if(e.key===' ')input.jump=true;
    });
    window.addEventListener('keyup', e=>{
        if(['ArrowUp','w','ArrowDown','s'].includes(e.key))input.y=0;
        if(['ArrowLeft','a','ArrowRight','d'].includes(e.key))input.x=0;
    });
    window.addEventListener('wheel', e=>{
        viewY+=e.deltaY*0.002; e.preventDefault();
    },{passive:false});

    // ===== Game State =====
    const clock = new THREE.Clock();
    let state='CLIMB', fallVY=0, deaths=0;
    const dbg = document.getElementById('debug-info');
    const halfVisW = camZ*Math.tan(THREE.MathUtils.degToRad(VFOV/2))*(W()/H());

    character.root.position.set(0, 0.5, 0);

    function tick() {
        requestAnimationFrame(tick);
        const dt = Math.min(clock.getDelta(), 0.05);
        const t = clock.getElapsedTime();
        const pos = character.root.position;

        // Game Logic
        switch(state) {
            case 'CLIMB':
                if(Math.abs(input.y)>0.1||Math.abs(input.x)>0.1){
                    character.setState('CLIMB');
                    pos.y += input.y*0.04*dt;
                    if(pos.y<0.02) pos.y=0.02;
                    pos.x += input.x*0.03*dt;
                    pos.x = Math.max(-halfVisW+0.02, Math.min(halfVisW-0.02, pos.x));
                } else {
                    character.setState('IDLE');
                }
                if(input.jump){
                    input.jump=false;
                    state='JUMPING';
                    character.setState('JUMP');
                    character.root.rotation.y=0;
                    fallVY=0.4;
                    deaths++;
                }
                break;
            case 'JUMPING':
                fallVY -= 1.8*dt;
                pos.y += fallVY*dt;
                pos.z += 0.2*dt;
                if(pos.y<=0.01){
                    pos.y=0.01; fallVY=0;
                    state='DEAD';
                    character.setState('DEATH');
                    // Project character to screen coords and spawn 2D tentacles + blood
                    const pv = new THREE.Vector3().copy(pos).project(camera);
                    const sx = (pv.x*0.5+0.5)*W();
                    const sy = (-pv.y*0.5+0.5)*H();
                    tentacles.spawnAtScreen(sx, sy);
                    blood.spawn(sx, sy);
                }
                break;
            case 'DEAD':
                // Stay dead until player presses jump to respawn
                if(input.jump){
                    state='CLIMB';
                    pos.set(0,0.5,0);
                    pos.z=0;
                    character.root.rotation.y=Math.PI;
                    character.setState('IDLE');
                    viewY=0.5; viewX=0;
                }
                break;
        }
        input.jump=false;
        if(state==='CLIMB') character.root.rotation.y=Math.PI;
        jBtn.textContent = state==='DEAD'?'REVIVE':'JUMP';

        // Camera
        if(state==='JUMPING'||state==='DEAD'){
            const targetY=pos.y+0.1;
            viewY+=(targetY-viewY)*0.04;
            if(gyro.enabled) viewX=gyro.smoothX;
        } else {
            if(gyro.enabled){
                viewY=gyro.smoothY; viewX=gyro.smoothX;
            }
        }
        viewY=Math.max(-0.2, viewY);
        if(gyro.enabled) {
            // Gyro already smoothed — apply directly to avoid double-smoothing lag
            camera.position.x = viewX;
            camera.position.y = viewY;
        } else {
            camera.position.x += (viewX-camera.position.x)*0.08;
            camera.position.y += (viewY-camera.position.y)*0.08;
        }
        camera.lookAt(camera.position.x, camera.position.y, 0);

        // Update systems
        character.update(dt, input.y);
        // Move tentacle anchors to follow character's screen position
        const proj = new THREE.Vector3().copy(pos).project(camera);
        const charSX = (proj.x*0.5+0.5)*W();
        const charSY = (-proj.y*0.5+0.5)*H();
        tentacles.moveAnchors(charSX, charSY);
        tentacles.update(t);
        blood.update(dt);
        vhs.update();

        // Render 3D scene directly
        renderer.render(scene, camera);

        // Off-screen arrow indicator
        const arrow = document.getElementById('offscreen-arrow');
        const margin = 30;
        const onScreen = charSX>margin && charSX<W()-margin && charSY>margin && charSY<H()-margin;
        if (!onScreen && state!=='DEAD') {
            arrow.style.display='block';
            // Clamp to screen edge
            const cx=W()/2, cy=H()/2;
            const dx=charSX-cx, dy=charSY-cy;
            const angle=Math.atan2(dy,dx);
            const edgeX=Math.max(40,Math.min(W()-40, cx+Math.cos(angle)*(W()/2-50)));
            const edgeY=Math.max(40,Math.min(H()-40, cy+Math.sin(angle)*(H()/2-50)));
            arrow.style.left=edgeX+'px';
            arrow.style.top=edgeY+'px';
            // Arrow character based on direction
            const deg=angle*180/Math.PI;
            if(deg>-45&&deg<=45) arrow.textContent='\u25B6';
            else if(deg>45&&deg<=135) arrow.textContent='\u25BC';
            else if(deg>-135&&deg<=-45) arrow.textContent='\u25B2';
            else arrow.textContent='\u25C0';
        } else {
            arrow.style.display='none';
        }

        // Debug
        const sb=camera.position.y-0.5, st=camera.position.y+0.5;
        const vis = pos.y>=sb&&pos.y<=st;
        dbg.innerHTML = [
            `POS:${pos.x.toFixed(2)},${pos.y.toFixed(2)} ${state}`,
            `CAM:${camera.position.y.toFixed(2)} [${sb.toFixed(1)}~${st.toFixed(1)}]`,
            vis?'ON-SCREEN':'OFF-SCREEN',
            gyro.enabled
                ?`GYRO:β${gyro.rawBeta.toFixed(0)}° γ${gyro.rawGamma.toFixed(0)}°`
                :`GYRO:OFF[${gyro.status}]`,
            `TENTACLES:${tentacles.tentacles.length} DEATHS:${deaths}`,
        ].join('<br>');
    }

    function onResize() {
        camera.aspect=W()/H();
        camera.updateProjectionMatrix();
        renderer.setSize(W(),H());
        layoutUI();
    }
    window.addEventListener('resize', onResize);
    window.addEventListener('orientationchange', ()=>setTimeout(onResize,300));
    if(window.visualViewport) window.visualViewport.addEventListener('resize',onResize);

    tick();
}

main().catch(e=>{
    console.error(e);
    document.getElementById('loading-status').textContent='錯誤: '+e.message;
});
</script>
