<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
import { DRACOLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/DRACOLoader.js';

const W = () => window.innerWidth, H = () => window.innerHeight;
function layoutUI() {
    const w = W(), h = H();
    document.getElementById('joystick-zone').style.cssText +=
        `;left:20px;top:${h-160}px`;
    document.getElementById('jump-btn').style.cssText +=
        `;left:${w-104}px;top:${h-120}px`;
}
layoutUI(); window.addEventListener('resize', layoutUI);

// ===== Loading =====
const $bar = document.getElementById('loading-bar');
const $status = document.getElementById('loading-status');
const $loading = document.getElementById('loading-screen');
const $start = document.getElementById('start-btn');
let prog = { camera:0, model:0, anim:0, death:0 };
function updateBar() {
    $bar.style.width = Math.round((prog.camera+prog.model+prog.anim+prog.death)/4)+'%';
}

// ===== Camera =====
async function startCamera() {
    const v = document.getElementById('camera-video');
    try {
        v.srcObject = await navigator.mediaDevices.getUserMedia({
            video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},
            audio:false
        });
        await v.play();
        prog.camera=100; updateBar();
        return true;
    } catch(e) { console.warn('Camera:',e); prog.camera=100; updateBar(); return false; }
}

// ===== Gyroscope =====
class GyroTracker {
    constructor() {
        this.viewX=0; this.viewY=0.5;
        this.smoothX=0; this.smoothY=0.5;
        this.rawBeta=90; this.rawGamma=0;
        this.enabled=false; this.status='init';
    }
    _onOrientation(e) {
        if (e.beta===null) { this.status='beta-null'; return; }
        this.rawBeta=e.beta; this.rawGamma=e.gamma||0;
        this.viewY = 0.5 + (e.beta-90)*0.025;
        this.viewX = this.rawGamma*0.002;
        this.smoothX += (this.viewX-this.smoothX)*0.08;
        this.smoothY += (this.viewY-this.smoothY)*0.08;
        this.enabled=true; this.status='active';
    }
    async init() {
        const h = e => this._onOrientation(e);
        if (typeof DeviceOrientationEvent!=='undefined' &&
            typeof DeviceOrientationEvent.requestPermission==='function') {
            try {
                const p = await DeviceOrientationEvent.requestPermission();
                this.status='ios-'+p;
                if (p==='granted') window.addEventListener('deviceorientation',h);
            } catch(e) { this.status='ios-err:'+e.message; }
            return;
        }
        this.status='listening';
        window.addEventListener('deviceorientation',h);
        window.addEventListener('deviceorientationabsolute',h);
        setTimeout(()=>{ if(!this.enabled) this.status='no-events'; },2000);
    }
}

// ===== VHS Effect =====
class VHSEffect {
    constructor() {
        this.noiseCanvas = document.getElementById('vhs-noise');
        this.noiseCtx = this.noiseCanvas.getContext('2d');
        this.tracking = document.getElementById('vhs-tracking');
        this.frame = 0;
    }
    update() {
        this.frame++;
        // Update noise every 3 frames
        if (this.frame % 3 === 0) {
            const w = 64, h = 64;
            this.noiseCanvas.width = w; this.noiseCanvas.height = h;
            const ctx = this.noiseCtx;
            const img = ctx.createImageData(w, h);
            const d = img.data;
            for (let i = 0; i < d.length; i += 4) {
                const v = Math.random()*255;
                d[i]=d[i+1]=d[i+2]=v; d[i+3]=40;
            }
            ctx.putImageData(img, 0, 0);
        }
        // Random tracking line
        if (Math.random() > 0.96) {
            const y = Math.random()*100;
            const h = 2+Math.random()*6;
            this.tracking.style.cssText =
                `position:absolute;left:0;width:100%;z-index:4;pointer-events:none;`+
                `top:${y}%;height:${h}px;background:rgba(255,255,255,${0.04+Math.random()*0.08})`;
            setTimeout(()=>{ this.tracking.style.height='0'; }, 80+Math.random()*120);
        }
    }
}

// ===== ASCII Renderer =====
class AsciiRenderer {
    constructor(renderer, camera) {
        this.renderer = renderer;
        this.camera = camera;
        this.chars = ' .,:;+*?%S#@';
        this.cellSize = 8;
        this.canvas = document.getElementById('ascii-canvas');
        this.ctx = this.canvas.getContext('2d');
        this.cols = 1; this.rows = 1;
        this.target = null; this.pixels = null;
        this._resize();
    }
    _resize() {
        this.cols = Math.ceil(W()/this.cellSize);
        this.rows = Math.ceil(H()/this.cellSize);
        if (this.target) this.target.dispose();
        this.target = new THREE.WebGLRenderTarget(this.cols, this.rows, {
            minFilter:THREE.NearestFilter, magFilter:THREE.NearestFilter
        });
        this.pixels = new Uint8Array(this.cols*this.rows*4);
    }
    render(scene) {
        const cols = Math.ceil(W()/this.cellSize);
        const rows = Math.ceil(H()/this.cellSize);
        if (cols!==this.cols||rows!==this.rows) this._resize();

        // Render 3D scene to low-res offscreen target
        this.renderer.setRenderTarget(this.target);
        this.renderer.render(scene, this.camera);
        this.renderer.setRenderTarget(null);
        this.renderer.readRenderTargetPixels(this.target,0,0,this.cols,this.rows,this.pixels);

        // Draw ASCII on 2D canvas
        this.canvas.width = W(); this.canvas.height = H();
        const ctx = this.ctx;
        ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
        const fontSize = this.cellSize;
        ctx.font = `bold ${fontSize}px monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        for (let y=0; y<this.rows; y++) {
            for (let x=0; x<this.cols; x++) {
                // WebGL is bottom-up, flip Y
                const i = ((this.rows-1-y)*this.cols+x)*4;
                const r=this.pixels[i], g=this.pixels[i+1], b=this.pixels[i+2], a=this.pixels[i+3];
                if (a<15) continue; // skip transparent
                const brightness = (r*0.299+g*0.587+b*0.114)/255;
                const ci = Math.min(this.chars.length-1, Math.floor(brightness*this.chars.length));
                // Tint green for VHS horror feel
                const gr = Math.min(255, g+60);
                ctx.fillStyle = `rgba(${Math.floor(r*0.6)},${Math.floor(gr)},${Math.floor(b*0.5)},${a/255})`;
                ctx.fillText(this.chars[ci], x*this.cellSize+this.cellSize/2, y*this.cellSize+this.cellSize/2);
            }
        }
    }
}

// ===== Tentacle System =====
class TentacleSystem {
    constructor() {
        this.allTentacles = []; // persists across deaths, carried on character
    }
    spawnOnDeath(characterRoot) {
        const count = 3 + Math.floor(Math.random()*3); // 3-5 tentacles
        for (let i=0; i<count; i++) {
            const t = this._createTentacle();
            // Attach at random body position
            t.position.set(
                (Math.random()-0.5)*0.015,
                Math.random()*0.025 + 0.005,
                (Math.random()-0.5)*0.008
            );
            t.rotation.set(
                (Math.random()-0.5)*Math.PI*0.7,
                Math.random()*Math.PI*2,
                (Math.random()-0.5)*0.5
            );
            characterRoot.add(t);
            this.allTentacles.push(t);
        }
    }
    _createTentacle() {
        const len = 0.015+Math.random()*0.035;
        const segs = 10;
        const pts = [];
        let cx=0, cy=0, cz=0;
        for (let i=0; i<=segs; i++) {
            const t = i/segs;
            cx += (Math.random()-0.5)*0.005;
            cy += len/segs;
            cz += (Math.random()-0.5)*0.004;
            pts.push(new THREE.Vector3(cx,cy,cz));
        }
        const curve = new THREE.CatmullRomCurve3(pts);
        const tubSegs=12, radSegs=5;
        const baseR = 0.001+Math.random()*0.0015;
        const geo = new THREE.TubeGeometry(curve, tubSegs, baseR, radSegs, false);
        // Taper toward tip
        const pos = geo.attributes.position;
        const vpr = radSegs+1;
        for (let ring=0; ring<=tubSegs; ring++) {
            const t = ring/tubSegs;
            const taper = 1 - t*0.9;
            const center = curve.getPointAt(Math.min(t,1));
            for (let r=0; r<=radSegs; r++) {
                const idx = ring*vpr+r;
                if (idx>=pos.count) break;
                const vx=pos.getX(idx), vy=pos.getY(idx), vz=pos.getZ(idx);
                pos.setX(idx, center.x+(vx-center.x)*taper);
                pos.setY(idx, center.y+(vy-center.y)*taper);
                pos.setZ(idx, center.z+(vz-center.z)*taper);
            }
        }
        pos.needsUpdate = true;
        const mat = new THREE.MeshBasicMaterial({
            color: new THREE.Color(
                0.12+Math.random()*0.15,
                0.02+Math.random()*0.05,
                0.05+Math.random()*0.1
            ),
            side: THREE.DoubleSide
        });
        return new THREE.Mesh(geo, mat);
    }
    // Animate tentacles (subtle wiggle)
    update(t) {
        for (const tentacle of this.allTentacles) {
            tentacle.rotation.x += Math.sin(t*3+tentacle.id)*0.002;
            tentacle.rotation.z += Math.cos(t*2.5+tentacle.id*0.7)*0.0015;
        }
    }
}

// ===== Character =====
class GameCharacter {
    constructor(scene) {
        this.scene = scene;
        this.root = new THREE.Group();
        scene.add(this.root);
        this.mixer=null; this.anims={}; this.curAction=null; this.curState='IDLE';
        this.root.rotation.y = Math.PI;
        this.charHeight = 0.033;
    }
    async load() {
        const gl = new GLTFLoader();
        const dr = new DRACOLoader();
        dr.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');
        gl.setDRACOLoader(dr);
        const texLoader = new THREE.TextureLoader();
        let skinTex = null;
        try {
            skinTex = await new Promise((r,j)=>
                texLoader.load('./playermodel/tripo_model_basecolor.JPEG',r,undefined,j));
            skinTex.flipY=false; skinTex.colorSpace=THREE.SRGBColorSpace;
        } catch(e){}
        const load = url => new Promise((r,j)=>gl.load(url,g=>r(g),undefined,e=>j(e)));
        try {
            $status.textContent='載入模型...';
            const idleG = await load('./playermodel/idle.glb');
            prog.model=100; updateBar();
            const model = idleG.scene;
            const box = new THREE.Box3().setFromObject(model);
            const origH = box.getSize(new THREE.Vector3()).y;
            const sc = this.charHeight/origH;
            model.scale.setScalar(sc); this.scaleFactor=sc;
            const box2 = new THREE.Box3().setFromObject(model);
            model.position.y = -box2.min.y;
            model.traverse(c=>{
                if(c.isMesh){
                    c.material = new THREE.MeshStandardMaterial({
                        map:skinTex, roughness:0.8, metalness:0.1, side:THREE.DoubleSide
                    });
                    c.frustumCulled=false;
                }
            });
            this.model3D=model; this.root.add(model);
            this.mixer = new THREE.AnimationMixer(model);
            const strip = clip => {
                clip.tracks = clip.tracks.filter(t=>
                    !/(Hips|RootNode)\.(position|quaternion)/i.test(t.name));
            };
            if(idleG.animations.length){
                strip(idleG.animations[0]);
                this.anims['IDLE']=this.mixer.clipAction(idleG.animations[0]);
                this.anims['IDLE'].play(); this.curAction=this.anims['IDLE'];
            }
            $status.textContent='載入動畫...';
            const [cR,jR,dR] = await Promise.allSettled([
                load('./playermodel/climb.glb'),
                load('./playermodel/jump.glb'),
                load('./playermodel/death.glb')
            ]);
            prog.anim=100; prog.death=100; updateBar();
            if(cR.status==='fulfilled'&&cR.value.animations.length){
                strip(cR.value.animations[0]);
                this.anims['CLIMB']=this.mixer.clipAction(cR.value.animations[0]);
            }
            if(jR.status==='fulfilled'&&jR.value.animations.length){
                strip(jR.value.animations[0]);
                this.anims['JUMP']=this.mixer.clipAction(jR.value.animations[0]);
                this.anims['JUMP'].setLoop(THREE.LoopOnce);
                this.anims['JUMP'].clampWhenFinished=true;
            }
            if(dR.status==='fulfilled'&&dR.value.animations.length){
                strip(dR.value.animations[0]);
                this.anims['DEATH']=this.mixer.clipAction(dR.value.animations[0]);
                this.anims['DEATH'].setLoop(THREE.LoopOnce);
                this.anims['DEATH'].clampWhenFinished=true;
            }
            this.loaded=true;
        } catch(e){
            console.error('Load fail:',e);
            $status.textContent='載入失敗';
            prog.model=prog.anim=prog.death=100; updateBar();
        }
    }
    setState(s) {
        if(this.curState===s) return;
        this.curState=s;
        if(!this.mixer) return;
        const next=this.anims[s]; if(!next) return;
        if(this.curAction) this.curAction.timeScale=1;
        if(this.curAction&&this.curAction!==next){
            next.reset().play();
            next.crossFadeFrom(this.curAction,0.2,true);
        } else next.reset().play();
        this.curAction=next;
    }
    update(dt, moveY) {
        if(!this.mixer) return;
        if(this.curState==='CLIMB'&&this.anims['CLIMB'])
            this.anims['CLIMB'].timeScale = moveY>0?1.5:(moveY<0?-1.5:0);
        this.mixer.update(dt);
    }
}

// ===== Main =====
async function main() {
    $status.textContent='載入中...';
    prog.camera=100; updateBar();

    const scene = new THREE.Scene();
    const VFOV=60;
    const camera = new THREE.PerspectiveCamera(VFOV, W()/H(), 0.001, 100);
    const camZ = 1.0/(2*Math.tan(THREE.MathUtils.degToRad(VFOV/2)));
    camera.position.set(0,0.5,camZ);
    camera.lookAt(0,0.5,0);

    const renderer = new THREE.WebGLRenderer({alpha:true, antialias:false});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setSize(W(),H());
    renderer.setClearColor(0x000000,0);
    // WebGL canvas hidden — ASCII canvas replaces it
    const canvas3d = renderer.domElement;
    canvas3d.style.cssText='position:absolute;top:0;left:0;width:0;height:0;opacity:0;pointer-events:none';
    document.body.appendChild(canvas3d);

    scene.add(new THREE.DirectionalLight(0xffffff,2).translateX(2).translateY(3).translateZ(2));
    scene.add(new THREE.AmbientLight(0xaaaaaa));
    scene.add(new THREE.HemisphereLight(0xffffff,0x444444,0.5));

    const character = new GameCharacter(scene);
    await character.load();

    const tentacles = new TentacleSystem();
    const gyro = new GyroTracker();
    const vhs = new VHSEffect();
    const ascii = new AsciiRenderer(renderer, camera);

    $status.textContent='準備完成！';
    $start.style.display='block';

    await new Promise(r => $start.addEventListener('click', async ()=>{
        $status.textContent='啟動中...';
        $start.style.display='none';
        try {
            await gyro.init();
            const hasCam = await startCamera();
            window._hasCam = hasCam;
        } catch(e){ console.warn('Init error:',e); }
        $loading.style.display='none';
        r();
    },{once:true}));

    const hasCamera = window._hasCam;

    let viewX=0, viewY=0.5;
    const panZone = document.getElementById('pan-zone');
    let panTouchId=null, panLastX=0, panLastY=0;

    panZone.addEventListener('pointerdown', e=>{
        const ex=e.clientX, ey=e.clientY;
        const jz=document.getElementById('joystick-zone').getBoundingClientRect();
        const jb=document.getElementById('jump-btn').getBoundingClientRect();
        const pad=20;
        if(ex>=jz.left-pad&&ex<=jz.right+pad&&ey>=jz.top-pad&&ey<=jz.bottom+pad) return;
        if(ex>=jb.left-pad&&ex<=jb.right+pad&&ey>=jb.top-pad&&ey<=jb.bottom+pad) return;
        panTouchId=e.pointerId; panLastX=e.clientX; panLastY=e.clientY;
        panZone.setPointerCapture(e.pointerId); e.preventDefault();
    },{passive:false});
    panZone.addEventListener('pointermove', e=>{
        if(e.pointerId!==panTouchId) return;
        const dx=e.clientX-panLastX, dy=e.clientY-panLastY;
        panLastX=e.clientX; panLastY=e.clientY;
        viewY -= dy/H()*2.0;
        viewX += dx/W()*1.5;
        e.preventDefault();
    },{passive:false});
    panZone.addEventListener('pointerup', e=>{ if(e.pointerId===panTouchId) panTouchId=null; });
    panZone.addEventListener('pointercancel', e=>{ if(e.pointerId===panTouchId) panTouchId=null; });

    const input={x:0,y:0,jump:false};
    const jZone=document.getElementById('joystick-zone');
    const jKnob=document.getElementById('joystick-knob');
    let joyTouchId=null, joyX0=0, joyY0=0;
    jZone.addEventListener('pointerdown', e=>{
        joyTouchId=e.pointerId; joyX0=e.clientX; joyY0=e.clientY;
        jKnob.style.background='rgba(255,255,255,.7)';
        jZone.setPointerCapture(e.pointerId);
        e.preventDefault(); e.stopPropagation();
    },{passive:false});
    jZone.addEventListener('pointermove', e=>{
        if(e.pointerId!==joyTouchId) return;
        const dx=Math.max(-45,Math.min(45,e.clientX-joyX0));
        const dy=Math.max(-45,Math.min(45,e.clientY-joyY0));
        jKnob.style.transform=`translate(${dx}px,${dy}px)`;
        input.x=dx/45; input.y=-dy/45;
        e.stopPropagation();
    });
    jZone.addEventListener('pointerup', e=>{
        if(e.pointerId!==joyTouchId) return;
        joyTouchId=null;
        jKnob.style.transform='translate(0,0)';
        jKnob.style.background='rgba(255,255,255,.4)';
        input.x=0; input.y=0; e.stopPropagation();
    });
    jZone.addEventListener('pointercancel', e=>{
        if(e.pointerId!==joyTouchId) return;
        joyTouchId=null;
        jKnob.style.transform='translate(0,0)';
        jKnob.style.background='rgba(255,255,255,.4)';
        input.x=0; input.y=0;
    });

    const jBtn=document.getElementById('jump-btn');
    jBtn.addEventListener('pointerdown', e=>{
        input.jump=true; jBtn.classList.add('pressed');
        e.preventDefault(); e.stopPropagation();
    },{passive:false});
    jBtn.addEventListener('pointerup', e=>{ jBtn.classList.remove('pressed'); e.stopPropagation(); });
    jBtn.addEventListener('pointercancel', ()=>jBtn.classList.remove('pressed'));

    window.addEventListener('keydown', e=>{
        if(e.key==='ArrowUp'||e.key==='w')input.y=1;
        if(e.key==='ArrowDown'||e.key==='s')input.y=-1;
        if(e.key==='ArrowLeft'||e.key==='a')input.x=-1;
        if(e.key==='ArrowRight'||e.key==='d')input.x=1;
        if(e.key===' ')input.jump=true;
    });
    window.addEventListener('keyup', e=>{
        if(['ArrowUp','w','ArrowDown','s'].includes(e.key))input.y=0;
        if(['ArrowLeft','a','ArrowRight','d'].includes(e.key))input.x=0;
    });
    window.addEventListener('wheel', e=>{
        viewY+=e.deltaY*0.002; e.preventDefault();
    },{passive:false});

    // ===== Game State =====
    const clock = new THREE.Clock();
    let state='CLIMB', fallVY=0, deaths=0, deathTimer=0;
    const dbg = document.getElementById('debug-info');
    const halfVisW = camZ*Math.tan(THREE.MathUtils.degToRad(VFOV/2))*(W()/H());

    character.root.position.set(0, 0.5, 0);

    function tick() {
        requestAnimationFrame(tick);
        const dt = Math.min(clock.getDelta(), 0.05);
        const t = clock.getElapsedTime();
        const pos = character.root.position;

        // Game Logic
        switch(state) {
            case 'CLIMB':
                if(Math.abs(input.y)>0.1||Math.abs(input.x)>0.1){
                    character.setState('CLIMB');
                    pos.y += input.y*0.04*dt;
                    if(pos.y<0.02) pos.y=0.02;
                    pos.x += input.x*0.03*dt;
                    pos.x = Math.max(-halfVisW+0.02, Math.min(halfVisW-0.02, pos.x));
                } else {
                    character.setState('IDLE');
                }
                if(input.jump){
                    input.jump=false;
                    state='JUMPING';
                    character.setState('JUMP');
                    character.root.rotation.y=0;
                    fallVY=0.4;
                    deaths++;
                }
                break;
            case 'JUMPING':
                fallVY -= 1.8*dt;
                pos.y += fallVY*dt;
                pos.z += 0.2*dt;
                if(pos.y<=0.01){
                    pos.y=0.01; fallVY=0;
                    state='DEAD';
                    character.setState('DEATH');
                    deathTimer=4.0;
                    // Spawn tentacles on the character — they persist!
                    tentacles.spawnOnDeath(character.root);
                }
                break;
            case 'DEAD':
                deathTimer -= dt;
                if(deathTimer<=0){
                    state='CLIMB';
                    pos.set(0,0.5,0);
                    character.root.rotation.y=Math.PI;
                    character.setState('IDLE');
                    viewY=0.5;
                }
                break;
        }
        input.jump=false;
        if(state==='CLIMB') character.root.rotation.y=Math.PI;

        // Camera
        if(state==='JUMPING'||state==='DEAD'){
            const targetY=pos.y+0.1;
            viewY+=(targetY-viewY)*0.04;
            if(gyro.enabled) viewX=gyro.smoothX;
        } else {
            if(gyro.enabled){
                viewY=gyro.smoothY; viewX=gyro.smoothX;
            }
        }
        viewY=Math.max(-0.2, viewY);
        camera.position.x += (viewX-camera.position.x)*0.08;
        camera.position.y += (viewY-camera.position.y)*0.08;
        camera.lookAt(camera.position.x, camera.position.y, 0);

        // Update systems
        character.update(dt, input.y);
        tentacles.update(t);
        vhs.update();

        // ASCII render (replaces normal WebGL display)
        ascii.render(scene);

        // Debug
        const sb=camera.position.y-0.5, st=camera.position.y+0.5;
        const vis = pos.y>=sb&&pos.y<=st;
        dbg.innerHTML = [
            `POS:${pos.x.toFixed(2)},${pos.y.toFixed(2)} ${state}`,
            `CAM:${camera.position.y.toFixed(2)} [${sb.toFixed(1)}~${st.toFixed(1)}]`,
            vis?'ON-SCREEN':'OFF-SCREEN',
            gyro.enabled
                ?`GYRO:β${gyro.rawBeta.toFixed(0)}° γ${gyro.rawGamma.toFixed(0)}°`
                :`GYRO:OFF[${gyro.status}]`,
            `TENTACLES:${tentacles.allTentacles.length} DEATHS:${deaths}`,
        ].join('<br>');
    }

    function onResize() {
        camera.aspect=W()/H();
        camera.updateProjectionMatrix();
        renderer.setSize(W(),H());
        layoutUI();
    }
    window.addEventListener('resize', onResize);
    window.addEventListener('orientationchange', ()=>setTimeout(onResize,300));
    if(window.visualViewport) window.visualViewport.addEventListener('resize',onResize);

    tick();
}

main().catch(e=>{
    console.error(e);
    document.getElementById('loading-status').textContent='錯誤: '+e.message;
});
</script>
</body>
</html>
