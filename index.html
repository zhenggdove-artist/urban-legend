<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>都市傳說 - WebAR Game</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { width: 100%; height: 100%; overflow: hidden; }
        body {
            width: 100%; height: 100dvh; height: 100vh;
            overflow: hidden; background: #000;
            touch-action: none;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
        }

        /* Layers stacked: video -> canvas -> overlay -> UI */
        #camera-video {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; z-index: 0;
            background: #111;
        }
        #game-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            /* canvas element itself, no background */
        }
        #paper-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 2; opacity: 0.1; mix-blend-mode: multiply;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.5"/></svg>');
        }

        /* UI - use pixel-based positioning, no env() */
        #debug-info {
            position: absolute; top: 40px; left: 10px; z-index: 10;
            color: #fff; font: 11px/1.4 monospace;
            background: rgba(0,0,0,0.5); padding: 5px 8px; border-radius: 4px;
            pointer-events: none;
        }
        #joystick-zone {
            position: absolute; z-index: 10;
            width: 100px; height: 100px;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            touch-action: none;
        }
        #joystick-knob {
            position: absolute; top: 25px; left: 25px;
            width: 50px; height: 50px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
        }
        #jump-btn {
            position: absolute; z-index: 10;
            width: 80px; height: 80px;
            background: rgba(220, 40, 40, 0.6);
            border: 2px solid rgba(255,80,80,0.5);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: white; font: bold 14px sans-serif;
            touch-action: none;
        }
        #jump-btn.pressed { transform: scale(0.9); background: rgba(255, 50, 50, 0.85); }

        /* Loading */
        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); z-index: 100;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: white; font-family: sans-serif;
        }
        #loading-screen h2 { margin-bottom: 16px; font-size: 20px; }
        #loading-bar-bg { width: 160px; height: 5px; background: rgba(255,255,255,0.15); border-radius: 3px; overflow: hidden; }
        #loading-bar { width: 0%; height: 100%; background: #e63946; border-radius: 3px; transition: width 0.3s; }
        #loading-status { margin-top: 10px; font-size: 13px; opacity: 0.6; }
        #start-btn {
            display: none; margin-top: 20px; padding: 12px 44px;
            background: #e63946; color: white; border: none; border-radius: 10px;
            font-size: 17px; font-weight: bold; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        { "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }}
    </script>
</head>
<body>
    <video id="camera-video" autoplay playsinline muted></video>
    <canvas id="game-canvas"></canvas>
    <div id="paper-overlay"></div>
    <div id="debug-info">Loading...</div>
    <div id="joystick-zone"><div id="joystick-knob"></div></div>
    <div id="jump-btn">JUMP</div>
    <div id="loading-screen">
        <h2>都市傳說</h2>
        <div id="loading-bar-bg"><div id="loading-bar"></div></div>
        <div id="loading-status">初始化中...</div>
        <button id="start-btn">開始遊戲</button>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/DRACOLoader.js';

        // ===== Helpers =====
        function screenW() { return window.innerWidth; }
        function screenH() { return window.innerHeight; }

        // Position UI elements via JS (avoids CSS env() issues)
        function layoutUI() {
            const w = screenW(), h = screenH();
            const pad = 24;
            const bot = 40; // bottom padding

            const jz = document.getElementById('joystick-zone');
            jz.style.left = pad + 'px';
            jz.style.top = (h - 100 - bot) + 'px';

            const jb = document.getElementById('jump-btn');
            jb.style.left = (w - 80 - pad) + 'px';
            jb.style.top = (h - 80 - bot) + 'px';
        }
        layoutUI();
        window.addEventListener('resize', layoutUI);

        // ===== Loading =====
        const loadingBar = document.getElementById('loading-bar');
        const loadingStatus = document.getElementById('loading-status');
        const loadingScreen = document.getElementById('loading-screen');
        const startBtn = document.getElementById('start-btn');
        let prog = { camera: 0, idle: 0, climb: 0, jump: 0 };
        function updateBar() {
            loadingBar.style.width = Math.round((prog.camera + prog.idle + prog.climb + prog.jump) / 4) + '%';
        }

        // ===== Camera =====
        async function startCamera() {
            const video = document.getElementById('camera-video');
            loadingStatus.textContent = '正在啟動相機...';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
                video.srcObject = stream;
                await video.play();
                prog.camera = 100; updateBar();
                loadingStatus.textContent = '相機已啟動';
                return true;
            } catch (err) {
                console.warn('Camera failed:', err);
                video.style.background = 'linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)';
                prog.camera = 100; updateBar();
                loadingStatus.textContent = '無相機，使用模擬背景';
                return false;
            }
        }

        // ===== Meatball System =====
        class MeatballManager {
            constructor(scene) {
                this.scene = scene;
                this.cluster = new THREE.Group();
                this.spheres = [];
                this.baseScale = 1.0;
                const mat = new THREE.MeshToonMaterial({ color: 0x8B4513 });
                for (let i = 0; i < 5; i++) {
                    const m = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), mat.clone());
                    m.position.set((Math.random()-0.5)*0.2, (Math.random()-0.5)*0.2, (Math.random()-0.5)*0.2);
                    this.cluster.add(m); this.spheres.push(m);
                }
            }
            attachTo(p) { (p || this.scene).add(this.cluster); }
            detach() { this.cluster.parent?.remove(this.cluster); }
            update(t) {
                const s = this.baseScale + Math.sin(t * 3) * 0.08;
                this.cluster.scale.setScalar(s);
            }
            grow(count) { this.baseScale = 1.0 + Math.min(count / 50, 2.0); }
        }

        // ===== Character =====
        class GameCharacter {
            constructor(scene, meatball) {
                this.scene = scene;
                this.root = new THREE.Group();
                scene.add(this.root);
                this.mixer = null;
                this.anims = {};
                this.curAction = null;
                this.curState = 'IDLE';
                this.meatball = meatball;

                // Placeholder
                const ph = new THREE.Mesh(
                    new THREE.CapsuleGeometry(0.3, 1.0, 6, 12),
                    new THREE.MeshToonMaterial({ color: 0x999999 })
                );
                ph.position.y = 0.8;
                this.placeholder = ph;
                this.root.add(ph);
                meatball.attachTo(this.root);
            }

            async load() {
                const gl = new GLTFLoader();
                const dr = new DRACOLoader();
                dr.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');
                gl.setDRACOLoader(dr);

                // Load texture
                const texLoader = new THREE.TextureLoader();
                let skinTex = null;
                try {
                    skinTex = await new Promise((res, rej) => {
                        texLoader.load('./playermodel/tripo_model_basecolor.JPEG', res, undefined, rej);
                    });
                    skinTex.flipY = false; // GLB uses non-flipped UVs
                    skinTex.colorSpace = THREE.SRGBColorSpace;
                } catch (e) { console.warn('Skin texture not loaded:', e); }

                const loadGLB = (url, key) => new Promise((res, rej) => {
                    gl.load(url,
                        g => { prog[key] = 100; updateBar(); res(g); },
                        x => { if (x.total) { prog[key] = (x.loaded/x.total)*100; updateBar(); } },
                        e => { prog[key] = 100; updateBar(); rej(e); }
                    );
                });

                try {
                    loadingStatus.textContent = '載入模型...';
                    const idleG = await loadGLB('./playermodel/idle.glb', 'idle');

                    this.root.remove(this.placeholder);
                    const model = idleG.scene;

                    // Auto-scale to ~2 units tall
                    const box = new THREE.Box3().setFromObject(model);
                    const h = box.getSize(new THREE.Vector3()).y;
                    const sc = 2.0 / h;
                    model.scale.setScalar(sc);

                    // Feet at y=0
                    const box2 = new THREE.Box3().setFromObject(model);
                    model.position.y = -box2.min.y;

                    // Apply skin texture to meshes, keep original material structure
                    model.traverse(child => {
                        if (child.isMesh) {
                            // Use MeshStandardMaterial with skin texture
                            const mat = new THREE.MeshStandardMaterial({
                                map: skinTex,
                                roughness: 0.8,
                                metalness: 0.1,
                                side: THREE.DoubleSide
                            });
                            // If skinned mesh, the material will work with bones automatically
                            child.material = mat;
                            child.frustumCulled = false;
                        }
                    });

                    this.model3D = model;
                    this.root.add(model);
                    this.mixer = new THREE.AnimationMixer(model);

                    if (idleG.animations.length > 0) {
                        this.anims['IDLE'] = this.mixer.clipAction(idleG.animations[0]);
                        this.anims['IDLE'].play();
                        this.curAction = this.anims['IDLE'];
                    }

                    // Meatball to head bone
                    let head = null;
                    model.traverse(c => { if (c.isBone && /head/i.test(c.name)) head = c; });
                    if (head) {
                        this.meatball.detach();
                        this.meatball.attachTo(head);
                        // Scale meatball relative to model scale
                        const ms = 0.25 / sc;
                        this.meatball.cluster.scale.set(ms, ms, ms);
                    }

                    // Load animations
                    loadingStatus.textContent = '載入動畫...';
                    const [cR, jR] = await Promise.allSettled([
                        loadGLB('./playermodel/climb.glb', 'climb'),
                        loadGLB('./playermodel/jump.glb', 'jump')
                    ]);

                    if (cR.status === 'fulfilled' && cR.value.animations.length > 0)
                        this.anims['CLIMB'] = this.mixer.clipAction(cR.value.animations[0]);
                    if (jR.status === 'fulfilled' && jR.value.animations.length > 0) {
                        this.anims['JUMP'] = this.mixer.clipAction(jR.value.animations[0]);
                        this.anims['JUMP'].setLoop(THREE.LoopOnce);
                        this.anims['JUMP'].clampWhenFinished = true;
                    }

                    this.loaded = true;
                    console.log('Loaded anims:', Object.keys(this.anims));

                } catch (err) {
                    console.error('Load failed:', err);
                    loadingStatus.textContent = '模型載入失敗';
                    prog.idle = prog.climb = prog.jump = 100; updateBar();
                }
            }

            setState(s) {
                if (this.curState === s) return;
                this.curState = s;
                if (!this.mixer) return;
                const next = this.anims[s];
                if (!next) return;
                if (this.curAction && this.curAction !== next) {
                    next.reset().play();
                    next.crossFadeFrom(this.curAction, 0.2, true);
                } else { next.reset().play(); }
                this.curAction = next;
            }

            update(dt, moveY) {
                if (!this.mixer) return;
                if (this.curState === 'CLIMB' && this.anims['CLIMB'])
                    this.anims['CLIMB'].timeScale = moveY > 0 ? 1.5 : (moveY < 0 ? -1.5 : 0);
                this.mixer.update(dt);
            }
        }

        // ===== Firebase Stub =====
        const firebase = { count: 0, add() { return ++this.count; } };

        // ===== Main =====
        async function main() {
            const hasCamera = await startCamera();

            const canvas = document.getElementById('game-canvas');
            const scene = new THREE.Scene();

            const camera = new THREE.PerspectiveCamera(50, screenW() / screenH(), 0.1, 500);
            camera.position.set(0, 1.5, 5);
            camera.lookAt(0, 1, 0);

            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(screenW(), screenH());
            renderer.setClearColor(0x000000, 0);

            // Lighting
            scene.add(new THREE.DirectionalLight(0xffffff, 1.5).translateX(3).translateY(8).translateZ(5));
            scene.add(new THREE.AmbientLight(0x888888));
            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.5));

            // Grid
            const grid = new THREE.GridHelper(20, 20, 0x666666, 0x333333);
            grid.material.opacity = 0.2; grid.material.transparent = true;
            scene.add(grid);

            // Character
            const meatball = new MeatballManager(scene);
            const character = new GameCharacter(scene, meatball);
            await character.load();
            meatball.grow(0);

            // Ready
            loadingStatus.textContent = '準備完成！';
            startBtn.style.display = 'block';
            await new Promise(r => startBtn.addEventListener('click', () => { loadingScreen.style.display = 'none'; r(); }, { once: true }));

            // Input
            const input = { y: 0, jump: false };

            const jZone = document.getElementById('joystick-zone');
            const jKnob = document.getElementById('joystick-knob');
            let dragging = false, dragY0 = 0;

            jZone.addEventListener('pointerdown', e => {
                dragging = true; dragY0 = e.clientY;
                jKnob.style.background = 'rgba(255,255,255,0.8)';
                e.preventDefault();
            }, { passive: false });
            window.addEventListener('pointermove', e => {
                if (!dragging) return;
                const dy = Math.max(-35, Math.min(35, e.clientY - dragY0));
                jKnob.style.transform = `translateY(${dy}px)`;
                input.y = -dy / 35;
            });
            window.addEventListener('pointerup', () => {
                if (!dragging) return;
                dragging = false;
                jKnob.style.transform = 'translateY(0)';
                jKnob.style.background = 'rgba(255,255,255,0.5)';
                input.y = 0;
            });

            const jBtn = document.getElementById('jump-btn');
            jBtn.addEventListener('pointerdown', e => { input.jump = true; jBtn.classList.add('pressed'); e.preventDefault(); }, { passive: false });
            jBtn.addEventListener('pointerup', () => jBtn.classList.remove('pressed'));
            jBtn.addEventListener('pointercancel', () => jBtn.classList.remove('pressed'));

            // Keyboard
            window.addEventListener('keydown', e => {
                if (e.key === 'ArrowUp' || e.key === 'w') input.y = 1;
                if (e.key === 'ArrowDown' || e.key === 's') input.y = -1;
                if (e.key === ' ') input.jump = true;
            });
            window.addEventListener('keyup', e => {
                if (['ArrowUp','w','ArrowDown','s'].includes(e.key)) input.y = 0;
            });

            // Game state
            const clock = new THREE.Clock();
            let state = 'CLIMB', vy = 0, deaths = 0;
            const dbg = document.getElementById('debug-info');

            function tick() {
                requestAnimationFrame(tick);
                const dt = Math.min(clock.getDelta(), 0.05);
                const t = clock.getElapsedTime();
                const pos = character.root.position;

                switch (state) {
                    case 'CLIMB':
                        if (Math.abs(input.y) > 0.1) {
                            character.setState('CLIMB');
                            pos.y += input.y * 3.0 * dt;
                            if (pos.y < 0) pos.y = 0;
                        } else {
                            character.setState('IDLE');
                        }
                        if (input.jump) {
                            input.jump = false;
                            state = 'JUMP_UP';
                            character.setState('JUMP');
                            vy = 5.0;
                            deaths++;
                            meatball.grow(firebase.add());
                        }
                        break;
                    case 'JUMP_UP':
                        vy -= 14.0 * dt;
                        pos.y += vy * dt;
                        pos.z += 2.5 * dt;
                        if (vy <= 0) state = 'FALL';
                        break;
                    case 'FALL':
                        vy -= 14.0 * dt;
                        pos.y += vy * dt;
                        pos.z += 1.5 * dt;
                        if (pos.y <= 0) {
                            pos.y = 0; vy = 0; state = 'LAND';
                            character.setState('IDLE');
                            setTimeout(() => { pos.z = 0; state = 'CLIMB'; }, 1200);
                        }
                        break;
                    case 'LAND': break;
                }
                input.jump = false;

                // Camera follow
                const camTargetY = pos.y + 1.5;
                camera.position.y += (camTargetY - camera.position.y) * 3.0 * dt;
                camera.position.z = 5 + pos.z * 0.3;
                camera.lookAt(pos.x, pos.y + 1.0, pos.z);

                grid.position.y = Math.floor(pos.y / 5) * 5;

                character.update(dt, input.y);
                meatball.update(t);

                dbg.textContent = `H:${pos.y.toFixed(1)}m | ${state} | Deaths:${deaths} | ${hasCamera ? 'AR' : 'SIM'}`;

                renderer.render(scene, camera);
            }

            function onResize() {
                camera.aspect = screenW() / screenH();
                camera.updateProjectionMatrix();
                renderer.setSize(screenW(), screenH());
                layoutUI();
            }
            window.addEventListener('resize', onResize);
            window.addEventListener('orientationchange', () => setTimeout(onResize, 300));
            if (window.visualViewport) window.visualViewport.addEventListener('resize', onResize);

            tick();
        }

        main().catch(err => {
            console.error(err);
            document.getElementById('loading-status').textContent = '錯誤: ' + err.message;
        });
    </script>
</body>
</html>
