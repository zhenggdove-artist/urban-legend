<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
import { DRACOLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/DRACOLoader.js';

// ===== Globals =====
const W = () => window.innerWidth, H = () => window.innerHeight;
function layoutUI() {
    const w = W(), h = H();
    const jz = document.getElementById('joystick-zone');
    jz.style.left = '20px'; jz.style.top = (h - 160) + 'px';
    const jb = document.getElementById('jump-btn');
    jb.style.left = (w - 104) + 'px'; jb.style.top = (h - 120) + 'px';
}
layoutUI(); window.addEventListener('resize', layoutUI);

// ===== Loading =====
const $bar = document.getElementById('loading-bar');
const $status = document.getElementById('loading-status');
const $loading = document.getElementById('loading-screen');
const $start = document.getElementById('start-btn');
let prog = { camera: 0, model: 0, anim: 0, death: 0 };
function updateBar() {
    $bar.style.width = Math.round((prog.camera+prog.model+prog.anim+prog.death)/4) + '%';
}

// ===== Camera =====
async function startCamera() {
    const v = document.getElementById('camera-video');
    try {
        v.srcObject = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false
        });
        await v.play();
        prog.camera = 100; updateBar();
        return true;
    } catch (e) {
        console.warn('Camera:', e);
        prog.camera = 100; updateBar();
        return false;
    }
}

// ===== Gyroscope — absolute angle mapping + smoothing =====
class GyroTracker {
    constructor() {
        this.viewX = 0;
        this.viewY = 0.5;
        this.smoothX = 0;    // smoothed output
        this.smoothY = 0.5;  // smoothed output
        this.rawBeta = 90;
        this.rawGamma = 0;
        this.enabled = false;
        this.status = 'init';
    }
    _onOrientation(e) {
        if (e.beta === null) { this.status = 'beta-null'; return; }
        this.rawBeta = e.beta;
        this.rawGamma = e.gamma || 0;

        // Raw target from gyro angles (low sensitivity)
        const degreesFromVertical = 90 - e.beta;
        this.viewY = 0.5 + degreesFromVertical * 0.025;
        this.viewX = this.rawGamma * 0.002;

        // Low-pass filter: heavy smoothing to prevent jitter/flicker
        // 0.08 = very smooth (slow response), prevents shaking
        this.smoothX += (this.viewX - this.smoothX) * 0.08;
        this.smoothY += (this.viewY - this.smoothY) * 0.08;

        this.enabled = true;
        this.status = 'active';
    }
    async init() {
        const handler = e => this._onOrientation(e);

        // iOS 13+ requires permission from user gesture
        if (typeof DeviceOrientationEvent !== 'undefined' &&
            typeof DeviceOrientationEvent.requestPermission === 'function') {
            try {
                const p = await DeviceOrientationEvent.requestPermission();
                this.status = 'ios-' + p;
                if (p === 'granted') {
                    window.addEventListener('deviceorientation', handler);
                }
            } catch (e) {
                this.status = 'ios-err:' + e.message;
            }
            return;
        }

        // Android / other: just listen, no permission needed
        this.status = 'listening';
        window.addEventListener('deviceorientation', handler);

        // Also try 'deviceorientationabsolute' as fallback
        window.addEventListener('deviceorientationabsolute', handler);

        // Check after 2 seconds if we got any data
        setTimeout(() => {
            if (!this.enabled) this.status = 'no-events';
        }, 2000);
    }
}

// ===== Scene Analyzer =====
class SceneAnalyzer {
    constructor(video) {
        this.video = video;
        this.sc = document.createElement('canvas');
        this.sc.width = 32; this.sc.height = 48;
        this.sctx = this.sc.getContext('2d', { willReadFrequently: true });
        this.dc = document.getElementById('analysis-canvas');
        this.dctx = this.dc.getContext('2d');
        this.skyLine = 0.4;
        this.last = 0;
    }
    analyze(now) {
        if (now - this.last < 500) return;
        this.last = now;
        const v = this.video;
        if (!v.srcObject || v.readyState < 2) return;
        const sw = 32, sh = 48;
        this.sctx.drawImage(v, 0, 0, sw, sh);
        const d = this.sctx.getImageData(0, 0, sw, sh).data;
        let skyY = 0;
        for (let y = 0; y < sh; y++) {
            let sR=0,sG=0,sB=0; const cols=[];
            for (let x=0;x<sw;x++){const i=(y*sw+x)*4;const r=d[i],g=d[i+1],b=d[i+2];sR+=r;sG+=g;sB+=b;cols.push([r,g,b]);}
            const aR=sR/sw,aG=sG/sw,aB=sB/sw;
            let v2=0; for(const[r,g,b]of cols) v2+=(r-aR)**2+(g-aG)**2+(b-aB)**2;
            v2/=sw;
            if(y+2<sh && v2>800){skyY=y;break;}
        }
        this.skyLine = this.skyLine * 0.7 + (skyY/sh) * 0.3;
        this.dc.width = W(); this.dc.height = H();
        const ctx = this.dctx, cw = this.dc.width/sw, ch = this.dc.height/sh;
        ctx.clearRect(0,0,this.dc.width,this.dc.height);
        for(let y=0;y<sh;y++){
            ctx.fillStyle = (y/sh)<=this.skyLine ? 'rgba(100,180,255,.08)' : 'rgba(0,255,100,.05)';
            ctx.fillRect(0, y*ch, this.dc.width, ch);
        }
    }
}

// ===== Blood Particle System =====
class BloodEffect {
    constructor(scene) {
        this.scene = scene;
        this.particles = [];
        this.group = new THREE.Group();
        scene.add(this.group);
    }
    spawn(pos) {
        for (let i = 0; i < 40; i++) {
            const size = 0.004 + Math.random()*0.008;
            const geo = new THREE.SphereGeometry(size, 5, 5);
            const mat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(0.6 + Math.random()*0.4, 0, 0),
                transparent: true, opacity: 1.0, depthTest: false
            });
            const m = new THREE.Mesh(geo, mat);
            m.position.copy(pos);
            m.renderOrder = 999;
            const angle = Math.random() * Math.PI * 2;
            const speed = 0.1 + Math.random() * 0.25;
            const vx = Math.cos(angle) * speed;
            const vy = Math.random() * 0.3 + 0.05;
            const vz = Math.sin(angle) * speed * 0.3 + 0.08;
            this.particles.push({ mesh: m, vx, vy, vz, life: 2.5 + Math.random() * 1.5 });
            this.group.add(m);
        }
    }
    update(dt) {
        for (let i = this.particles.length - 1; i >= 0; i--) {
            const p = this.particles[i];
            p.vy -= 1.2 * dt;
            p.mesh.position.x += p.vx * dt;
            p.mesh.position.y += p.vy * dt;
            p.mesh.position.z += p.vz * dt;
            if (p.mesh.position.y < 0) { p.mesh.position.y = 0; p.vx *= 0.9; p.vz *= 0.9; p.vy = 0; }
            p.life -= dt;
            p.mesh.material.opacity = Math.max(0, Math.min(1, p.life / 1.0));
            if (p.life <= 0) {
                this.group.remove(p.mesh);
                p.mesh.geometry.dispose(); p.mesh.material.dispose();
                this.particles.splice(i, 1);
            }
        }
    }
}

// ===== Character =====
class GameCharacter {
    constructor(scene) {
        this.scene = scene;
        this.root = new THREE.Group();
        scene.add(this.root);
        this.mixer = null;
        this.anims = {};
        this.curAction = null;
        this.curState = 'IDLE';
        this.root.rotation.y = Math.PI;
        this.charHeight = 0.033; // ~1/30 of screen height
    }
    async load() {
        const gl = new GLTFLoader();
        const dr = new DRACOLoader();
        dr.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');
        gl.setDRACOLoader(dr);

        const texLoader = new THREE.TextureLoader();
        let skinTex = null;
        try {
            skinTex = await new Promise((r,j) =>
                texLoader.load('./playermodel/tripo_model_basecolor.JPEG', r, undefined, j));
            skinTex.flipY = false;
            skinTex.colorSpace = THREE.SRGBColorSpace;
        } catch(e) {}

        const load = (url) => new Promise((r,j) =>
            gl.load(url, g=>r(g), undefined, e=>j(e)));

        try {
            $status.textContent = '載入模型...';
            const idleG = await load('./playermodel/idle.glb');
            prog.model = 100; updateBar();

            const model = idleG.scene;
            const box = new THREE.Box3().setFromObject(model);
            const origH = box.getSize(new THREE.Vector3()).y;
            const sc = this.charHeight / origH;
            model.scale.setScalar(sc);
            this.scaleFactor = sc;

            const box2 = new THREE.Box3().setFromObject(model);
            model.position.y = -box2.min.y;

            model.traverse(c => {
                if (c.isMesh) {
                    c.material = new THREE.MeshStandardMaterial({
                        map: skinTex, roughness: 0.8, metalness: 0.1, side: THREE.DoubleSide
                    });
                    c.frustumCulled = false;
                }
            });

            this.model3D = model;
            this.root.add(model);
            this.mixer = new THREE.AnimationMixer(model);

            const strip = clip => {
                clip.tracks = clip.tracks.filter(t =>
                    !/(Hips|RootNode)\.(position|quaternion)/i.test(t.name));
            };

            if (idleG.animations.length) {
                strip(idleG.animations[0]);
                this.anims['IDLE'] = this.mixer.clipAction(idleG.animations[0]);
                this.anims['IDLE'].play();
                this.curAction = this.anims['IDLE'];
            }

            $status.textContent = '載入動畫...';
            const [cR, jR, dR] = await Promise.allSettled([
                load('./playermodel/climb.glb'),
                load('./playermodel/jump.glb'),
                load('./playermodel/death.glb')
            ]);
            prog.anim = 100; prog.death = 100; updateBar();

            if (cR.status==='fulfilled' && cR.value.animations.length) {
                strip(cR.value.animations[0]);
                this.anims['CLIMB'] = this.mixer.clipAction(cR.value.animations[0]);
            }
            if (jR.status==='fulfilled' && jR.value.animations.length) {
                strip(jR.value.animations[0]);
                this.anims['JUMP'] = this.mixer.clipAction(jR.value.animations[0]);
                this.anims['JUMP'].setLoop(THREE.LoopOnce);
                this.anims['JUMP'].clampWhenFinished = true;
            }
            if (dR.status==='fulfilled' && dR.value.animations.length) {
                strip(dR.value.animations[0]);
                this.anims['DEATH'] = this.mixer.clipAction(dR.value.animations[0]);
                this.anims['DEATH'].setLoop(THREE.LoopOnce);
                this.anims['DEATH'].clampWhenFinished = true;
            }

            this.loaded = true;
        } catch(e) {
            console.error('Load fail:', e);
            $status.textContent = '載入失敗';
            prog.model=prog.anim=prog.death=100; updateBar();
        }
    }
    setState(s) {
        if (this.curState === s) return;
        this.curState = s;
        if (!this.mixer) return;
        const next = this.anims[s];
        if (!next) return;
        if (this.curAction && this.curAction !== next) {
            next.reset().play();
            next.crossFadeFrom(this.curAction, 0.15, true);
        } else next.reset().play();
        this.curAction = next;
    }
    update(dt, moveY) {
        if (!this.mixer) return;
        if (this.curState==='CLIMB' && this.anims['CLIMB'])
            this.anims['CLIMB'].timeScale = moveY>0?1.5:(moveY<0?-1.5:0);
        this.mixer.update(dt);
    }
}

// ===== Main =====
async function main() {
    $status.textContent = '載入中...';
    prog.camera = 100; updateBar();

    // ---- Scene setup ----
    // Coordinate system: 1 scene unit = 1 screen height at default view
    // The "world" extends from y=0 (ground) upward infinitely
    // Camera is a window into this world — panning up/down reveals more
    const scene = new THREE.Scene();
    const VFOV = 60;
    const camera = new THREE.PerspectiveCamera(VFOV, W()/H(), 0.001, 100);
    // camZ: distance so that visible height at z=0 = 1 scene unit
    const camZ = 1.0 / (2 * Math.tan(THREE.MathUtils.degToRad(VFOV/2)));
    camera.position.set(0, 0.5, camZ);
    camera.lookAt(0, 0.5, 0);

    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(W(), H());
    renderer.setClearColor(0x000000, 0);
    const canvas3d = renderer.domElement;
    canvas3d.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none';
    document.getElementById('camera-video').after(canvas3d);

    // Lighting
    scene.add(new THREE.DirectionalLight(0xffffff, 2).translateX(2).translateY(3).translateZ(2));
    scene.add(new THREE.AmbientLight(0xaaaaaa));
    scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.5));

    // Character
    const character = new GameCharacter(scene);
    await character.load();

    // Blood
    const blood = new BloodEffect(scene);

    // Gyro
    const gyro = new GyroTracker();

    // Analyzer
    const analyzer = new SceneAnalyzer(document.getElementById('camera-video'));

    // Ready
    $status.textContent = '準備完成！';
    $start.style.display = 'block';

    await new Promise(r => $start.addEventListener('click', async () => {
        $status.textContent = '啟動中...';
        $start.style.display = 'none';
        try {
            // IMPORTANT: gyro permission MUST be called first, synchronously
            // in the user gesture. Any await before this will break iOS permission.
            await gyro.init();
            const hasCam = await startCamera();
            window._hasCam = hasCam;
        } catch(e) { console.warn('Init error:', e); }
        $loading.style.display = 'none';
        r();
    }, { once: true }));

    const hasCamera = window._hasCam;

    // ===== Camera Pan State =====
    // viewX/viewY = which part of the 3D world the screen shows.
    // Gyro and touch drag both modify these.
    let viewX = 0;     // horizontal pan
    let viewY = 0.5;   // vertical pan (center of viewport)

    // ===== Touch Camera Pan (on pan-zone, the screen background) =====
    const panZone = document.getElementById('pan-zone');
    let panTouchId = null, panLastY = 0;

    panZone.addEventListener('pointerdown', e => {
        // Only start pan if not on joystick or jump button area
        const ex = e.clientX, ey = e.clientY;
        const jz = document.getElementById('joystick-zone').getBoundingClientRect();
        const jb = document.getElementById('jump-btn').getBoundingClientRect();
        // Check if touch is inside joystick or jump button (with some padding)
        const pad = 20;
        if (ex >= jz.left-pad && ex <= jz.right+pad && ey >= jz.top-pad && ey <= jz.bottom+pad) return;
        if (ex >= jb.left-pad && ex <= jb.right+pad && ey >= jb.top-pad && ey <= jb.bottom+pad) return;

        panTouchId = e.pointerId;
        panLastX = e.clientX;
        panLastY = e.clientY;
        panZone.setPointerCapture(e.pointerId);
        e.preventDefault();
    }, {passive: false});

    let panLastX = 0;
    panZone.addEventListener('pointermove', e => {
        if (e.pointerId !== panTouchId) return;
        const dx = e.clientX - panLastX;
        const dy = e.clientY - panLastY;
        panLastX = e.clientX;
        panLastY = e.clientY;
        // Drag up (dy<0) = look higher = increase viewY
        viewY -= dy / H() * 2.0;
        // Drag right (dx>0) = look right = increase viewX
        viewX += dx / W() * 1.5;
        e.preventDefault();
    }, {passive: false});

    panZone.addEventListener('pointerup', e => {
        if (e.pointerId !== panTouchId) return;
        panTouchId = null;
    });
    panZone.addEventListener('pointercancel', e => {
        if (e.pointerId !== panTouchId) return;
        panTouchId = null;
    });

    // ===== Joystick (character movement) =====
    const input = { x: 0, y: 0, jump: false };
    const jZone = document.getElementById('joystick-zone');
    const jKnob = document.getElementById('joystick-knob');
    let joyTouchId = null, joyX0 = 0, joyY0 = 0;

    jZone.addEventListener('pointerdown', e => {
        joyTouchId = e.pointerId;
        joyX0 = e.clientX; joyY0 = e.clientY;
        jKnob.style.background='rgba(255,255,255,.8)';
        jZone.setPointerCapture(e.pointerId);
        e.preventDefault(); e.stopPropagation();
    }, {passive:false});
    jZone.addEventListener('pointermove', e => {
        if (e.pointerId !== joyTouchId) return;
        const dx=Math.max(-45,Math.min(45,e.clientX-joyX0));
        const dy=Math.max(-45,Math.min(45,e.clientY-joyY0));
        jKnob.style.transform=`translate(${dx}px,${dy}px)`;
        input.x=dx/45;
        input.y=-dy/45; // up = positive
        e.stopPropagation();
    });
    jZone.addEventListener('pointerup', e => {
        if (e.pointerId !== joyTouchId) return;
        joyTouchId = null;
        jKnob.style.transform='translate(0,0)';
        jKnob.style.background='rgba(255,255,255,.5)';
        input.x=0; input.y=0;
        e.stopPropagation();
    });
    jZone.addEventListener('pointercancel', e => {
        if (e.pointerId !== joyTouchId) return;
        joyTouchId = null;
        jKnob.style.transform='translate(0,0)';
        jKnob.style.background='rgba(255,255,255,.5)';
        input.x=0; input.y=0;
    });

    // ===== Jump Button =====
    const jBtn = document.getElementById('jump-btn');
    jBtn.addEventListener('pointerdown', e=>{
        input.jump=true; jBtn.classList.add('pressed');
        e.preventDefault(); e.stopPropagation();
    },{passive:false});
    jBtn.addEventListener('pointerup', e=>{ jBtn.classList.remove('pressed'); e.stopPropagation(); });
    jBtn.addEventListener('pointercancel', e=>{ jBtn.classList.remove('pressed'); });

    // ===== Keyboard =====
    window.addEventListener('keydown', e=>{
        if(e.key==='ArrowUp'||e.key==='w')input.y=1;
        if(e.key==='ArrowDown'||e.key==='s')input.y=-1;
        if(e.key==='ArrowLeft'||e.key==='a')input.x=-1;
        if(e.key==='ArrowRight'||e.key==='d')input.x=1;
        if(e.key===' ')input.jump=true;
        // Mouse wheel for camera pan on desktop
    });
    window.addEventListener('keyup', e=>{
        if(['ArrowUp','w','ArrowDown','s'].includes(e.key))input.y=0;
        if(['ArrowLeft','a','ArrowRight','d'].includes(e.key))input.x=0;
    });
    // Mouse wheel for desktop camera pan
    window.addEventListener('wheel', e=>{
        viewY += e.deltaY * 0.002;
        e.preventDefault();
    }, {passive:false});

    // ===== Game State =====
    const clock = new THREE.Clock();
    let state = 'CLIMB', fallVY = 0, deaths = 0;
    let deathTimer = 0;
    const dbg = document.getElementById('debug-info');
    const halfVisW = camZ * Math.tan(THREE.MathUtils.degToRad(VFOV/2)) * (W()/H());

    // Character starts at screen center (viewY=0.5 means screen shows y=0..1, center=0.5)
    character.root.position.set(0, 0.5, 0);

    function tick() {
        requestAnimationFrame(tick);
        const dt = Math.min(clock.getDelta(), 0.05);
        const t = clock.getElapsedTime();
        const pos = character.root.position;

        analyzer.analyze(t * 1000);

        // ===== Game Logic =====
        switch (state) {
            case 'CLIMB':
                if (Math.abs(input.y) > 0.1 || Math.abs(input.x) > 0.1) {
                    character.setState('CLIMB');
                    pos.y += input.y * 0.04 * dt;
                    if (pos.y < 0.02) pos.y = 0.02;
                    pos.x += input.x * 0.03 * dt;
                    pos.x = Math.max(-halfVisW + 0.02, Math.min(halfVisW - 0.02, pos.x));
                } else {
                    character.setState('IDLE');
                }
                if (input.jump) {
                    input.jump = false;
                    state = 'JUMPING';
                    character.setState('JUMP');
                    character.root.rotation.y = 0;
                    fallVY = 0.4;
                    deaths++;
                }
                break;

            case 'JUMPING':
                fallVY -= 1.8 * dt; // gravity
                pos.y += fallVY * dt;
                pos.z += 0.2 * dt; // slightly toward camera
                if (pos.y <= 0.01) {
                    pos.y = 0.01;
                    fallVY = 0;
                    state = 'DEAD';
                    character.setState('DEATH');
                    deathTimer = 4.0;
                    blood.spawn(pos.clone());
                    blood.spawn(pos.clone().add(new THREE.Vector3(0, 0.02, 0)));
                    blood.spawn(pos.clone().add(new THREE.Vector3(0.01, 0.005, 0)));
                }
                break;

            case 'DEAD':
                deathTimer -= dt;
                if (deathTimer <= 0) {
                    state = 'CLIMB';
                    pos.set(0, 0.5, 0);
                    character.root.rotation.y = Math.PI;
                    character.setState('IDLE');
                    viewY = 0.5; // reset camera to center
                }
                break;
        }
        input.jump = false;

        if (state === 'CLIMB') character.root.rotation.y = Math.PI;

        // ===== Camera =====
        if (state === 'JUMPING' || state === 'DEAD') {
            // During jump/death: camera smoothly tracks the character
            // so the falling body / corpse is always visible
            // Target: character at screen center
            const targetY = pos.y + 0.1; // slightly above character so corpse is centered
            viewY += (targetY - viewY) * 0.04; // slow smooth pan down
            if (gyro.enabled) {
                viewX = gyro.smoothX;
            }
        } else {
            // Normal climb: gyro or touch controls camera
            if (gyro.enabled) {
                viewY = gyro.smoothY;
                viewX = gyro.smoothX;
            }
        }

        // Clamp
        viewY = Math.max(-0.2, viewY);

        // Smooth camera to target position
        camera.position.x += (viewX - camera.position.x) * 0.08;
        camera.position.y += (viewY - camera.position.y) * 0.08;
        camera.lookAt(camera.position.x, camera.position.y, 0);

        // Update systems
        character.update(dt, input.y);
        blood.update(dt);

        // ===== Debug =====
        const screenBottom = camera.position.y - 0.5;
        const screenTop = camera.position.y + 0.5;
        const charVisible = pos.y >= screenBottom && pos.y <= screenTop;

        dbg.innerHTML = [
            `角色: y${pos.y.toFixed(2)} | ${state}`,
            `鏡頭: ${camera.position.y.toFixed(2)} (見 ${screenBottom.toFixed(1)}~${screenTop.toFixed(1)})`,
            `角色${charVisible ? '在螢幕內' : '在螢幕外'}`,
            gyro.enabled
                ? `陀螺儀: β${gyro.rawBeta.toFixed(0)}° γ${gyro.rawGamma.toFixed(0)}° → ${viewX.toFixed(1)},${viewY.toFixed(1)}`
                : `陀螺儀: OFF [${gyro.status}] (用手指拖曳)`,
            `Blood: ${blood.particles.length} | Deaths: ${deaths}`,
        ].join('<br>');

        renderer.render(scene, camera);
    }

    function onResize() {
        camera.aspect = W()/H();
        camera.updateProjectionMatrix();
        renderer.setSize(W(), H());
        layoutUI();
    }
    window.addEventListener('resize', onResize);
    window.addEventListener('orientationchange', ()=>setTimeout(onResize,300));
    if(window.visualViewport) window.visualViewport.addEventListener('resize', onResize);

    tick();
}

main().catch(e=>{
    console.error(e);
    document.getElementById('loading-status').textContent='錯誤: '+e.message;
});
</script>
</body>
</html>
