<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
import { DRACOLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/DRACOLoader.js';

const W = () => window.innerWidth;
const H = () => window.innerHeight;
const clamp = (v,lo,hi) => Math.max(lo, Math.min(hi, v));

// ===== VHS noise =====
const noiseCanvas = document.getElementById('vhs-noise');
const noiseCtx = noiseCanvas.getContext('2d');
let noiseFrame = 0;
function updateNoise() {
  noiseFrame++;
  if (noiseFrame % 3 !== 0) return;
  const w = 64, h = 64;
  noiseCanvas.width = w; noiseCanvas.height = h;
  const img = noiseCtx.createImageData(w, h);
  const d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    const v = Math.random() * 255;
    d[i] = d[i+1] = d[i+2] = v; d[i+3] = 50;
  }
  noiseCtx.putImageData(img, 0, 0);
}

// ===== Persistence / API =====
const apiParam = new URLSearchParams(location.search).get('api');
if (apiParam) localStorage.setItem('PLANT_API_URL', apiParam.replace(/\/$/,''));
const API_BASE = localStorage.getItem('PLANT_API_URL') || '';
const STORAGE_KEY = 'urban_legend_plants_v1';

async function loadEntries() {
  if (API_BASE) {
    try {
      const res = await fetch(API_BASE + '/api/entries');
      if (res.ok) return await res.json();
    } catch (e) {}
  }
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return [];
  try { return JSON.parse(raw); } catch { return []; }
}
async function createEntry(text) {
  if (API_BASE) {
    try {
      const res = await fetch(API_BASE + '/api/entries', {
        method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ text })
      });
      if (res.ok) { const d = await res.json(); return d.id || null; }
    } catch (e) {}
  }
  const list = await loadEntries();
  const id = Date.now().toString();
  list.push({ id, text, part: null, createdAt: new Date().toISOString() });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  return id;
}
async function finalizeEntry(id, part, text) {
  if (API_BASE) {
    try {
      await fetch(API_BASE + `/api/entries/${id}`, {
        method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ part, text })
      });
      return;
    } catch (e) {}
  }
  const list = await loadEntries();
  const idx = list.findIndex(e => e.id === id);
  if (idx >= 0) { list[idx].part = part; list[idx].text = text || list[idx].text; }
  else list.push({ id, text: text||'', part, createdAt: new Date().toISOString() });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

// ===== Text -> DNA =====
function hashString(str) {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h += (h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24); }
  return h >>> 0;
}
function seededRandom(seed) {
  let s = seed >>> 0;
  return () => { s = (s * 1664525 + 1013904223) >>> 0; return (s & 0xffffffff) / 0x100000000; };
}
function pick(arr, r) { return arr[Math.floor(r() * arr.length)]; }
function randColor(r) {
  return `hsl(${Math.floor(r()*360)},${60+Math.floor(r()*30)}%,${40+Math.floor(r()*30)}%)`;
}

function generateDNAFromText(text) {
  const seed = hashString(text);
  const r = seededRandom(seed);
  return {
    name:'Mutation', description:'',
    plantType: pick(['vine','fern','fungus','flower_stalk','bush'], r),
    complexity: 2 + Math.floor(r()*8),
    growthDirection: { x: r()*2-1, y: r()*0.8+0.2, z: r()*2-1 },
    stemColor: randColor(r), leafColor: randColor(r), fruitColor: randColor(r),
    hasLeaves: true, hasFruits: true,
    fruitType: pick(['balloon_flower','lotus_flower','tubular_flower','jellyfish_flower','daisy_flower','fungus_cap','giant_flower'], r),
    leafType: pick(['glass_leaf','wire_leaf','fern','broad','needle'], r),
    growthStyle: pick(['straight','twining','erratic','drooping'], r)
  };
}

// ===== Procedural plant generation =====
function generateProceduralPlant(dna) {
  const stems = [], fruits = [], leaves = [];
  const startPt = new THREE.Vector3(0,0,0);
  const gx = Number(dna.growthDirection?.x)||0, gy = Number(dna.growthDirection?.y)||1, gz = Number(dna.growthDirection?.z)||0;
  const dir = new THREE.Vector3(gx,gy,gz).normalize();
  if (isNaN(dir.x)||isNaN(dir.y)||isNaN(dir.z)||dir.lengthSq()===0) dir.set(0,1,0);
  const length = 10 + dna.complexity * 1.5;
  let endPt = startPt.clone();
  const style = dna.growthStyle || 'straight';

  const generateCurve = (start, direction, len, waviness, segments, curveStyle='straight') => {
    const curve = [];
    let current = start.clone();
    curve.push({ x:current.x, y:current.y, z:current.z });
    const step = len / segments;
    let perp1 = new THREE.Vector3(1,0,0).cross(direction).normalize();
    if (perp1.lengthSq() < 0.1) perp1 = new THREE.Vector3(0,1,0).cross(direction).normalize();
    const perp2 = direction.clone().cross(perp1).normalize();
    for (let i = 1; i <= segments; i++) {
      const t = i / segments;
      current.add(direction.clone().multiplyScalar(step));
      let pt = current.clone();
      if (curveStyle === 'twining') {
        const radius = waviness * 2;
        const angle = t * Math.PI * 10;
        pt.add(perp1.clone().multiplyScalar(Math.cos(angle)*radius).add(perp2.clone().multiplyScalar(Math.sin(angle)*radius)));
      } else if (curveStyle === 'erratic') {
        pt.add(perp1.clone().multiplyScalar((Math.random()-0.5)*waviness*4).add(perp2.clone().multiplyScalar((Math.random()-0.5)*waviness*4)));
      } else {
        const w1 = Math.sin(t*Math.PI*4)*waviness*(1-t);
        const w2 = Math.cos(t*Math.PI*3)*waviness*(1-t);
        pt.add(perp1.clone().multiplyScalar(w1).add(perp2.clone().multiplyScalar(w2)));
      }
      if (curveStyle === 'drooping' || direction.y < 0.2) pt.y -= t*t*len*0.5;
      curve.push({ x:pt.x, y:pt.y, z:pt.z });
    }
    return { curve, end: current };
  };

  if (dna.plantType === 'vine' || dna.plantType === 'flower_stalk') {
    const { curve, end } = generateCurve(startPt, dir, length, 2, 20, style);
    stems.push(curve); endPt = end;
    const numLeaves = Math.floor(dna.complexity * 1.5);
    for (let i = 0; i < numLeaves; i++) {
      const t = 0.1 + Math.random()*0.8;
      const idx = Math.floor(t * curve.length);
      if (idx < curve.length) {
        const p = curve[idx];
        leaves.push({ position:p, direction:{ x:Math.random()-0.5, y:Math.random()-0.5, z:Math.random()-0.5 }, type:dna.leafType, color:dna.leafColor, scale:0.8+Math.random()*0.4 });
      }
    }
    const numBranches = Math.floor(dna.complexity / 2);
    for (let i = 0; i < numBranches; i++) {
      const t = 0.2 + Math.random()*0.6;
      const idx = Math.floor(t * curve.length);
      const bs = new THREE.Vector3(curve[idx].x, curve[idx].y, curve[idx].z);
      let axis = new THREE.Vector3(Math.random(), Math.random(), Math.random()).normalize();
      if (axis.lengthSq() < 0.001) axis.set(0,1,0);
      const bDir = dir.clone().applyAxisAngle(axis, Math.PI/3).normalize();
      const { curve:bC, end:bE } = generateCurve(bs, bDir, length*0.4*Math.random(), 1, 10, style==='twining'?'straight':style);
      stems.push(bC);
      if (Math.random()>0.1) leaves.push({ position:bE, direction:bDir, type:dna.leafType, color:dna.leafColor, scale:1 });
      if (Math.random()>0.2) fruits.push({ position:bE, direction:bDir, type:dna.fruitType, color:dna.fruitColor, scale:0.8 });
    }
    fruits.push({ position:endPt, direction:dir, type:dna.fruitType, color:dna.fruitColor, scale:1.5 });
  } else if (dna.plantType === 'bush' || dna.plantType === 'fern') {
    const numStems = 3 + Math.floor(dna.complexity/2);
    let highestY = -Infinity;
    for (let i = 0; i < numStems; i++) {
      const spreadDir = dir.clone().applyAxisAngle(new THREE.Vector3(0,1,0), (i/numStems)*Math.PI*2+Math.random()*0.5);
      spreadDir.y += 0.5; spreadDir.normalize();
      const { curve, end } = generateCurve(startPt, spreadDir, length*(0.6+Math.random()*0.4), 1.5, 15, style);
      stems.push(curve);
      if (end.y > highestY) { highestY = end.y; endPt = end; }
      if (dna.plantType === 'fern') {
        for (let j = 2; j < curve.length-1; j += 2) {
          const p = curve[j];
          const pDir = new THREE.Vector3(p.x-curve[j-1].x, p.y-curve[j-1].y, p.z-curve[j-1].z).normalize();
          let s1 = pDir.clone().cross(new THREE.Vector3(0,1,0)).normalize();
          if (s1.lengthSq()<0.001) s1 = pDir.clone().cross(new THREE.Vector3(1,0,0)).normalize();
          if (s1.lengthSq()<0.001) s1.set(1,0,0);
          leaves.push({ position:p, direction:s1, type:'fern', color:dna.leafColor, scale:0.5*(1-j/curve.length) });
          leaves.push({ position:p, direction:{x:-s1.x,y:-s1.y,z:-s1.z}, type:'fern', color:dna.leafColor, scale:0.5*(1-j/curve.length) });
        }
      } else {
        leaves.push({ position:end, direction:spreadDir, type:dna.leafType, color:dna.leafColor, scale:1.2 });
      }
      if (Math.random()>0.3) fruits.push({ position:end, direction:spreadDir, type:dna.fruitType, color:dna.fruitColor, scale:1 });
    }
  } else if (dna.plantType === 'fungus') {
    const { curve, end } = generateCurve(startPt, dir, length*0.5, 0.5, 10, style);
    stems.push(curve); endPt = end;
    fruits.push({ position:end, direction:dir, type:'fungus_cap', color:dna.fruitColor, scale:2+dna.complexity*0.2 });
    for (let i = 0; i < Math.floor(dna.complexity/3); i++) {
      const off = new THREE.Vector3((Math.random()-0.5)*4, 0, (Math.random()-0.5)*4);
      const { curve:sc, end:se } = generateCurve(startPt.clone().add(off), new THREE.Vector3(0,1,0), length*0.2, 0.2, 5, style);
      stems.push(sc);
      fruits.push({ position:se, direction:{x:0,y:1,z:0}, type:'fungus_cap', color:dna.fruitColor, scale:0.8 });
    }
  }
  return { stems, fruits, leaves, endPoint:{ x:endPt.x, y:endPt.y, z:endPt.z } };
}

// ===== Low-poly plant materials =====
function lpMat(color) {
  return new THREE.MeshStandardMaterial({ color, flatShading:true, roughness:0.7, metalness:0.05, side:THREE.DoubleSide });
}
function lpGlow(color) {
  return new THREE.MeshStandardMaterial({ color, emissive:color, emissiveIntensity:1.5, flatShading:true });
}
function lpDark(color) {
  return new THREE.MeshStandardMaterial({ color, flatShading:true, roughness:0.9, metalness:0.0 });
}

// Shared low-poly geometries (reused across all plants)
const geoIco1 = new THREE.IcosahedronGeometry(1, 1);
const geoIco0 = new THREE.IcosahedronGeometry(1, 0);
const geoCone = new THREE.ConeGeometry(1, 1, 5);
const geoCyl = new THREE.CylinderGeometry(1, 1, 1, 5);
const geoOcta = new THREE.OctahedronGeometry(1, 0);
const geoDode = new THREE.DodecahedronGeometry(1, 0);

// ===== Fruit renderer (low-poly) =====
function createFruit(f) {
  const g = new THREE.Group();
  const mat = lpMat(f.color);
  const lightC = new THREE.Color(f.color).lerp(new THREE.Color('#ffffff'), 0.4);
  const lightMat = lpMat('#'+lightC.getHexString());

  if (f.type === 'balloon_flower' || !f.type) {
    for (let i = 0; i < 6; i++) {
      const pg = new THREE.Group(); pg.rotation.y = (i*Math.PI*2)/6;
      const p = new THREE.Mesh(geoIco1, mat);
      p.scale.set(0.7, 0.12, 0.4); p.position.set(1.0, 0, 0); p.rotation.z = 0.2;
      pg.add(p); g.add(pg);
    }
    for (let i = 0; i < 4; i++) {
      const pg = new THREE.Group(); pg.rotation.y = (i*Math.PI*2)/4 + 0.4;
      const p = new THREE.Mesh(geoIco0, lightMat);
      p.scale.set(0.5, 0.1, 0.3); p.position.set(0.6, 0.15, 0); p.rotation.z = 0.3;
      pg.add(p); g.add(pg);
    }
    // Stamens
    for (let i = 0; i < 5; i++) {
      const a = (i/5)*Math.PI*2;
      const st = new THREE.Mesh(geoCyl, lpDark('#eedd88'));
      st.scale.set(0.03, 0.6, 0.03); st.position.set(Math.cos(a)*0.15, 0.5, Math.sin(a)*0.15);
      g.add(st);
      const tip = new THREE.Mesh(geoIco0, lpGlow('#FFD700'));
      tip.scale.setScalar(0.08); tip.position.set(Math.cos(a)*0.15, 0.85, Math.sin(a)*0.15);
      g.add(tip);
    }
    const cc = new THREE.Mesh(geoIco0, lpGlow('#FFD700'));
    cc.scale.setScalar(0.2); g.add(cc);

  } else if (f.type === 'lotus_flower') {
    for (let layer = 0; layer < 3; layer++) {
      const n = [8,6,4][layer]; const r = [1.6,1.1,0.6][layer];
      const m = layer===2 ? lightMat : mat;
      for (let i = 0; i < n; i++) {
        const pg = new THREE.Group(); pg.rotation.y = (i*Math.PI*2)/n + layer*0.2;
        const p = new THREE.Mesh(geoIco1, m);
        p.scale.set(0.55, 0.08, 0.3); p.position.set(r*0.7, layer*0.2, 0); p.rotation.z = 0.1+layer*0.15;
        pg.add(p); g.add(pg);
      }
    }
    for (let i = 0; i < 8; i++) {
      const a = (i/8)*Math.PI*2;
      const st = new THREE.Mesh(geoCyl, lpDark('#ddcc66'));
      st.scale.set(0.025, 0.8, 0.025); st.position.set(Math.cos(a)*0.2, 0.6, Math.sin(a)*0.2);
      st.rotation.x = (Math.random()-0.5)*0.3; st.rotation.z = (Math.random()-0.5)*0.3;
      g.add(st);
      const tip = new THREE.Mesh(geoOcta, lpGlow('#ff6644'));
      tip.scale.setScalar(0.06); tip.position.set(Math.cos(a)*0.2, 1.05, Math.sin(a)*0.2);
      g.add(tip);
    }

  } else if (f.type === 'tubular_flower') {
    for (let i = 0; i < 10; i++) {
      const a = (i*Math.PI*2)/10;
      const h = 1.2+Math.random()*0.6;
      const tube = new THREE.Mesh(geoCyl, mat);
      tube.scale.set(0.08, h*0.5, 0.08);
      tube.position.set(Math.cos(a)*0.8, h*0.35, Math.sin(a)*0.8);
      tube.rotation.x = Math.cos(a)*0.3; tube.rotation.z = -Math.sin(a)*0.3;
      g.add(tube);
      const tip = new THREE.Mesh(geoIco0, lpGlow('#ffffff'));
      tip.scale.setScalar(0.1); tip.position.set(Math.cos(a)*1.1, h*0.7, Math.sin(a)*1.1);
      g.add(tip);
    }
    const core = new THREE.Mesh(geoIco1, lpGlow(f.color));
    core.scale.setScalar(0.3); g.add(core);

  } else if (f.type === 'jellyfish_flower') {
    const bell = new THREE.Mesh(geoIco1, mat);
    bell.scale.set(1.2, 0.7, 1.2); bell.position.y = 0.3; g.add(bell);
    const inner = new THREE.Mesh(geoIco0, lightMat);
    inner.scale.set(0.8, 0.4, 0.8); inner.position.y = 0.35; g.add(inner);
    for (let i = 0; i < 8; i++) {
      const a = (i*Math.PI*2)/8;
      const r = 0.7;
      const tent = new THREE.Mesh(geoCyl, mat);
      tent.scale.set(0.04, 1.5, 0.04);
      tent.position.set(Math.cos(a)*r, -0.7, Math.sin(a)*r);
      tent.rotation.x = Math.cos(a)*0.15; tent.rotation.z = -Math.sin(a)*0.15;
      g.add(tent);
    }
    const core = new THREE.Mesh(geoIco0, lpGlow('#ffe0ff'));
    core.scale.setScalar(0.2); g.add(core);

  } else if (f.type === 'daisy_flower') {
    for (let i = 0; i < 10; i++) {
      const pg = new THREE.Group(); pg.rotation.y = (i*Math.PI*2)/10;
      const p = new THREE.Mesh(geoIco0, mat);
      p.scale.set(0.45, 0.08, 0.2); p.position.set(0.55, 0, 0);
      pg.add(p); g.add(pg);
    }
    const center = new THREE.Mesh(geoDode, lpGlow('#FFD700'));
    center.scale.set(0.25, 0.12, 0.25); center.position.y = 0.05; g.add(center);

  } else if (f.type === 'fungus_cap') {
    const cap = new THREE.Mesh(geoIco1, mat);
    cap.scale.set(1.5, 0.5, 1.5); g.add(cap);
    const under = new THREE.Mesh(geoIco1, lpDark('#222222'));
    under.scale.set(1.3, 0.15, 1.3); under.position.y = -0.25; g.add(under);
    // Gills
    for (let i = 0; i < 8; i++) {
      const a = (i*Math.PI*2)/8;
      const gill = new THREE.Mesh(new THREE.PlaneGeometry(1, 0.3), lpDark(f.color));
      gill.position.set(Math.cos(a)*0.4, -0.2, Math.sin(a)*0.4);
      gill.rotation.y = a; gill.rotation.x = Math.PI/2;
      g.add(gill);
    }
    const core = new THREE.Mesh(geoIco0, lpGlow(f.color));
    core.scale.setScalar(0.15); g.add(core);

  } else if (f.type === 'giant_flower') {
    for (let layer = 0; layer < 3; layer++) {
      const n = [10,7,4][layer]; const r = [1.8,1.3,0.7][layer];
      const m = [mat, lightMat, lpMat('#ffe8f0')][layer];
      for (let i = 0; i < n; i++) {
        const pg = new THREE.Group(); pg.rotation.y = (i*Math.PI*2)/n + layer*0.25;
        const p = new THREE.Mesh(geoIco1, m);
        p.scale.set(0.5, 0.08, 0.35); p.position.set(r*0.7, layer*0.25, 0); p.rotation.z = 0.1+layer*0.15;
        pg.add(p); g.add(pg);
      }
    }
    for (let i = 0; i < 8; i++) {
      const a = (i/8)*Math.PI*2;
      const st = new THREE.Mesh(geoCyl, lpDark('#ddaa88'));
      st.scale.set(0.03, 1.0, 0.03); st.position.set(Math.cos(a)*0.2, 0.8, Math.sin(a)*0.2);
      g.add(st);
      const tip = new THREE.Mesh(geoOcta, lpGlow('#ff3300'));
      tip.scale.setScalar(0.07); tip.position.set(Math.cos(a)*0.2, 1.35, Math.sin(a)*0.2);
      g.add(tip);
    }
    const core = new THREE.Mesh(geoDode, lpGlow('#FFAA00'));
    core.scale.setScalar(0.35); g.add(core);
  }

  g.scale.setScalar(f.scale || 1);
  return g;
}

// ===== Leaf renderer (low-poly) =====
function createLeaf(l) {
  const g = new THREE.Group();
  const mat = lpMat(l.color);

  if (l.type === 'glass_leaf' || !l.type) {
    const lf = new THREE.Mesh(geoIco1, mat);
    lf.scale.set(0.6, 0.06, 1.2); lf.position.set(0, 0, 1.2); lf.rotation.z = 0.2;
    g.add(lf);
    const vein = new THREE.Mesh(geoCyl, lpDark(l.color));
    vein.scale.set(0.03, 2.2, 0.03); vein.position.set(0, 0.03, 1.1); vein.rotation.x = Math.PI/2;
    g.add(vein);
  } else if (l.type === 'wire_leaf') {
    for (let i = 0; i < 4; i++) {
      const st = new THREE.Mesh(geoCyl, lpDark(l.color));
      const h = 1.5+Math.random();
      st.scale.set(0.025, h, 0.025);
      st.position.set((Math.random()-0.5)*0.5, h*0.5, (Math.random()-0.5)*0.5);
      st.rotation.x = (Math.random()-0.5)*0.4; st.rotation.z = (Math.random()-0.5)*0.4;
      g.add(st);
      const tip = new THREE.Mesh(geoIco0, lpGlow(l.color));
      tip.scale.setScalar(0.06); tip.position.set(st.position.x, h, st.position.z);
      g.add(tip);
    }
  } else if (l.type === 'fern') {
    const stem = new THREE.Mesh(geoCyl, mat);
    stem.scale.set(0.05, 2.5, 0.05); stem.position.y = 1.25; g.add(stem);
    for (let i = 0; i < 6; i++) {
      const y = 0.3+i*0.35; const sz = 0.4*(1-i/8);
      for (let side of [-1,1]) {
        const lf = new THREE.Mesh(geoIco0, mat);
        lf.scale.set(sz*0.6, sz*0.06, sz*0.25);
        lf.position.set(side*0.3*sz, y, 0); lf.rotation.z = side*(-0.2);
        g.add(lf);
      }
    }
  } else if (l.type === 'broad') {
    const lf = new THREE.Mesh(geoIco1, mat);
    lf.scale.set(1.0, 0.06, 1.8); lf.position.set(0, 0, 1.2); g.add(lf);
  } else if (l.type === 'needle') {
    for (let i = 0; i < 4; i++) {
      const n = new THREE.Mesh(geoCone, mat);
      n.scale.set(0.06, 1.5+Math.random()*0.5, 0.06);
      n.position.set((Math.random()-0.5)*0.2, 0.8+Math.random()*0.3, (Math.random()-0.5)*0.2);
      n.rotation.x = (Math.random()-0.5)*0.3; n.rotation.z = (Math.random()-0.5)*0.3;
      g.add(n);
    }
  }

  g.scale.setScalar(l.scale || 1);
  return g;
}

// ===== Build plant mesh =====
function buildPlantPartMesh(part) {
  const group = new THREE.Group();
  // Stems as low-poly tubes
  for (const stemData of part.stems) {
    if (stemData.length < 2) continue;
    const pts = stemData.map(p => new THREE.Vector3(p.x, p.y, p.z))
      .filter((p,i,arr) => i===0 || p.distanceToSquared(arr[i-1]) > 0.0001);
    if (pts.length < 2) continue;
    const curve = new THREE.CatmullRomCurve3(pts);
    const radius = Math.max(0.06, 0.18 - part.stems.length * 0.008);
    const mesh = new THREE.Mesh(new THREE.TubeGeometry(curve, 12, radius, 4, false), lpMat(part.stemColor));
    mesh.castShadow = true;
    mesh.userData.entryText = part.textInput;
    group.add(mesh);
  }
  for (const f of part.fruits) {
    const pos = new THREE.Vector3(f.position?.x||0, f.position?.y||0, f.position?.z||0);
    const dir = new THREE.Vector3(f.direction?.x||0, f.direction?.y||1, f.direction?.z||0).normalize();
    if (dir.lengthSq() < 0.001) dir.set(0,1,0);
    const fruitMesh = createFruit(f);
    fruitMesh.position.copy(pos);
    fruitMesh.quaternion.copy(new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0), dir));
    fruitMesh.userData.entryText = part.textInput;
    group.add(fruitMesh);
  }
  for (const l of part.leaves) {
    const pos = new THREE.Vector3(l.position?.x||0, l.position?.y||0, l.position?.z||0);
    const dir = new THREE.Vector3(l.direction?.x||0, l.direction?.y||1, l.direction?.z||0).normalize();
    if (dir.lengthSq() < 0.001) dir.set(0,1,0);
    const leafMesh = createLeaf(l);
    leafMesh.position.copy(pos);
    leafMesh.quaternion.copy(new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0), dir));
    leafMesh.userData.entryText = part.textInput;
    group.add(leafMesh);
  }
  return group;
}

const assetWeight = { building:0.60, charIdle:0.18, charJump:0.10, charDrink:0.05, charTex:0.07 };
function updateProgress() {
  let total = 0;
  for (const k of Object.keys(assetProg)) total += assetProg[k] * (assetWeight[k]||0);
  const pct = Math.min(100, Math.floor(total * 100));

}

const buildingPromise = new Promise(resolve => {
  const gl = new GLTFLoader();
  const dr = new DRACOLoader();
  dr.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');
  gl.setDRACOLoader(dr);
  gl.load('./building/building.glb', gltf => {
    const obj = gltf.scene;
    building = obj;
    buildingGroup.remove(fallbackBldg);
    const box = new THREE.Box3().setFromObject(obj);
    const sz = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(sz.x, sz.z);
    const scale = 4 / maxDim;
    obj.scale.setScalar(scale);
    const box2 = new THREE.Box3().setFromObject(obj);
    obj.position.y = -box2.min.y;
    // Decimate building meshes to reduce poly count
    obj.traverse(c => {
      if (c.isMesh && c.geometry) {
        const geo = c.geometry;
        const pos = geo.attributes.position;
        if (pos && pos.count > 5000) {
          // Simple vertex decimation: keep every Nth vertex via new indexed geometry
          const stride = Math.ceil(pos.count / 3000);
          if (stride > 1 && geo.index) {
            // Just use flat shading to give low-poly look without losing shape
            if (c.material) {
              if (Array.isArray(c.material)) c.material.forEach(m => { m.flatShading = true; m.needsUpdate = true; });
              else { c.material.flatShading = true; c.material.needsUpdate = true; }
            }
          }
        }
        // Apply flat shading to all building meshes for consistent low-poly look
        if (c.material) {
          if (Array.isArray(c.material)) c.material.forEach(m => { m.flatShading = true; m.needsUpdate = true; });
          else { c.material.flatShading = true; c.material.needsUpdate = true; }
        }
      }
    });
    buildingGroup.add(obj);
    const box3 = new THREE.Box3().setFromObject(obj);
    rooftopY = box3.max.y;
    rooftopBounds = { minX:box3.min.x+0.15, maxX:box3.max.x-0.15, minZ:box3.min.z+0.15, maxZ:box3.max.z-0.15 };
    assetProg.building = 1; updateProgress(); resolve();
  }, onProg('building'), err => {
    console.warn('Building load error:', err);
    assetProg.building = 1; updateProgress(); resolve();
  });
});

// ===== Character =====
class GameCharacter {
  constructor(scene) {
    this.scene = scene; this.root = new THREE.Group(); scene.add(this.root);
    this.mixer = null; this.anims = {}; this.curAction = null; this.curState = 'IDLE';
    this.charHeight = 0.066; this.loaded = false; this.drinkDuration = 1.0;
  }
  async load() {
    const gl = new GLTFLoader();
    const dr = new DRACOLoader();
    dr.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');
    gl.setDRACOLoader(dr);
    const texLoader = new THREE.TextureLoader();

    let skinTex = null;
    try {
      skinTex = await new Promise((r,j) => texLoader.load('./playermodel/tripo_model_basecolor.JPEG', r, onProg('charTex'), j));
      assetProg.charTex = 1; updateProgress();
    } catch { assetProg.charTex = 1; updateProgress(); }
    if (skinTex) { skinTex.flipY = false; skinTex.colorSpace = THREE.SRGBColorSpace; }

    const loadG = (url, key) => new Promise((r,j) => gl.load(url, g => {
      assetProg[key] = 1; updateProgress(); r(g);
    }, onProg(key), e => { assetProg[key] = 1; updateProgress(); j(e); }));

    const idleG = await loadG('./playermodel/idle.glb', 'charIdle');
    const model = idleG.scene;
    const box = new THREE.Box3().setFromObject(model);
    const sc = this.charHeight / box.getSize(new THREE.Vector3()).y;
    model.scale.setScalar(sc);
    const box2 = new THREE.Box3().setFromObject(model);
    model.position.y = -box2.min.y;
    model.traverse(c => {
      if (c.isMesh) {
        c.material = new THREE.MeshStandardMaterial({ map:skinTex||null, roughness:0.8, metalness:0.1, flatShading:true });
        c.frustumCulled = false;
      }
    });
    this.model3D = model; this.root.add(model);
    this.mixer = new THREE.AnimationMixer(model);
    const strip = clip => { clip.tracks = clip.tracks.filter(t => !/(Hips|RootNode)\.(position|quaternion)/i.test(t.name)); };

    if (idleG.animations.length) {
      strip(idleG.animations[0]);
      this.anims['IDLE'] = this.mixer.clipAction(idleG.animations[0]);
      this.anims['IDLE'].play(); this.curAction = this.anims['IDLE'];
    }

    // Load all other animations as GLB (tiny files, all in parallel)
    const animLoads = [
      loadG('./playermodel/jump.glb', 'charJump').then(g => {
        if (g.animations.length) {
          strip(g.animations[0]);
          this.anims['JUMP'] = this.mixer.clipAction(g.animations[0]);
          this.anims['JUMP'].setLoop(THREE.LoopOnce); this.anims['JUMP'].clampWhenFinished = true;
        }
      }).catch(() => {}),
      loadG('./playermodel/drinking.glb', 'charDrink').then(g => {
        if (g.animations.length) {
          const clip = g.animations[0];
          strip(clip);
          // Trim to second half only (hand raising part)
          const halfTime = clip.duration * 0.5;
          clip.tracks.forEach(track => {
            const times = track.times;
            const values = track.values;
            const stride = values.length / times.length;
            let startIdx = 0;
            for (let i = 0; i < times.length; i++) {
              if (times[i] >= halfTime) { startIdx = i; break; }
            }
            track.times = Float32Array.from(Array.from(times).slice(startIdx).map(t => t - halfTime));
            track.values = Float32Array.from(Array.from(values).slice(startIdx * stride));
          });
          clip.duration = clip.duration - halfTime;
          this.anims['DRINK'] = this.mixer.clipAction(clip);
          this.anims['DRINK'].setLoop(THREE.LoopOnce); this.anims['DRINK'].clampWhenFinished = true;
          this.drinkDuration = clip.duration;
        }
      }).catch(() => {}),
    ];
    await Promise.all(animLoads);
    // Walking animation no longer needed (auto-jump flow)

    this.loaded = true;
  }
  setState(s) {
    if (this.curState === s) return;
    this.curState = s;
    if (!this.mixer) return;
    const next = this.anims[s];
    if (!next) return;
    if (this.curAction && this.curAction !== next) { next.reset().play(); next.crossFadeFrom(this.curAction, 0.2, true); }
    else next.reset().play();
    this.curAction = next;
  }
  update(dt) { if (this.mixer) this.mixer.update(dt); }
}

function addPlantPart(part, grow=true) {
  const mesh = buildPlantPartMesh(part);
  mesh.userData.partId = part.id;
  mesh.userData.entryText = part.textInput;
  mesh.position.set(part.worldX||0, part.worldY||0, part.worldZ||0);

  else mesh.scale.setScalar(PLANT_SCALE);
  plantRoot.add(mesh);
  plantParts.push({ data:part, mesh });
}

async function loadSavedPlants() {
  const entries = await loadEntries();
  const spacing = 1.8;
  entries.forEach((entry, i) => {
    if (!entry.part) return;
    const col = (i % 5) - 2;
    const row = Math.floor(i / 5);
    entry.part.worldX = col * spacing;
    entry.part.worldY = 0;
    entry.part.worldZ = 4 + row * spacing;
    addPlantPart(entry.part, false);
  });
}

class LightBurst {
  constructor(scene) {
    this.points = [];
    this.geo = new THREE.BufferGeometry();
    this.mat = new THREE.PointsMaterial({ color:0xffe55a, size:0.06, transparent:true, opacity:1, depthWrite:false });
    this.mesh = new THREE.Points(this.geo, this.mat);
    scene.add(this.mesh);
  }
  burst(pos) {
    this.points = [];
    for (let i = 0; i < 80; i++) {
      const v = new THREE.Vector3((Math.random()-0.5)*1.2, Math.random()*1.2, (Math.random()-0.5)*1.2);
      this.points.push({ pos:pos.clone(), vel:v, life:1+Math.random()*0.6 });
    }
  }
  update(dt) {
    const verts = [];
    for (const p of this.points) {
      p.life -= dt; if (p.life <= 0) continue;
      p.vel.y -= dt*0.8;
      p.pos.add(p.vel.clone().multiplyScalar(dt));
      verts.push(p.pos.x, p.pos.y, p.pos.z);
    }
    this.points = this.points.filter(p => p.life > 0);
    this.geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
    this.geo.computeBoundingSphere();
    this.mat.opacity = this.points.length ? 0.9 : 0;
  }
}

// ===== Camera =====
let orbitYaw = 0, orbitPitch = 0.15, orbitRadius = 0.3;
let orbitTarget = new THREE.Vector3(0, 4, 0);
let userInteracting = false, interactionTimer = 0;
const pointers = new Map();
let dragStart = { x:0, y:0, yaw:0, pitch:0 };
let pinchStartDist = 0, pinchStartRadius = 6;
function pDist(a,b) { return Math.hypot(a.x-b.x, a.y-b.y); }

renderer.domElement.addEventListener('pointerdown', e => {
  pointers.set(e.pointerId, { x:e.clientX, y:e.clientY });
  renderer.domElement.setPointerCapture(e.pointerId);
  userInteracting = true; interactionTimer = 0;
  if (pointers.size === 1) dragStart = { x:e.clientX, y:e.clientY, yaw:orbitYaw, pitch:orbitPitch };
  else if (pointers.size === 2) {
    const pts = [...pointers.values()];
    pinchStartDist = pDist(pts[0], pts[1]); pinchStartRadius = orbitRadius;
  }
});
renderer.domElement.addEventListener('pointermove', e => {
  if (!pointers.has(e.pointerId)) return;
  pointers.set(e.pointerId, { x:e.clientX, y:e.clientY });
  userInteracting = true; interactionTimer = 0;
  if (pointers.size === 1) {
    orbitYaw = dragStart.yaw + (e.clientX - dragStart.x)/W()*2.2;
    orbitPitch = clamp(dragStart.pitch + (e.clientY - dragStart.y)/H()*1.4, -0.2, 1.2);
  } else if (pointers.size >= 2) {
    const pts = [...pointers.values()];
    const d = pDist(pts[0], pts[1]);
    if (pinchStartDist > 0) orbitRadius = clamp(pinchStartRadius*(pinchStartDist/d), 3.5, 12);
  }
});
renderer.domElement.addEventListener('pointerup', e => { pointers.delete(e.pointerId); });
renderer.domElement.addEventListener('pointercancel', e => { pointers.delete(e.pointerId); });

function updateCamera() {
  const cx = orbitTarget.x + orbitRadius*Math.cos(orbitPitch)*Math.sin(orbitYaw);
  const cz = orbitTarget.z + orbitRadius*Math.cos(orbitPitch)*Math.cos(orbitYaw);
  const cy = orbitTarget.y + orbitRadius*Math.sin(orbitPitch);
  camera.position.set(cx, cy, cz);
  camera.lookAt(orbitTarget);
}

// ===== Game flow =====
const uiPanel = document.getElementById('ui-panel');
const leaveBtn = document.getElementById('leave-btn');
const textInput = document.getElementById('text-input');
const popup = document.getElementById('text-popup');
const fadeOverlay = document.getElementById('fade-overlay');

let phase = 'LOADING';
let timer = 0;
let pendingText = '';
let pendingEntryId = null;
let jumpVel = new THREE.Vector3();

function worldToScreen(p) {
  const v = p.clone().project(camera);
  return { x:(v.x*0.5+0.5)*W(), y:(-v.y*0.5+0.5)*H() };
}

function startLeave() {
  const text = textInput.value.trim();
  if (!text) return;
  pendingText = text; textInput.value = '';
  createEntry(pendingText).then(id => { pendingEntryId = id; });
  const handPos = character.root.position.clone().add(new THREE.Vector3(0, character.charHeight*0.7, 0));
  const scr = worldToScreen(handPos);
  uiPanel.style.setProperty('--to-x', `${scr.x-W()/2}px`);
  uiPanel.style.setProperty('--to-y', `${scr.y-H()/2}px`);
  uiPanel.classList.add('leaving');
  phase = 'UI_SHRINK'; timer = 0;
}
leaveBtn.addEventListener('click', startLeave);
textInput.addEventListener('input', () => { leaveBtn.disabled = !textInput.value.trim(); });

function startFall() {
  phase = 'FALLING'; timer = 0;
  character.setState(character.anims['JUMP'] ? 'JUMP' : 'IDLE');
  // Jump forward off the building edge toward the landing zone
  const facing = new THREE.Vector3(0, 0, 1); // always jump toward +Z
  jumpVel.copy(facing).multiplyScalar(2); jumpVel.y = 1;
}

// Plant raycasting
const raycaster = new THREE.Raycaster();
renderer.domElement.addEventListener('pointerdown', e => {
  if (phase !== 'PLANT_VIEW' && phase !== 'INTRO') return;
  if (!plantRoot.children.length) return;
  const rect = renderer.domElement.getBoundingClientRect();
  raycaster.setFromCamera({
    x:((e.clientX-rect.left)/rect.width)*2-1,
    y:-((e.clientY-rect.top)/rect.height)*2+1
  }, camera);
  const hits = raycaster.intersectObjects(plantRoot.children, true);
  if (hits.length) {
    let obj = hits[0].object;
    while (obj && !obj.userData.entryText) obj = obj.parent;
    if (obj?.userData.entryText) {
      popup.textContent = obj.userData.entryText;
      popup.classList.add('show');
      setTimeout(() => popup.classList.remove('show'), 4000);
    }
  }
});

// ===== Init =====
async function init() {
  try {
    await Promise.all([buildingPromise, character.load()]);
  } catch (err) { console.error('Asset load error:', err); }

  await loadSavedPlants();

  character.root.position.set(0, rooftopY, 0);
  orbitTarget.copy(character.root.position);

  loadingDiv.style.display = 'none';
  phase = 'INTRO';
  uiPanel.classList.remove('hidden');
  uiPanel.classList.remove('leaving');

  tick();
}

// ===== Game loop =====
const clock = new THREE.Clock();
function tick() {
  requestAnimationFrame(tick);
  const dt = Math.min(clock.getDelta(), 0.05);
  timer += dt;
  interactionTimer += dt;
  if (interactionTimer > 1.2) userInteracting = false;

  // Camera per phase
  if (phase === 'INTRO' || phase === 'UI_SHRINK' || phase === 'DRINK') {
    // Over-shoulder close-up on rooftop
    orbitTarget.copy(character.root.position).add(new THREE.Vector3(0, 0.04, 0));
    if (!userInteracting) { orbitPitch += (0.15-orbitPitch)*0.05; orbitRadius += (0.3-orbitRadius)*0.05; }
  } else if (phase === 'TURN') {
    orbitTarget.copy(character.root.position).add(new THREE.Vector3(0, 0.04, 0));
    if (!userInteracting) { orbitPitch += (0.1-orbitPitch)*0.05; orbitRadius += (0.5-orbitRadius)*0.05; }
  } else if (phase === 'FALLING') {
    orbitTarget.copy(character.root.position);
    if (!userInteracting) { orbitPitch += (-0.1-orbitPitch)*0.05; orbitRadius += (5-orbitRadius)*0.05; }
  } else if (phase === 'IMPACT') {
    orbitTarget.lerp(character.root.position.clone().add(new THREE.Vector3(0,0.5,0)), 0.05);
    if (!userInteracting) { orbitPitch += (0.15-orbitPitch)*0.05; orbitRadius += (3-orbitRadius)*0.05; }
  } else if (phase === 'PLANT_VIEW') {
    if (plantParts.length) {
      const lp = plantParts[plantParts.length-1].mesh;
      orbitTarget.lerp(lp.position.clone().add(new THREE.Vector3(0,0.5,0)), 0.03);
    }
    if (!userInteracting) { orbitPitch += (0.2-orbitPitch)*0.03; orbitRadius += (3-orbitRadius)*0.03; orbitYaw += dt*0.15; }
  }

  // State machine
  if (phase === 'UI_SHRINK' && timer > 0.6) {
    uiPanel.classList.add('hidden');
    phase = 'DRINK'; timer = 0;
    character.setState(character.anims['DRINK'] ? 'DRINK' : 'IDLE');
  }

  if (phase === 'DRINK' && timer > (character.drinkDuration||1)) {
    // After drinking, character turns toward edge and auto-falls
    phase = 'TURN'; timer = 0;
    character.setState('IDLE');
    // Turn to face +Z (toward the jump edge)
    character.root.rotation.y = Math.PI;
  }

  if (phase === 'TURN') {
    // Brief pause while turning, then jump off
    if (timer > 0.6) {
      // Move character to the edge before falling
      character.root.position.z = rooftopBounds.maxZ + 0.1;
      startFall();
    }
  }

  if (phase === 'FALLING') {
    jumpVel.y -= 12*dt;
    character.root.position.add(jumpVel.clone().multiplyScalar(dt));
    if (character.root.position.y <= 0.02) {
      character.root.position.y = 0.02;
      phase = 'IMPACT'; timer = 0;
      lightBurst.burst(character.root.position.clone());
      spawnLightRing(character.root.position.clone().add(new THREE.Vector3(0,0.05,0)));
      // Generate plant at fixed landing zone (always same spot in front of building)
      const LANDING_X = 0, LANDING_Z = 5;
      character.root.position.set(LANDING_X, 0.02, LANDING_Z);
      const dna = generateDNAFromText(pendingText);
      const gen = generateProceduralPlant(dna);
      const part = {
        id: Date.now().toString(), textInput: pendingText,
        stems:gen.stems, fruits:gen.fruits, leaves:gen.leaves, stemColor:dna.stemColor,
        startX:0, startY:0, startZ:0, endPoint:gen.endPoint,
        worldX:LANDING_X, worldY:0, worldZ:LANDING_Z
      };
      addPlantPart(part, true);
      if (!pendingEntryId) pendingEntryId = Date.now().toString();
      finalizeEntry(pendingEntryId, part, pendingText);
    }
  }

  if (phase === 'IMPACT') {
    if (lightRing) {
      lightRing.userData.grow += dt;
      const g = clamp(lightRing.userData.grow/2, 0, 1);
      lightRing.scale.setScalar(0.3+g*1.4);
      lightRing.position.y = 0.1+g*0.8;
      lightRing.material.opacity = 0.8-g*0.5;
      if (g >= 1) { phase = 'PLANT_VIEW'; timer = 0; }
    }
  }

  if (phase === 'PLANT_VIEW' && timer > 4) {
    fadeOverlay.style.opacity = '1';
    phase = 'RESET'; timer = 0;
  }

  if (phase === 'RESET' && timer > 0.8) {
    character.root.position.set(0, rooftopY, 0);
    character.root.rotation.y = 0;
    character.setState('IDLE');
    orbitTarget.copy(character.root.position);
    orbitYaw = 0; orbitPitch = 0.15; orbitRadius = 0.3;
    uiPanel.classList.remove('hidden');
    uiPanel.classList.remove('leaving');
    leaveBtn.disabled = true;
    fadeOverlay.style.opacity = '0';
    phase = 'INTRO'; timer = 0;
    pendingText = ''; pendingEntryId = null;
  }

  // Grow plants
  for (const p of plantParts) {
    if (p.mesh.userData.grow !== undefined) {
      p.mesh.userData.grow = Math.min(1, p.mesh.userData.grow + dt*0.5);
      p.mesh.scale.setScalar(0.001 + p.mesh.userData.grow*(PLANT_SCALE-0.001));
      if (p.mesh.userData.grow >= 1) delete p.mesh.userData.grow;
    }
  }

  character.update(dt);
  updateCamera();
  lightBurst.update(dt);
  updateNoise();
  renderer.setSize(W(), H());
  camera.aspect = W()/H();
  camera.updateProjectionMatrix();
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  renderer.setSize(W(), H());
  camera.aspect = W()/H();
  camera.updateProjectionMatrix();
});

init();
</script>
</body>
</html>
