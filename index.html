import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

const W=()=>window.innerWidth, H=()=>window.innerHeight;
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));

// ===== Dreamcore Pastel Palette =====

const PASTEL_PURPLE = ['#E6A8D7','#DDA0DD','#CDB4DB','#D7C0D0','#C08497'];
const PASTEL_BLUE = ['#B2D8D8','#B5E2FA','#A2D2FF','#BDE0FE'];
const PASTEL_SOFT = ['#F5D6D6','#FDFD96','#EAEAEA','#D3D3D3'];
const ALL_PASTEL = [...PASTEL_PINK,...PASTEL_PURPLE,...PASTEL_BLUE,...PASTEL_SOFT];

// ===== Seeded Random =====
function hash(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h+=(h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24)}return h>>>0}
function srand(seed){let s=seed>>>0;return()=>{s=(s*1664525+1013904223)>>>0;return s/0x100000000}}

// ===== L-System Core =====
const PLANT_RULES=[
  {axiom:'X',rules:{X:'F-[[X]+X]+F[+FX]-X',F:'FF'},angle:25,iters:5,step:0.22,width:0.055},
  {axiom:'F',rules:{F:'FF+[+F-F-F]-[-F+F+F]'},angle:22,iters:3,step:0.32,width:0.07},
  {axiom:'F',rules:{F:'F[+&F][-&F][&F]'},angle:25,iters:5,step:0.35,width:0.09},
  {axiom:'F',rules:{F:'F[+F]F[-F]F'},angle:25.7,iters:4,step:0.18,width:0.045},
  {axiom:'F',rules:{F:'FF-[-F+F]+[+F-F]'},angle:22,iters:4,step:0.28,width:0.065},
  {axiom:'X',rules:{X:'F[+X][-X]FX',F:'FF'},angle:28,iters:4,step:0.26,width:0.05},
  {axiom:'F',rules:{F:'F[+F[-F]]F[-F[+F]]'},angle:20,iters:4,step:0.24,width:0.06},
  {axiom:'F',rules:{F:'F[++F][-FF]F[+F][-F]'},angle:18,iters:3,step:0.35,width:0.08},
];

function lsysGen(axiom,rules,iters){
  let s=axiom;
  for(let i=0;i<iters;i++){
    let n='';for(const ch of s)n+=rules[ch]||ch;
    s=n;if(s.length>12000)break;
  }
  return s;
}

function interpretLS(str,cfg,rng){
  const segs=[],leaves=[],flowers=[];
  let pos=new THREE.Vector3(0,0,0);
  let hd=new THREE.Vector3(0,1,0);
  let lt=new THREE.Vector3(1,0,0);
  let up=new THREE.Vector3(0,0,1);
  let w=cfg.width,d=0,st=cfg.step;
  const stack=[];
  const rad=Math.PI/180;
  const MAX=500;

  for(const ch of str){
    if(segs.length>=MAX)break;
    const av=1+(rng()-0.5)*0.3;
    const a=cfg.angle*rad*av;
    switch(ch){
      case 'F':case 'G':{
        const s0=pos.clone();
        const tmpH=hd.clone();
        tmpH.applyAxisAngle(lt,(rng()-0.5)*6*rad);
        pos=pos.clone().addScaledVector(tmpH,st);
        segs.push({start:s0,end:pos.clone(),width:w,depth:d});
        break;
      }
      case '+':hd.applyAxisAngle(up,a);lt.applyAxisAngle(up,a);break;
      case '-':hd.applyAxisAngle(up,-a);lt.applyAxisAngle(up,-a);break;
      case '&':hd.applyAxisAngle(lt,a);up.applyAxisAngle(lt,a);break;
      case '^':hd.applyAxisAngle(lt,-a);up.applyAxisAngle(lt,-a);break;
      case '[':{
        stack.push({pos:pos.clone(),hd:hd.clone(),lt:lt.clone(),up:up.clone(),w,d,st});
        d++;w*=0.62;st*=0.82;
        break;
      }
      case ']':{
        if(d>1&&rng()>0.25)leaves.push({p:pos.clone(),dir:hd.clone(),left:lt.clone()});
        if(d>2&&rng()>0.65)flowers.push({p:pos.clone(),dir:hd.clone()});
        const sv=stack.pop();
        if(!sv)break;
        pos=sv.pos;hd=sv.hd;lt=sv.lt;up=sv.up;w=sv.w;d=sv.d;st=sv.st;
        break;
      }
    }
  }
  if(segs.length>0)flowers.push({p:segs[segs.length-1].end.clone(),dir:hd.clone()});
  return{segs,leaves,flowers};
}

// ===== Root Generation =====
function genRoots(rng,baseW){
  const segs=[];
  const nR=3+Math.floor(rng()*4);
  for(let r=0;r<nR;r++){
    const ang=(r/nR)*Math.PI*2+rng()*0.5;
    const rLen=0.8+rng()*1.2;
    const nS=5+Math.floor(rng()*4);
    let pos=new THREE.Vector3(0,0,0);
    let dir=new THREE.Vector3(Math.cos(ang)*0.5,-0.85,Math.sin(ang)*0.5).normalize();
    let w=baseW*0.75;
    for(let i=0;i<nS;i++){
      const s=pos.clone();
      pos=pos.clone().addScaledVector(dir,rLen/nS);
      segs.push({start:s,end:pos.clone(),width:w,depth:0});
      w*=0.76;
      dir.x+=(rng()-0.5)*0.2;dir.y-=0.02;dir.z+=(rng()-0.5)*0.2;
      dir.normalize();
    }
    if(rng()>0.5){
      const splitI=Math.floor(segs.length*0.3+rng()*segs.length*0.3);
      const sp=segs[Math.min(splitI,segs.length-1)];
      let sP=sp.end.clone();
      let sD=new THREE.Vector3((rng()-0.5)*0.6,-0.5,(rng()-0.5)*0.6).normalize();
      let sW=sp.width*0.45;
      for(let i=0;i<3;i++){
        const ss=sP.clone();
        sP=sP.clone().addScaledVector(sD,rLen/nS*0.5);
        segs.push({start:ss,end:sP.clone(),width:sW,depth:1});
        sW*=0.7;
      }
    }
  }
  return segs;
}

// ===== Geometry Builder =====
function buildPlantGeo(allSegs,leaves,flowers,stemCol,leafCol,flowerCol,rng){
  const pos=[],nrm=[],col=[],idx=[];
  const RN=5;

  function tube(start,end,w,cr,cg,cb){
    const dir=new THREE.Vector3().subVectors(end,start);
    if(dir.lengthSq()<0.0001)return;
    dir.normalize();
    const p1=new THREE.Vector3();
    if(Math.abs(dir.y)<0.9)p1.crossVectors(dir,new THREE.Vector3(0,1,0)).normalize();
    else p1.crossVectors(dir,new THREE.Vector3(1,0,0)).normalize();
    const p2=new THREE.Vector3().crossVectors(dir,p1);
    const bi=pos.length/3;
    const ew=w*0.8;
    for(let ring=0;ring<2;ring++){
      const c=ring===0?start:end;
      const r=ring===0?w:ew;
      for(let i=0;i<RN;i++){
        const a=(i/RN)*Math.PI*2,ca=Math.cos(a),sa=Math.sin(a);
        pos.push(c.x+(ca*p1.x+sa*p2.x)*r,c.y+(ca*p1.y+sa*p2.y)*r,c.z+(ca*p1.z+sa*p2.z)*r);
        nrm.push(ca*p1.x+sa*p2.x,ca*p1.y+sa*p2.y,ca*p1.z+sa*p2.z);
        col.push(cr,cg,cb);
      }
    }
    for(let i=0;i<RN;i++){
      const a0=bi+i,a1=bi+(i+1)%RN,b0=bi+RN+i,b1=bi+RN+(i+1)%RN;
      idx.push(a0,b0,a1,a1,b0,b1);
    }
  }

  // Stems
  const sc=new THREE.Color(stemCol);
  for(const s of allSegs){
    const vary=0.92+rng()*0.16;
    tube(s.start,s.end,s.width,sc.r*vary,sc.g*vary,sc.b*vary);
  }

  // Leaves (diamond quads)
  const lc=new THREE.Color(leafCol);
  for(const lf of leaves){
    const sz=0.1+rng()*0.2;
    const bi=pos.length/3;
    const fwd=lf.dir.clone().multiplyScalar(sz);
    const side=lf.left.clone().multiplyScalar(sz*0.45);
    const n=new THREE.Vector3().crossVectors(fwd,side).normalize();
    const p=lf.p;
    pos.push(p.x,p.y,p.z);
    pos.push(p.x+side.x+fwd.x*0.4,p.y+side.y+fwd.y*0.4,p.z+side.z+fwd.z*0.4);
    pos.push(p.x+fwd.x,p.y+fwd.y,p.z+fwd.z);
    pos.push(p.x-side.x+fwd.x*0.4,p.y-side.y+fwd.y*0.4,p.z-side.z+fwd.z*0.4);
    for(let i=0;i<4;i++){nrm.push(n.x,n.y,n.z);col.push(lc.r,lc.g,lc.b)}
    idx.push(bi,bi+1,bi+2,bi,bi+2,bi+3);
  }

  // Flowers (petal fans)
  const fc=new THREE.Color(flowerCol);
  for(const fl of flowers){
    const bi=pos.length/3;
    const nP=5+Math.floor(rng()*4);
    const fSz=0.08+rng()*0.14;
    const c=fl.p;
    pos.push(c.x,c.y,c.z);nrm.push(0,1,0);col.push(fc.r*1.3,fc.g*1.3,fc.b*1.3);
    for(let i=0;i<nP;i++){
      const a1=(i/nP)*Math.PI*2,a2=((i+1)/nP)*Math.PI*2;
      const vi=pos.length/3;
      pos.push(c.x+Math.cos(a1)*fSz*0.3,c.y+0.02,c.z+Math.sin(a1)*fSz*0.3);
      pos.push(c.x+Math.cos((a1+a2)/2)*fSz,c.y+0.04,c.z+Math.sin((a1+a2)/2)*fSz);
      pos.push(c.x+Math.cos(a2)*fSz*0.3,c.y+0.02,c.z+Math.sin(a2)*fSz*0.3);
      for(let j=0;j<3;j++){nrm.push(0,1,0);col.push(fc.r,fc.g,fc.b)}
      idx.push(bi,vi,vi+1);idx.push(bi,vi+1,vi+2);
    }
  }

  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  geo.setAttribute('normal',new THREE.Float32BufferAttribute(nrm,3));
  geo.setAttribute('color',new THREE.Float32BufferAttribute(col,3));
  geo.setIndex(idx);

  // Sort triangles by Y for growth animation (bottom->top)
  const posArr=geo.getAttribute('position').array;
  const idxArr=Array.from(geo.getIndex().array);
  const tc=idxArr.length/3;
  const tris=[];
  for(let i=0;i<tc;i++){
    const a=idxArr[i*3],b=idxArr[i*3+1],c=idxArr[i*3+2];
    tris.push({a,b,c,y:(posArr[a*3+1]+posArr[b*3+1]+posArr[c*3+1])/3});
  }
  tris.sort((a,b)=>a.y-b.y);
  const sorted=[];
  for(const t of tris)sorted.push(t.a,t.b,t.c);
  geo.setIndex(sorted);

  return geo;
}

// ===== Generate Plant =====
function makePlant(text){
  const seed=hash(text);
  const rng=srand(seed);
  const type=PLANT_RULES[seed%PLANT_RULES.length];
  const lStr=lsysGen(type.axiom,type.rules,type.iters);
  const{segs,leaves,flowers}=interpretLS(lStr,type,rng);
  const rootSegs=genRoots(rng,type.width);
  const all=[...rootSegs,...segs];

  // Pick colors from palette
  const stemCol=PASTEL_PURPLE[Math.floor(rng()*PASTEL_PURPLE.length)];
  const leafCol=PASTEL_BLUE[Math.floor(rng()*PASTEL_BLUE.length)];
  const flowerCol=PASTEL_PINK[Math.floor(rng()*PASTEL_PINK.length)];

  const geo=buildPlantGeo(all,leaves,flowers,stemCol,leafCol,flowerCol,rng);
  const mat=new THREE.MeshStandardMaterial({
    vertexColors:true,roughness:0.65,metalness:0.05,
    emissive:new THREE.Color(flowerCol),emissiveIntensity:0.12,
    side:THREE.DoubleSide
  });
  const mesh=new THREE.Mesh(geo,mat);
  mesh.userData.entryText=text;
  mesh.userData.totalIdx=geo.getIndex().count;
  const grp=new THREE.Group();
  grp.add(mesh);
  return grp;
}

// ===== THREE.js Scene =====
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setSize(W(),H());
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.toneMapping=THREE.ACESFilmicToneMapping;

{

// Fog for dreamcore depth
scene.fog=new THREE.FogExp2('#d8e8f0',0.012);

// Ground — glowing green meadow
{

  })));

// Grass particle scatter
{
  const p=[],c=[];
  for(let i=0;i<3000;i++){
    const x=(Math.random()-0.5)*80,z=(Math.random()-0.5)*80;
    const y=Math.sin(x*0.04)*Math.cos(z*0.05)*0.4+Math.random()*0.25;

// Lighting — soft dreamcore
scene.add(new THREE.HemisphereLight('#87CEEB','#5a9e6a',0.65));
const sun=new THREE.DirectionalLight('#fff5e6',0.7);
sun.position.set(8,18,5);scene.add(sun);
scene.add(new THREE.AmbientLight('#ffffff',0.35));

const camera=new THREE.PerspectiveCamera(55,W()/H(),0.1,500);

// ===== Plant Container =====
const plantRoot=new THREE.Group();
scene.add(plantRoot);
const plantEntries=[];

function addPlant(text,grow=true){
  let grp;
  try{grp=makePlant(text)}catch(e){console.error('Plant err:',e);return null}
  const rr=srand(hash(text)+plantEntries.length);
  grp.position.set((rr()-0.5)*2.5,0,(rr()-0.5)*2.5);
  const mesh=grp.children[0];
  if(grow&&mesh){
    grp.userData.growStart=performance.now();
    grp.userData.growDur=1500+Math.random()*800;
    grp.userData.totalIdx=mesh.userData.totalIdx;
    grp.userData.phase=Math.random()*Math.PI*2;
    mesh.geometry.setDrawRange(0,3);
  }else if(mesh){
    mesh.geometry.setDrawRange(0,mesh.userData.totalIdx);
    grp.userData.phase=Math.random()*Math.PI*2;
  }
  plantRoot.add(grp);
  plantEntries.push({mesh:grp,text});
  return grp;
}

// ===== Camera =====
let camYaw=0.3,camPitch=0.35,camDist=14;
let camTarget=new THREE.Vector3(0,3,0);
let interacting=false,interTimer=0;
const ptrs=new Map();
let dragS={x:0,y:0,yaw:0,pitch:0},pinchD0=0,pinchR0=14;

canvas.addEventListener('pointerdown',e=>{
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  canvas.setPointerCapture(e.pointerId);
  interacting=true;interTimer=0;
  if(ptrs.size===1)dragS={x:e.clientX,y:e.clientY,yaw:camYaw,pitch:camPitch};
  else if(ptrs.size===2){const p=[...ptrs.values()];pinchD0=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);pinchR0=camDist}
});
canvas.addEventListener('pointermove',e=>{
  if(!ptrs.has(e.pointerId))return;
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  interacting=true;interTimer=0;
  if(ptrs.size===1){
    camYaw=dragS.yaw+(e.clientX-dragS.x)/W()*4;
    camPitch=clamp(dragS.pitch+(e.clientY-dragS.y)/H()*2,-0.3,1.4);
  }else if(ptrs.size>=2){
    const p=[...ptrs.values()],d=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);
    if(pinchD0>0)camDist=clamp(pinchR0*(pinchD0/d),3,50);
  }
});
canvas.addEventListener('pointerup',e=>ptrs.delete(e.pointerId));
canvas.addEventListener('pointercancel',e=>ptrs.delete(e.pointerId));
canvas.addEventListener('wheel',e=>{e.preventDefault();camDist=clamp(camDist+e.deltaY*0.015,3,50);interacting=true;interTimer=0},{passive:false});

function updateCam(){
  camera.position.set(
    camTarget.x+camDist*Math.cos(camPitch)*Math.sin(camYaw),
    camTarget.y+camDist*Math.sin(camPitch),
    camTarget.z+camDist*Math.cos(camPitch)*Math.cos(camYaw)
  );
  camera.lookAt(camTarget);
}

// ===== Click to Read =====
const raycaster=new THREE.Raycaster();
const pop=document.getElementById('pop');
canvas.addEventListener('click',e=>{
  if(!plantRoot.children.length)return;
  const rect=canvas.getBoundingClientRect();
  raycaster.setFromCamera({x:((e.clientX-rect.left)/rect.width)*2-1,y:-((e.clientY-rect.top)/rect.height)*2+1},camera);
  const hits=raycaster.intersectObjects(plantRoot.children,true);
  if(hits.length){
    let o=hits[0].object;
    while(o&&!o.userData.entryText)o=o.parent;
    if(o?.userData.entryText){pop.textContent=o.userData.entryText;pop.classList.add('show');setTimeout(()=>pop.classList.remove('show'),4000)}
  }
});

// ===== UI =====
const ui=document.getElementById('ui'),goBtn=document.getElementById('go');
const ta=document.getElementById('ta'),wb=document.getElementById('wb');
ta.addEventListener('input',()=>{goBtn.disabled=!ta.value.trim()});
goBtn.addEventListener('click',()=>{
  const text=ta.value.trim();
  if(!text)return;
  ta.value='';goBtn.disabled=true;
  ui.classList.add('hidden');wb.style.display='block';
  addPlant(text,true);
  saveEntry(text);
  camTarget.set(0,3,0);camDist=10;
});
wb.addEventListener('click',()=>{wb.style.display='none';ui.classList.remove('hidden')});

// ===== Load Saved =====
async function loadSaved(){
  try{
    const entries=await loadEntries();
    for(const e of entries){if(e.text)addPlant(e.text,false)}
  }catch(e){console.error('Load err:',e)}
}

// ===== Game Loop =====
const clock=new THREE.Clock();
let globalTime=0;

function tick(){
  requestAnimationFrame(tick);
  const dt=Math.min(clock.getDelta(),0.05);
  globalTime+=dt;
  interTimer+=dt;
  if(interTimer>2)interacting=false;
  if(!interacting)camYaw+=dt*0.06;
  const now=performance.now();

  for(const entry of plantEntries){
    const g=entry.mesh;
    const m=g.children[0];
    if(!m||!m.geometry)continue;

    // Growth via drawRange
    if(g.userData.totalIdx!==undefined){
      const elapsed=now-g.userData.growStart;
      const t=Math.min(1,elapsed/g.userData.growDur);
      const ease=1-(1-t)*(1-t);
      const count=Math.ceil(ease*g.userData.totalIdx/3)*3;
      m.geometry.setDrawRange(0,count);
      if(t>=1)delete g.userData.totalIdx;
    }

    // Organic wriggle
    const ph=g.userData.phase||0;
    g.rotation.x=Math.sin(globalTime*1.1+ph)*0.01+Math.sin(globalTime*2.3+ph*1.7)*0.005;
    g.rotation.z=Math.cos(globalTime*0.85+ph*0.8)*0.01+Math.cos(globalTime*1.9+ph*1.3)*0.005;
  }

  const maxY=plantEntries.length>0?4:3;
  camTarget.y+=(maxY-camTarget.y)*dt*0.5;
  updateCam();
  renderer.render(scene,camera);
}

// ===== Init =====
async function init(){await loadSaved();tick()}
init();

window.addEventListener('resize',()=>{
  renderer.setSize(W(),H());
  camera.aspect=W()/H();
  camera.updateProjectionMatrix();
});
</script>
