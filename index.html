<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>URBAN LEGEND</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:"Courier New",monospace}
    #c{position:absolute;inset:0;width:100%;height:100%;touch-action:none}
    #ui{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      width:min(80vw,520px);background:rgba(0,0,0,0.5);border:1px solid rgba(0,255,180,0.25);
      padding:24px;z-index:10;color:#dff;backdrop-filter:blur(6px);transition:opacity 0.4s}
    #ui.hidden{opacity:0;pointer-events:none}
    #ui h2{font-size:14px;letter-spacing:6px;color:#9ff;margin-bottom:10px}
    #ui textarea{width:100%;height:90px;background:rgba(0,0,0,0.6);border:1px solid rgba(0,255,180,0.25);
      color:#e8ffff;padding:12px;font-size:14px;resize:none;outline:none}
    #go{margin-top:14px;width:100%;height:44px;background:rgba(0,255,180,0.12);
      border:1px solid rgba(0,255,180,0.4);color:#bff;text-transform:uppercase;letter-spacing:6px;cursor:pointer;font-family:inherit}
    #go:disabled{opacity:0.4;cursor:not-allowed}
    #pop{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
      max-width:min(90vw,600px);background:rgba(0,0,0,0.7);color:#e8ffff;border:1px solid rgba(0,255,180,0.3);
      padding:12px 16px;z-index:12;display:none;font-size:13px;letter-spacing:1px}
    #pop.show{display:block}
    #wb{display:none;position:absolute;bottom:30px;right:20px;
      background:rgba(0,255,180,0.12);border:1px solid rgba(0,255,180,0.4);color:#bff;padding:10px 20px;
      text-transform:uppercase;letter-spacing:4px;cursor:pointer;z-index:14;font-family:inherit;font-size:11px}
  </style>

<body>
  <canvas id="c"></canvas>
  <div id="ui">
    <h2>WRITE</h2>
    <textarea id="ta" placeholder="留下你的話..."></textarea>
    <button id="go" disabled>PLANT</button>
  </div>
  <div id="pop"></div>
  <button id="wb">WRITE</button>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

// ===== Globals =====
const W = () => window.innerWidth, H = () => window.innerHeight;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const neon = ['#ff00ff','#ff3388','#ffaa00','#00ff88','#00ddff','#ff4466','#88ff00','#ff00aa','#44ffcc','#ffdd00'];

// ===== Persistence =====
const STORAGE_KEY = 'urban_legend_plants_v2';
const apiP = new URLSearchParams(location.search).get('api');
if (apiP) localStorage.setItem('PLANT_API', apiP.replace(/\/$/,''));
const API = localStorage.getItem('PLANT_API') || '';

async function loadEntries() {
  if (API) { try { const r = await fetch(API+'/api/entries'); if (r.ok) return await r.json(); } catch{} }
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); } catch { return []; }
}
function saveEntry(text) {
  const list = JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
  list.push({ text, id: Date.now(), t: new Date().toISOString() });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  if (API) fetch(API+'/api/entries',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})}).catch(()=>{});
}

// ===== Seeded random =====
function hash(s) { let h=2166136261; for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h+=(h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24)} return h>>>0; }
function srand(seed) { let s=seed>>>0; return()=>{s=(s*1664525+1013904223)>>>0;return s/0x100000000}; }

// ===== Ring helper =====
function addRing(arr, col, cx, cy, cz, tx, ty, tz, radius, n) {
  let ux, uy, uz, vx, vy, vz;
  // Build perpendicular basis from tangent (tx,ty,tz)
  if (Math.abs(ty) < 0.9) {
    // cross(tangent, up)
    ux = tz; uy = 0; uz = -tx;
  } else {
    ux = 0; uy = -tz; uz = ty;
  }
  const ulen = Math.sqrt(ux*ux+uy*uy+uz*uz) || 1;
  ux/=ulen; uy/=ulen; uz/=ulen;
  // v = cross(tangent, u)
  vx = ty*uz-tz*uy; vy = tz*ux-tx*uz; vz = tx*uy-ty*ux;
  for (let i = 0; i < n; i++) {
    const a = (i/n)*Math.PI*2;
    const ca = Math.cos(a), sa = Math.sin(a);
    arr.push(cx+(ca*ux+sa*vx)*radius, cy+(ca*uy+sa*vy)*radius, cz+(ca*uz+sa*vz)*radius);
    col.push(col._r, col._g, col._b);
  }
}

// Simpler addRing that works with color arrays directly
function pushRing(pts, cols, cx, cy, cz, tx, ty, tz, radius, n, cr, cg, cb) {
  let ux, uy, uz;
  if (Math.abs(ty) < 0.9) { ux=tz; uy=0; uz=-tx; }
  else { ux=0; uy=-tz; uz=ty; }
  const ulen = Math.sqrt(ux*ux+uy*uy+uz*uz)||1;
  ux/=ulen; uy/=ulen; uz/=ulen;
  const vx=ty*uz-tz*uy, vy=tz*ux-tx*uz, vz=tx*uy-ty*ux;
  for (let i=0; i<n; i++) {
    const a=(i/n)*Math.PI*2, ca=Math.cos(a), sa=Math.sin(a);
    pts.push(cx+(ca*ux+sa*vx)*radius, cy+(ca*uy+sa*vy)*radius, cz+(ca*uz+sa*vz)*radius);
    cols.push(cr, cg, cb);
  }
}

// ===== Generate plant structure =====
function generatePlant(text) {
  const seed = hash(text);
  const r = srand(seed);

  // Plant style
  const height = 4 + r()*6;
  const nBranches = 2 + Math.floor(r()*5);
  const curviness = 0.3 + r()*1.5;
  const branchSpread = 0.3 + r()*0.7;

  // Main stem: spine points going upward with some curve
  const mainSpine = [];
  const segs = 30;
  let cx=0, cy=0, cz=0;
  let dx=(r()-0.5)*0.3, dz=(r()-0.5)*0.3;
  for (let i=0; i<=segs; i++) {
    mainSpine.push({x:cx, y:cy, z:cz});
    const t = i/segs;
    cy += height/segs;
    cx += Math.sin(t*Math.PI*3+seed)*curviness*0.15;
    cz += Math.cos(t*Math.PI*2.5+seed*0.7)*curviness*0.15;
    cx += dx*0.1; cz += dz*0.1;
  }

  // Branches from main stem
  const branches = [];
  for (let b=0; b<nBranches; b++) {
    const startT = 0.2 + r()*0.6;
    const startIdx = Math.floor(startT*segs);
    const sp = mainSpine[startIdx];
    const bLen = (1+r()*3) * branchSpread;
    const bSegs = 12 + Math.floor(r()*8);
    const bDir = {x:(r()-0.5)*2, y:0.3+r()*0.7, z:(r()-0.5)*2};
    const bSpine = [];
    let bx=sp.x, by=sp.y, bz=sp.z;
    for (let i=0; i<=bSegs; i++) {
      bSpine.push({x:bx, y:by, z:bz});
      const t=i/bSegs;
      bx += bDir.x*bLen/bSegs + Math.sin(t*Math.PI*4+b)*curviness*0.1;
      by += bDir.y*bLen/bSegs;
      bz += bDir.z*bLen/bSegs + Math.cos(t*Math.PI*3+b)*curviness*0.1;
    }
    branches.push({spine: bSpine, startT, radius: 0.06+r()*0.06});

    // Sub-branches
    if (r() > 0.4) {
      const subIdx = Math.floor(0.4*bSegs + r()*0.4*bSegs);
      const subSp = bSpine[Math.min(subIdx, bSpine.length-1)];
      const subLen = bLen*0.4;
      const subSegs = 6+Math.floor(r()*4);
      const subSpine = [];
      let sx=subSp.x, sy=subSp.y, sz=subSp.z;
      const sd = {x:(r()-0.5)*2, y:0.2+r()*0.5, z:(r()-0.5)*2};
      for(let i=0;i<=subSegs;i++){
        subSpine.push({x:sx,y:sy,z:sz});
        sx+=sd.x*subLen/subSegs; sy+=sd.y*subLen/subSegs; sz+=sd.z*subLen/subSegs;
      }
      branches.push({spine:subSpine, startT:startT+0.1, radius:0.03+r()*0.03});
    }
  }

  // Roots
  const roots = [];
  const nRoots = 2+Math.floor(r()*3);
  for (let i=0; i<nRoots; i++) {
    const rLen = 1+r()*2;
    const rSegs = 8;
    const rSpine = [];
    let rx=0, ry=0, rz=0;
    const rd = {x:(r()-0.5)*2, y:-0.5-r()*0.5, z:(r()-0.5)*2};
    for(let j=0;j<=rSegs;j++){
      rSpine.push({x:rx,y:ry,z:rz});
      rx+=rd.x*rLen/rSegs; ry+=rd.y*rLen/rSegs; rz+=rd.z*rLen/rSegs;
    }
    roots.push({spine:rSpine, radius:0.08+r()*0.06});
  }

  return { mainSpine, branches, roots, seed, height, nBranches };
}

// ===== Build point cloud — points ordered base-to-tip for progressive growth =====
function buildPlantCloud(plantData, text) {
  const pts = [], cols = [];
  const r = srand(plantData.seed);

  // Pick colors
  const stemC = new THREE.Color(neon[Math.floor(r()*neon.length)]);
  const flowerC = new THREE.Color(neon[Math.floor(r()*neon.length)]);
  const leafC = new THREE.Color(neon[Math.floor(r()*neon.length)]);
  const fruitC = new THREE.Color(neon[Math.floor(r()*neon.length)]);
  const flowerType = Math.floor(r()*10);
  const leafType = Math.floor(r()*10);

  const RING_N = 8;

  // Helper: add spine as tube (rings along spine)
  function addTube(spine, baseR, tipR, cr, cg, cb) {
    for (let i=0; i<spine.length; i++) {
      const t = i/(spine.length-1);
      const p = spine[i];
      // Tangent
      let tx, ty, tz;
      if (i < spine.length-1) {
        tx=spine[i+1].x-p.x; ty=spine[i+1].y-p.y; tz=spine[i+1].z-p.z;
      } else {
        tx=p.x-spine[i-1].x; ty=p.y-spine[i-1].y; tz=p.z-spine[i-1].z;
      }
      const tlen = Math.sqrt(tx*tx+ty*ty+tz*tz)||1;
      tx/=tlen; ty/=tlen; tz/=tlen;
      const radius = baseR*(1-t) + tipR*t;
      pushRing(pts, cols, p.x, p.y, p.z, tx, ty, tz, radius, RING_N, cr, cg, cb);
      // Center spine point
      pts.push(p.x, p.y, p.z);
      cols.push(cr, cg, cb);
    }
  }

  // 1. Roots (grow first, underground)
  for (const root of plantData.roots) {
    const rc = new THREE.Color(stemC).offsetHSL(0, 0, -0.1);
    addTube(root.spine, root.radius, 0.02, rc.r, rc.g, rc.b);
  }

  // 2. Main stem (grows upward)
  addTube(plantData.mainSpine, 0.18, 0.04, stemC.r, stemC.g, stemC.b);

  // 3. Branches with decorations
  for (const branch of plantData.branches) {
    const bc = new THREE.Color(stemC).offsetHSL(r()*0.08-0.04, 0, r()*0.06-0.03);
    addTube(branch.spine, branch.radius, 0.02, bc.r, bc.g, bc.b);

    // Flower at branch tip
    const tip = branch.spine[branch.spine.length-1];
    addFlower(pts, cols, tip.x, tip.y, tip.z, flowerType, 0.5+r()*0.8, flowerC.r, flowerC.g, flowerC.b, r);

    // Fruit overlay
    addFruit(pts, cols, tip.x, tip.y+0.1, tip.z, Math.floor(r()*10), 0.3+r()*0.3, fruitC.r, fruitC.g, fruitC.b, r);

    // Leaves along branch
    const nLeaves = 1+Math.floor(r()*3);
    for (let li=0; li<nLeaves; li++) {
      const lIdx = Math.floor((0.2+r()*0.5)*(branch.spine.length-1));
      const lp = branch.spine[lIdx];
      addLeaf(pts, cols, lp.x, lp.y, lp.z, leafType, 0.3+r()*0.4, leafC.r, leafC.g, leafC.b, r);
    }
  }

  // 4. Top flower on main stem
  const top = plantData.mainSpine[plantData.mainSpine.length-1];
  addFlower(pts, cols, top.x, top.y, top.z, flowerType, 0.8+r()*0.6, flowerC.r, flowerC.g, flowerC.b, r);

  // 5. Leaves along main stem
  const nMainLeaves = 3+Math.floor(r()*4);
  for (let i=0; i<nMainLeaves; i++) {
    const idx = Math.floor((0.15+r()*0.6)*(plantData.mainSpine.length-1));
    const lp = plantData.mainSpine[idx];
    addLeaf(pts, cols, lp.x, lp.y, lp.z, leafType, 0.4+r()*0.5, leafC.r, leafC.g, leafC.b, r);
  }

  // Build geometry
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
  geo.setAttribute('color', new THREE.Float32BufferAttribute(cols, 3));
  geo.setDrawRange(0, 0); // Start hidden for growth animation

  const mat = new THREE.PointsMaterial({
    size: 0.12, vertexColors: true, transparent: true,
    opacity: 0.9, depthWrite: false, sizeAttenuation: true
  });
  const mesh = new THREE.Points(geo, mat);
  mesh.userData.entryText = text;
  mesh.userData.totalVerts = pts.length / 3;

  const group = new THREE.Group();
  group.add(mesh);
  return group;
}

// ===== Flower shapes (added at position) =====
function addFlower(pts, cols, cx, cy, cz, type, scale, cr, cg, cb, r) {
  const s = scale;
  switch(type) {
    case 0: // Rose spiral
      for(let lay=0;lay<4;lay++){const nP=5+lay*2,R=(0.2+lay*0.3)*s;for(let p=0;p<nP;p++){const ba=(p/nP)*Math.PI*2+lay*0.3;for(let i=0;i<10;i++){const t=i/10,rr=R*(0.3+t*0.7),y=Math.sin(t*Math.PI)*0.2*s-t*t*0.15*s;pts.push(cx+Math.cos(ba+t*0.1)*rr,cy+lay*0.1*s+y,cz+Math.sin(ba+t*0.1)*rr);cols.push(cr,cg,cb)}}}
      for(let i=0;i<30;i++){const t=i/30,a=t*Math.PI*6,R=t*0.2*s;pts.push(cx+Math.cos(a)*R,cy+0.4*s+t*0.05*s,cz+Math.sin(a)*R);cols.push(cr*1.2,cg*1.2,cb*1.2)}
      break;
    case 1: // Sunflower
      {const g=Math.PI*(3-Math.sqrt(5));for(let i=0;i<60;i++){const R=Math.sqrt(i/60)*0.3*s,a=i*g;pts.push(cx+Math.cos(a)*R,cy+0.2*s,cz+Math.sin(a)*R);cols.push(cr*0.8,cg*0.6,cb*0.2)}
      for(let p=0;p<14;p++){const ba=(p/14)*Math.PI*2;for(let i=0;i<8;i++){const t=i/8,R=(0.3+t*0.6)*s,w=Math.sin(t*Math.PI)*0.08*s;pts.push(cx+Math.cos(ba)*R,cy+0.15*s-t*t*0.1*s,cz+Math.sin(ba)*R);cols.push(cr,cg,cb)}}} break;
    case 2: // Lily
      for(let p=0;p<6;p++){const ba=(p/6)*Math.PI*2;for(let i=0;i<14;i++){const t=i/14,R=t*0.9*s,y=Math.sin(t*Math.PI*0.7)*0.4*s;pts.push(cx+Math.cos(ba)*R,cy+y,cz+Math.sin(ba)*R);cols.push(cr,cg,cb)}}
      for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2;for(let j=0;j<6;j++){const t=j/6;pts.push(cx+Math.cos(a)*t*0.2*s,cy+t*0.5*s,cz+Math.sin(a)*t*0.2*s);cols.push(cr*1.3,cg*1.3,cb*0.5)}} break;
    case 3: // Dahlia layers
      for(let lay=0;lay<5;lay++){const nP=6+lay*3,R=(0.1+lay*0.15)*s;for(let p=0;p<nP;p++){const ba=(p/nP)*Math.PI*2+lay*0.2;for(let i=0;i<6;i++){const t=i/6,rr=R*(0.5+t*0.5);pts.push(cx+Math.cos(ba)*rr,cy+(0.4-lay*0.06)*s-t*lay*0.02*s,cz+Math.sin(ba)*rr);cols.push(cr,cg,cb)}}} break;
    case 4: // Tulip cup
      for(let p=0;p<6;p++){const ba=(p/6)*Math.PI*2;for(let i=0;i<12;i++){const t=i/12,R=(0.08+Math.sin(t*Math.PI)*0.35)*s,y=t*0.7*s;for(let d=-1;d<=1;d++){pts.push(cx+Math.cos(ba+d*0.1)*R,cy+y,cz+Math.sin(ba+d*0.1)*R);cols.push(cr,cg,cb)}}} break;
    case 5: // Dandelion puff
      for(let ray=0;ray<24;ray++){const phi=Math.acos(2*r()-1),th=r()*Math.PI*2,dx=Math.sin(phi)*Math.cos(th),dy=Math.sin(phi)*Math.sin(th),dz=Math.cos(phi);for(let i=0;i<6;i++){const t=i/6*s*0.6;pts.push(cx+dx*t,cy+0.2*s+dy*t,cz+dz*t);cols.push(cr,cg,cb)}pts.push(cx+dx*0.6*s,cy+0.2*s+dy*0.6*s,cz+dz*0.6*s);cols.push(1,1,1)} break;
    case 6: // Chrysanthemum
      for(let p=0;p<20;p++){const ba=(p/20)*Math.PI*2,curl=0.3+r()*0.5;for(let i=0;i<10;i++){const t=i/10,R=t*(0.5+r()*0.3)*s,y=Math.sin(t*Math.PI*0.8)*0.3*s-t*t*curl*0.2*s;pts.push(cx+Math.cos(ba)*R,cy+y,cz+Math.sin(ba)*R);cols.push(cr,cg,cb)}}
      for(let i=0;i<20;i++){const a=r()*Math.PI*2,rr=r()*0.1*s;pts.push(cx+Math.cos(a)*rr,cy+0.25*s,cz+Math.sin(a)*rr);cols.push(cr*1.3,cg*1.3,cb*0.3)} break;
    case 7: // Lotus bowl
      for(let lay=0;lay<3;lay++){const nP=5+lay*2;for(let p=0;p<nP;p++){const ba=(p/nP)*Math.PI*2+lay*0.25;for(let i=0;i<12;i++){const t=i/12,R=(0.15+lay*0.2+t*0.2)*s,y=(0.1+t*0.35-lay*0.04)*s;pts.push(cx+Math.cos(ba)*R,cy+y,cz+Math.sin(ba)*R);cols.push(cr,cg,cb)}}} break;
    case 8: // Morning glory trumpet
      for(let ring=0;ring<16;ring++){const t=ring/16,R=(0.04+t*t*0.6)*s,y=t*0.7*s,n=6+Math.floor(t*8);for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2;pts.push(cx+Math.cos(a)*R,cy+y,cz+Math.sin(a)*R);cols.push(cr,cg,cb)}} break;
    default: // Orchid
      for(let sep=0;sep<3;sep++){const ba=(sep/3)*Math.PI*2;for(let i=0;i<12;i++){const t=i/12,R=t*0.7*s;pts.push(cx+Math.cos(ba)*R,cy+Math.sin(t*Math.PI)*0.2*s,cz+Math.sin(ba)*R);cols.push(cr,cg,cb)}}
      for(let i=0;i<15;i++){const t=i/15;pts.push(cx+(r()-0.5)*0.1*s,cy-t*0.3*s,cz+Math.sin(t*Math.PI)*0.25*s);cols.push(cr,cg,cb)}
  }
}

// ===== Leaf shapes =====
function addLeaf(pts, cols, cx, cy, cz, type, scale, cr, cg, cb, r) {
  const s=scale, dx=(r()-0.5)*2, dz=(r()-0.5)*2;
  const len = Math.sqrt(dx*dx+dz*dz)||1;
  const nx=dx/len, nz=dz/len;
  switch(type%10) {
    case 0: // Oval with veins
      for(let i=0;i<20;i++){const t=i/20,w=Math.sin(t*Math.PI)*0.35*s;pts.push(cx+nx*t*1.5*s,cy,cz+nz*t*1.5*s);cols.push(cr,cg,cb);for(let d of[-1,1]){pts.push(cx+nx*t*1.5*s+nz*d*w,cy+0.02*s,cz+nz*t*1.5*s-nx*d*w);cols.push(cr,cg,cb)}} break;
    case 1: // Fern
      for(let i=0;i<15;i++){pts.push(cx+nx*i/15*2*s,cy,cz+nz*i/15*2*s);cols.push(cr,cg,cb);const ll=(1-i/15)*0.4*s;for(let d of[-1,1])for(let j=0;j<4;j++){const jt=j/4;pts.push(cx+nx*i/15*2*s+nz*d*jt*ll,cy,cz+nz*i/15*2*s-nx*d*jt*ll);cols.push(cr,cg,cb)}} break;
    case 2: // Palm fan
      for(let seg=0;seg<7;seg++){const ba=(seg/7-0.5)*Math.PI*0.6;for(let i=0;i<10;i++){const t=i/10,R=t*1.2*s;pts.push(cx+Math.sin(ba)*R,cy-t*t*0.2*s,cz+Math.cos(ba)*R);cols.push(cr,cg,cb)}} break;
    case 3: // Needles
      for(let n=0;n<8+Math.floor(r()*6);n++){const a=r()*Math.PI*2,sp=r()*0.2;for(let i=0;i<6;i++){const t=i/6;pts.push(cx+Math.cos(a)*sp*t*s,cy+t*1.2*s,cz+Math.sin(a)*sp*t*s);cols.push(cr,cg,cb)}} break;
    case 4: // Heart
      for(let i=0;i<30;i++){const t=(i/30)*Math.PI*2,x=0.3*s*Math.pow(Math.sin(t),3),z=0.3*s*(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))/16;pts.push(cx+x,cy,cz+z);cols.push(cr,cg,cb)} break;
    case 5: // Serrated
      for(let i=0;i<25;i++){const t=i/25,w=(Math.sin(t*Math.PI)+Math.sin(t*7*Math.PI)*0.15)*0.3*s;pts.push(cx+nx*t*1.5*s,cy,cz+nz*t*1.5*s);pts.push(cx+nx*t*1.5*s+nz*w,cy,cz+nz*t*1.5*s-nx*w);pts.push(cx+nx*t*1.5*s-nz*w,cy,cz+nz*t*1.5*s+nx*w);cols.push(cr,cg,cb,cr,cg,cb,cr,cg,cb)} break;
    case 6: // Broad tropical
      for(let i=0;i<25;i++){const t=i/25,w=Math.sin(t*Math.PI)*0.6*s;for(let d=-3;d<=3;d++){pts.push(cx+nx*t*2*s+nz*(d/3)*w,cy+Math.sin(t*6+d)*0.02*s,cz+nz*t*2*s-nx*(d/3)*w);cols.push(cr,cg,cb)}} break;
    case 7: // Grass blade
      for(let i=0;i<20;i++){const t=i/20;pts.push(cx+Math.sin(t*Math.PI*0.4)*0.5*s*nx,cy+t*2*s,cz+Math.sin(t*Math.PI*0.4)*0.5*s*nz);cols.push(cr,cg,cb)} break;
    case 8: // Compound
      for(let leaf=0;leaf<4;leaf++){const z=cx+nx*(leaf+1)*0.4*s,zz=cz+nz*(leaf+1)*0.4*s;for(let d of[-1,1])for(let i=0;i<6;i++){const t=i/6,w=Math.sin(t*Math.PI)*0.15*s;pts.push(z+nz*d*t*0.3*s,cy+leaf*0.1*s,zz-nx*d*t*0.3*s);cols.push(cr,cg,cb)}} break;
    default: // Vine tendril
      for(let i=0;i<30;i++){const t=i/30,a=t*Math.PI*4,R=(1-t)*0.2*s+0.03*s;pts.push(cx+Math.cos(a)*R,cy+t*1.5*s,cz+Math.sin(a)*R);cols.push(cr,cg,cb)}
  }
}

// ===== Fruit shapes =====
function addFruit(pts, cols, cx, cy, cz, type, scale, cr, cg, cb, r) {
  const s=scale;
  switch(type%10) {
    case 0: // Berry sphere rings
      for(let ring=0;ring<=8;ring++){const phi=(ring/8)*Math.PI,y=Math.cos(phi)*0.35*s,R=Math.sin(phi)*0.35*s,n=Math.max(3,Math.floor(R/s*16));for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2;pts.push(cx+Math.cos(a)*R,cy+y,cz+Math.sin(a)*R);cols.push(cr,cg,cb)}} break;
    case 1: // Pod
      for(let ring=0;ring<=10;ring++){const t=ring/10,y=(t-0.5)*s,R=Math.sin(t*Math.PI)*0.18*s;for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2;pts.push(cx+Math.cos(a)*R,cy+y,cz+Math.sin(a)*R);cols.push(cr,cg,cb)}} break;
    case 2: // Star
      for(let ring=0;ring<=6;ring++){const y=(ring/6-0.5)*0.6*s;for(let i=0;i<20;i++){const a=(i/20)*Math.PI*2,R=(0.2+Math.abs(Math.sin(a*2.5))*0.2)*s;pts.push(cx+Math.cos(a)*R,cy+y,cz+Math.sin(a)*R);cols.push(cr,cg,cb)}} break;
    case 3: // Cluster
      for(let b=0;b<4;b++){const bx=(r()-0.5)*0.3*s,by=(r()-0.5)*0.3*s,bz=(r()-0.5)*0.3*s,bR=0.08*s;for(let ring=0;ring<4;ring++){const phi=(ring/3)*Math.PI,y=Math.cos(phi)*bR,R=Math.sin(phi)*bR;for(let i=0;i<5;i++){const a=(i/5)*Math.PI*2;pts.push(cx+bx+Math.cos(a)*R,cy+by+y,cz+bz+Math.sin(a)*R);cols.push(cr,cg,cb)}}} break;
    case 4: // Teardrop
      for(let ring=0;ring<=10;ring++){const t=ring/10,y=(t-0.3)*0.8*s,R=Math.sin(Math.pow(t,0.7)*Math.PI)*0.25*s;for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2;pts.push(cx+Math.cos(a)*R,cy+y,cz+Math.sin(a)*R);cols.push(cr,cg,cb)}} break;
    case 5: // Torus
      {const R=0.25*s,rr=0.08*s;for(let i=0;i<16;i++){const u=(i/16)*Math.PI*2;for(let j=0;j<6;j++){const v=(j/6)*Math.PI*2;pts.push(cx+(R+rr*Math.cos(v))*Math.cos(u),cy+rr*Math.sin(v),cz+(R+rr*Math.cos(v))*Math.sin(u));cols.push(cr,cg,cb)}}} break;
    default: // Spiky
      for(let sp=0;sp<8;sp++){const phi=Math.acos(2*r()-1),th=r()*Math.PI*2,dx=Math.sin(phi)*Math.cos(th),dy=Math.cos(phi),dz=Math.sin(phi)*Math.sin(th);for(let i=0;i<4;i++){const t=0.15*s+i/4*0.25*s;pts.push(cx+dx*t,cy+dy*t,cz+dz*t);cols.push(cr,cg,cb)}}
  }
}

// ===== THREE.js Scene =====
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(W(), H());
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color('#050810');
const camera = new THREE.PerspectiveCamera(55, W()/H(), 0.1, 200);

scene.add(new THREE.AmbientLight(0xffffff, 0.5));

// Ground scatter
{
  const p=[],c=[];
  for(let i=0;i<400;i++){
    p.push((Math.random()-0.5)*30,-0.1,(Math.random()-0.5)*30);
    const col=new THREE.Color(neon[Math.floor(Math.random()*neon.length)]);
    c.push(col.r,col.g,col.b);
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(p,3));
  g.setAttribute('color',new THREE.Float32BufferAttribute(c,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({size:0.05,vertexColors:true,transparent:true,opacity:0.12,depthWrite:false})));
}

// ===== Plant container =====
const plantRoot = new THREE.Group();
scene.add(plantRoot);
const plantEntries = [];

function addPlant(text, grow=true) {
  let mesh;
  try {
    const data = generatePlant(text);
    mesh = buildPlantCloud(data, text);
  } catch(e) {
    console.error('Plant error:', e);
    document.getElementById('pop').textContent = 'ERR:'+e.message;
    document.getElementById('pop').classList.add('show');
    return null;
  }

  // ALL plants clustered at center with slight random offset
  const rr = srand(hash(text)+plantEntries.length);
  mesh.position.set((rr()-0.5)*1.5, 0, (rr()-0.5)*1.5);

  // Growth animation via setDrawRange
  const pointsMesh = mesh.children[0];
  if (grow && pointsMesh) {
    mesh.userData.growStart = performance.now();
    mesh.userData.growDuration = 1200 + Math.random()*600; // 1.2-1.8s
    mesh.userData.totalVerts = pointsMesh.userData.totalVerts;
    mesh.userData.wigglePhase = Math.random()*Math.PI*2;
    // DrawRange starts at 0 — immediately visible as it grows
    pointsMesh.geometry.setDrawRange(0, 1);
  } else if (pointsMesh) {
    pointsMesh.geometry.setDrawRange(0, pointsMesh.userData.totalVerts);
  }

  plantRoot.add(mesh);
  plantEntries.push({ mesh, text });
  saveEntry(text);
  return mesh;
}

// ===== Camera =====
let camYaw=0.3, camPitch=0.4, camDist=12;
let camTarget = new THREE.Vector3(0, 3, 0);
let interacting=false, interTimer=0;
const ptrs=new Map();
let dragS={x:0,y:0,yaw:0,pitch:0}, pinchD0=0, pinchR0=12;

canvas.addEventListener('pointerdown', e=>{
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  canvas.setPointerCapture(e.pointerId);
  interacting=true; interTimer=0;
  if(ptrs.size===1) dragS={x:e.clientX,y:e.clientY,yaw:camYaw,pitch:camPitch};
  else if(ptrs.size===2){const p=[...ptrs.values()];pinchD0=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);pinchR0=camDist}
});
canvas.addEventListener('pointermove', e=>{
  if(!ptrs.has(e.pointerId))return;
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  interacting=true; interTimer=0;
  if(ptrs.size===1){
    camYaw=dragS.yaw+(e.clientX-dragS.x)/W()*4;
    camPitch=clamp(dragS.pitch+(e.clientY-dragS.y)/H()*2,-0.3,1.4);
  } else if(ptrs.size>=2){
    const p=[...ptrs.values()],d=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);
    if(pinchD0>0) camDist=clamp(pinchR0*(pinchD0/d),3,40);
  }
});
canvas.addEventListener('pointerup', e=>ptrs.delete(e.pointerId));
canvas.addEventListener('pointercancel', e=>ptrs.delete(e.pointerId));
canvas.addEventListener('wheel', e=>{e.preventDefault();camDist=clamp(camDist+e.deltaY*0.015,3,40);interacting=true;interTimer=0},{passive:false});

function updateCam() {
  camera.position.set(
    camTarget.x + camDist*Math.cos(camPitch)*Math.sin(camYaw),
    camTarget.y + camDist*Math.sin(camPitch),
    camTarget.z + camDist*Math.cos(camPitch)*Math.cos(camYaw)
  );
  camera.lookAt(camTarget);
}

// ===== Click to read =====
const raycaster = new THREE.Raycaster();
raycaster.params.Points.threshold = 0.5;
const pop = document.getElementById('pop');
canvas.addEventListener('click', e=>{
  if(!plantRoot.children.length) return;
  const rect=canvas.getBoundingClientRect();
  raycaster.setFromCamera({x:((e.clientX-rect.left)/rect.width)*2-1,y:-((e.clientY-rect.top)/rect.height)*2+1},camera);
  const hits=raycaster.intersectObjects(plantRoot.children,true);
  if(hits.length){let o=hits[0].object;while(o&&!o.userData.entryText)o=o.parent;if(o?.userData.entryText){pop.textContent=o.userData.entryText;pop.classList.add('show');setTimeout(()=>pop.classList.remove('show'),4000)}}
});

// ===== UI =====
const ui=document.getElementById('ui'), goBtn=document.getElementById('go');
const ta=document.getElementById('ta'), wb=document.getElementById('wb');

ta.addEventListener('input', ()=>{goBtn.disabled=!ta.value.trim()});

goBtn.addEventListener('click', ()=>{
  const text=ta.value.trim();
  if(!text) return;
  ta.value=''; goBtn.disabled=true;
  ui.classList.add('hidden');
  wb.style.display='block';
  const mesh = addPlant(text, true);
  if(mesh){
    camTarget.set(0, 3, 0);
    camDist = 10;
  }
});

wb.addEventListener('click', ()=>{wb.style.display='none';ui.classList.remove('hidden')});

// ===== Load saved =====
async function loadSaved() {
  try {
    const entries = await loadEntries();
    for (const entry of entries) {
      if (!entry.text) continue;
      addPlant(entry.text, false);
    }
  } catch(e) { console.error('Load error:', e); }
}

// ===== Game loop =====
const clock = new THREE.Clock();
let globalTime = 0;

function tick() {
  requestAnimationFrame(tick);
  const dt = Math.min(clock.getDelta(), 0.05);
  globalTime += dt;
  interTimer += dt;
  if (interTimer > 2) interacting = false;
  if (!interacting) camYaw += dt * 0.08;

  const now = performance.now();

  for (const entry of plantEntries) {
    const m = entry.mesh;
    const pm = m.children[0];
    if (!pm || !pm.geometry) continue;

    // Progressive growth via setDrawRange
    if (m.userData.totalVerts !== undefined) {
      const elapsed = now - m.userData.growStart;
      const t = Math.min(1, elapsed / m.userData.growDuration);
      // Ease-out: fast start, slow finish
      const ease = 1 - (1 - t) * (1 - t);
      const count = Math.ceil(ease * m.userData.totalVerts);
      pm.geometry.setDrawRange(0, count);
      if (t >= 1) delete m.userData.totalVerts;
    }

    // Organic wriggle — subtle multi-freq oscillation
    const phase = m.userData.wigglePhase || 0;
    m.rotation.x = Math.sin(globalTime*1.2+phase)*0.015 + Math.sin(globalTime*2.5+phase*1.7)*0.008;
    m.rotation.z = Math.cos(globalTime*0.9+phase*0.8)*0.015 + Math.cos(globalTime*2.1+phase*1.3)*0.008;
  }

  // Camera target slowly drifts up as more plants are added
  const maxY = plantEntries.reduce((acc, e) => {
    const d = e.mesh.children[0]?.userData;
    return Math.max(acc, d ? 5 : 3);
  }, 3);
  camTarget.y += (maxY - camTarget.y) * dt * 0.5;

  updateCam();
  renderer.render(scene, camera);
}

// ===== Init =====
async function init() {
  await loadSaved();
  tick();
}
init();

window.addEventListener('resize', ()=>{
  renderer.setSize(W(),H());
  camera.aspect=W()/H();
  camera.updateProjectionMatrix();
});
</script>
