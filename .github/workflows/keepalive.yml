name: Keep Supabase Alive

on:
  schedule:
    # Run twice a day so a missed run does not approach Supabase's 7-day inactivity window.
    - cron: '17 1,13 * * *'
  workflow_dispatch:

concurrency:
  group: supabase-keepalive
  cancel-in-progress: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_URL: https://mmhoohddrmguxnmtvgwz.supabase.co
      SUPABASE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_TABLE: entries
      KEEPALIVE_ID: __keepalive__
      KEEPALIVE_TEXT: __DELETED__
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate keepalive secrets
        run: |
          if [ -z "$SUPABASE_KEY" ]; then
            echo "Missing GitHub secret: SUPABASE_PUBLISHABLE_KEY" >&2
            exit 1
          fi
      
      - name: Write keepalive heartbeat to Supabase
        run: node .github/scripts/supabase-keepalive.mjs
