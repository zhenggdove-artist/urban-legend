name: Keep Supabase Alive

on:
  schedule:
    # Run twice a day so a missed run does not approach Supabase's 7-day inactivity window.
    - cron: '17 1,13 * * *'
  workflow_dispatch:

concurrency:
  group: supabase-keepalive
  cancel-in-progress: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_URL: https://mmhoohddrmguxnmtvgwz.supabase.co
      # Publishable (anon) key — already shipped to every browser via index.html,
      # so treating it as a GitHub secret adds no security but creates a single
      # point of failure when the secret is missing. Inline is the reliable choice.
      SUPABASE_KEY: sb_publishable_Aig1UQpR4iYyaeArWCG5IQ_XGhTXzsq
      SUPABASE_TABLE: entries
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ping Supabase to reset inactivity timer
        run: node .github/scripts/supabase-keepalive.mjs
