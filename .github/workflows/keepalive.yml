name: Keep Supabase Alive

on:
  schedule:
    # Run every 5 days at 00:00 UTC to prevent Supabase free-tier hibernation (7-day limit)
    - cron: '0 0 */5 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent hibernation
        run: |
          # Read-only query — does NOT create entries, does NOT appear in plant pool
          curl -sf "https://mmhoohddrmguxnmtvgwz.supabase.co/rest/v1/entries?select=id&limit=1" \
            -H "apikey: sb_publishable_Aig1UQpR4iYyaeArWCG5IQ_XGhTXzsq" \
            -H "Authorization: Bearer sb_publishable_Aig1UQpR4iYyaeArWCG5IQ_XGhTXzsq" \
            -o /dev/null -w "HTTP %{http_code}\n"
          echo "Supabase keep-alive ping sent at $(date -u)"
